function drawIsoCityBuilding(b){
  const p=toIso(b.col,b.row);
  const hw=ISO.tileW/2, hh=ISO.tileH/2;
  const w=b.bw*hw, d=b.bd*hw;
  const wh=b.bw*hh, dh=b.bd*hh;
  const topCol=`hsl(${b.hue},${b.sat}%,${b.lit+10}%)`;
  const leftCol=`hsl(${b.hue},${b.sat}%,${b.lit-5}%)`;
  const rightCol=`hsl(${b.hue},${b.sat}%,${b.lit}%)`;

  // Left face corners (front-facing wall)
  const lTL={x:p.x-d, y:p.y+dh-b.h};       // top-left
  const lTR={x:p.x+w-d, y:p.y+wh+dh-b.h};  // top-right
  const lBL={x:p.x-d, y:p.y+dh};            // bottom-left
  const lBR={x:p.x+w-d, y:p.y+wh+dh};       // bottom-right

  // Right face corners (side wall)
  const rTL={x:p.x+w-d, y:p.y+wh+dh-b.h};  // top-left
  const rTR={x:p.x+w, y:p.y+wh-b.h};        // top-right
  const rBL={x:p.x+w-d, y:p.y+wh+dh};       // bottom-left
  const rBR={x:p.x+w, y:p.y+wh};            // bottom-right

  // Top face
  cx.beginPath();
  cx.moveTo(p.x,p.y-b.h);
  cx.lineTo(rTR.x,rTR.y);
  cx.lineTo(rTL.x,rTL.y);
  cx.lineTo(lTL.x,lTL.y);
  cx.closePath();
  cx.fillStyle=topCol;cx.fill();
  // Left face
  cx.beginPath();
  cx.moveTo(lTL.x,lTL.y);cx.lineTo(lTR.x,lTR.y);
  cx.lineTo(lBR.x,lBR.y);cx.lineTo(lBL.x,lBL.y);
  cx.closePath();
  cx.fillStyle=leftCol;cx.fill();
  // Right face
  cx.beginPath();
  cx.moveTo(rTL.x,rTL.y);cx.lineTo(rTR.x,rTR.y);
  cx.lineTo(rBR.x,rBR.y);cx.lineTo(rBL.x,rBL.y);
  cx.closePath();
  cx.fillStyle=rightCol;cx.fill();

  // Helper: interpolate point on a parallelogram face
  // u=0..1 horizontal, v=0..1 vertical (0=top,1=bottom)
  function facePoint(tl,tr,bl,br,u,v){
    const topX=tl.x+(tr.x-tl.x)*u;
    const topY=tl.y+(tr.y-tl.y)*u;
    const botX=bl.x+(br.x-bl.x)*u;
    const botY=bl.y+(br.y-bl.y)*u;
    return {x:topX+(botX-topX)*v, y:topY+(botY-topY)*v};
  }

  // Windows on left face (perspective-correct)
  const wRows=Math.min(b.winRows,Math.floor(b.h/12));
  const wCols=Math.min(b.winCols,Math.floor((b.bw*hw)/10));
  const margin=0.08;
  for(let wy=0;wy<wRows;wy++){
    for(let wx=0;wx<wCols;wx++){
      const u0=margin+wx*(1-2*margin)/wCols;
      const u1=u0+(1-2*margin)/wCols*0.6;
      const v0=margin+wy*(1-2*margin)/wRows;
      const v1=v0+(1-2*margin)/wRows*0.55;
      const a=facePoint(lTL,lTR,lBL,lBR,u0,v0);
      const bb=facePoint(lTL,lTR,lBL,lBR,u1,v0);
      const cc=facePoint(lTL,lTR,lBL,lBR,u1,v1);
      const dd=facePoint(lTL,lTR,lBL,lBR,u0,v1);
      const lit=Math.sin(tt*0.004+b.col*10+wx*5+wy*8)>0.15;
      cx.fillStyle=lit?'#eedd77':'#6a8899';
      cx.beginPath();cx.moveTo(a.x,a.y);cx.lineTo(bb.x,bb.y);
      cx.lineTo(cc.x,cc.y);cx.lineTo(dd.x,dd.y);cx.closePath();cx.fill();
    }
  }
  // Windows on right face (perspective-correct)
  const rCols=Math.min(b.winCols,Math.floor((b.bd*hw)/10));
  for(let wy=0;wy<wRows;wy++){
    for(let wx=0;wx<rCols;wx++){
      const u0=margin+wx*(1-2*margin)/rCols;
      const u1=u0+(1-2*margin)/rCols*0.6;
      const v0=margin+wy*(1-2*margin)/wRows;
      const v1=v0+(1-2*margin)/wRows*0.55;
      const a=facePoint(rTL,rTR,rBL,rBR,u0,v0);
      const bb=facePoint(rTL,rTR,rBL,rBR,u1,v0);
      const cc=facePoint(rTL,rTR,rBL,rBR,u1,v1);
      const dd=facePoint(rTL,rTR,rBL,rBR,u0,v1);
      const lit=Math.sin(tt*0.004+b.col*7+wx*4+wy*11)>0.2;
      cx.fillStyle=lit?'#eedd77':'#7a99aa';
      cx.beginPath();cx.moveTo(a.x,a.y);cx.lineTo(bb.x,bb.y);
      cx.lineTo(cc.x,cc.y);cx.lineTo(dd.x,dd.y);cx.closePath();cx.fill();
    }
  }
}

function drawCityBg(){
  const skyTop=SHOP.y;
  const skyH=ISO.wallH+60;
  // Sky gradient
  const skyGrad=cx.createLinearGradient(0,skyTop,0,skyTop+skyH);
  const skyCols=G?getSkyColors(G.gameTime):getSkyColors(12);
  skyGrad.addColorStop(0,skyCols[0]);
  skyGrad.addColorStop(0.5,skyCols[1]);
  skyGrad.addColorStop(1,skyCols[2]);
  cx.fillStyle=skyGrad;
  cx.fillRect(0,skyTop,W,skyH);

  // Clouds (darker when raining)
  const isRaining=G&&G.weather&&G.weather.type==='rain';
  cx.fillStyle=isRaining?'#6a7080':'#d0e8f8';
  const ct=tt*(isRaining?0.06:0.12); // clouds move slower in rain
  for(let i=0;i<(isRaining?7:4);i++){ // more clouds when raining
    const cx2=((i*180+ct)%(isRaining?1200:1000))-50;
    const cy2=skyTop+8+i*12;
    const cSize=isRaining?14+i*2:10+i*2;
    cx.beginPath();cx.arc(cx2,cy2,cSize,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.arc(cx2+14,cy2-3,cSize-2,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.arc(cx2+26,cy2+1,cSize-1,0,Math.PI*2);cx.fill();
    if(isRaining){cx.beginPath();cx.arc(cx2+40,cy2-1,cSize-3,0,Math.PI*2);cx.fill();}
  }
  // Rain effect (outside shop area — sky + street)
  if(isRaining){
    // Darken sky overlay
    cx.globalAlpha=0.15;cx.fillStyle='#1a2a3a';cx.fillRect(0,skyTop,W,skyH);cx.globalAlpha=1;
    // Rain drops
    cx.strokeStyle='rgba(180,200,220,0.5)';cx.lineWidth=1;
    for(const drop of rainDrops){
      drop.y+=drop.sp;
      if(drop.y>skyTop+skyH+20){drop.y=skyTop-10;drop.x=Math.random()*W;}
      // Only draw drops in sky area (not inside shop)
      if(drop.y>=skyTop&&drop.y<skyTop+skyH){
        cx.beginPath();cx.moveTo(drop.x,drop.y);cx.lineTo(drop.x-1,drop.y+drop.len);cx.stroke();
      }
    }
    // Rain sound (subtle, every ~30 frames)
    if(tt%30===0) SFX.rainLoop();
    // Thunder (random flash + sound)
    if(thunderCooldown>0) thunderCooldown--;
    if(thunderFlash>0){
      cx.globalAlpha=thunderFlash/8;cx.fillStyle='#eeeeff';cx.fillRect(0,skyTop,W,skyH);cx.globalAlpha=1;
      thunderFlash--;
    } else if(thunderCooldown<=0&&Math.random()<0.003){
      thunderFlash=8;thunderCooldown=300; // flash for 8 frames, cooldown 5 sec
      SFX.thunder();
    }
  }

  // Draw isometric city buildings (behind shop)
  for(const b of CITY_BUILDINGS){
    drawIsoCityBuilding(b);
  }

  // Isometric street/sidewalk tiles in front of buildings
  for(let c=-2;c<ISO.cols+3;c++){
    for(let rr=-2;rr<0;rr++){
      drawIsoTile(c,rr,'#8a8878','#7a786810');
    }
  }
  // Rain on streets (outside shop)
  if(isRaining){
    cx.strokeStyle='rgba(160,180,200,0.35)';cx.lineWidth=0.8;
    for(let i=0;i<20;i++){
      const rx2=Math.random()*W, ry2=skyTop+skyH+Math.random()*60;
      cx.beginPath();cx.moveTo(rx2,ry2);cx.lineTo(rx2-0.5,ry2+6+Math.random()*6);cx.stroke();
    }
    // Puddle reflections on street
    cx.globalAlpha=0.08;
    for(let i=0;i<5;i++){
      cx.beginPath();cx.ellipse(100+i*160+Math.sin(tt*0.02+i)*10,skyTop+skyH+30,20+i*5,3,0,0,Math.PI*2);
      cx.fillStyle='#8ab8d8';cx.fill();
    }
    cx.globalAlpha=1;
  }
  // Fill entire bottom of canvas with floor color FIRST (covers the gap triangle)
  cx.fillStyle='#b6ae9e';
  cx.fillRect(0,H*0.5,W,H*0.5);

  // Grass tiles around the shop exterior (bottom, right, and corner)
  // These draw ON TOP of the floor fill, so exterior stays green
  for(let c=-5;c<ISO.cols+8;c++){
    for(let rr=ISO.rows;rr<ISO.rows+14;rr++){
      const gc=((c+rr)%2===0)?'#6a9a48':'#5e8e42';
      drawIsoTile(c,rr,gc,'#5a8a3810');
    }
  }
  for(let c=ISO.cols;c<ISO.cols+8;c++){
    for(let rr=-4;rr<ISO.rows+14;rr++){
      const gc=((c+rr)%2===0)?'#6a9a48':'#5e8e42';
      drawIsoTile(c,rr,gc,'#5a8a3810');
    }
  }
  // ── XTANCO branding on grass (bottom-right corner) ──
  const bp=toIso(ISO.cols+2,ISO.rows+3);
  cx.save();
  cx.translate(bp.x,bp.y);
  // Isometric skew: rotate to follow the grass tile angle
  const ba=Math.atan2(ISO.tileH/2,ISO.tileW/2);
  cx.rotate(-ba);
  cx.scale(1,0.5); // flatten for iso perspective
  cx.globalAlpha=0.35;
  cx.font='bold 28px monospace';
  cx.textAlign='center';
  cx.fillStyle='#3a6a28';
  cx.fillText('X T A N C O',0,0);
  cx.globalAlpha=0.2;
  cx.font='bold 10px monospace';
  cx.fillText('SIMULADOR DE ESTANCO DIGITAL',0,16);
  cx.globalAlpha=1;
  cx.restore();
}

// ── DRAW SHOP (ISOMETRIC — Kairosoft warm style) ─────────────
function drawShop(){
  // Clip to shop area
  cx.save();
  cx.beginPath();cx.rect(SHOP.x,SHOP.y,SHOP.w,SHOP.h);cx.clip();

  // ── FLOOR (uniform carpet — Kairosoft style) ──
  for(let row=0;row<ISO.rows;row++){
    for(let col=0;col<ISO.cols;col++){
      // Subtle carpet texture with very slight variation
      let floorCol=((col+row)%2===0)?'#b8b0a0':'#b4ac9c';
      if(G.rush.active){
        const pulse=0.05*Math.sin(tt*.08);
        floorCol=((col+row)%2===0)?`rgba(200,170,110,${0.9+pulse})`:`rgba(195,165,105,${0.9+pulse})`;
      }
      if(G.inspect.active&&G.inspect.timer>100){
        floorCol=((col+row)%2===0)?'#c8a8a8':'#c0a0a0';
      }
      drawIsoTile(col,row,floorCol,'#a8a09010');
    }
  }

  // ── BACK WALL (cream/beige, Kairosoft style) ──
  const wallPts=[];
  for(let c=0;c<=ISO.cols+4;c++) wallPts.push(toIso(c,0)); // extend right to cover full view
  // Wall body
  cx.beginPath();
  cx.moveTo(wallPts[0].x,wallPts[0].y);
  for(let i=1;i<wallPts.length;i++) cx.lineTo(wallPts[i].x,wallPts[i].y);
  for(let i=wallPts.length-1;i>=0;i--) cx.lineTo(wallPts[i].x,wallPts[i].y-ISO.wallH);
  cx.closePath();
  cx.fillStyle=P.wallInner;cx.fill();
  // Wall panel lines (subtle horizontal)
  cx.globalAlpha=0.08;
  for(let h=15;h<ISO.wallH;h+=20){
    cx.strokeStyle='#a09070';cx.lineWidth=0.5;cx.beginPath();
    cx.moveTo(wallPts[0].x,wallPts[0].y-h);
    for(let i=1;i<wallPts.length;i++) cx.lineTo(wallPts[i].x,wallPts[i].y-h);
    cx.stroke();
  }
  cx.globalAlpha=1;
  // Baseboard (darker strip at bottom of wall)
  cx.beginPath();
  cx.moveTo(wallPts[0].x,wallPts[0].y);
  for(let i=1;i<wallPts.length;i++) cx.lineTo(wallPts[i].x,wallPts[i].y);
  for(let i=wallPts.length-1;i>=0;i--) cx.lineTo(wallPts[i].x,wallPts[i].y-8);
  cx.closePath();
  cx.fillStyle='#9a8868';cx.fill();
  // Ceiling line (thin dark border at top)
  cx.strokeStyle='#b0a080';cx.lineWidth=2;cx.beginPath();
  cx.moveTo(wallPts[0].x,wallPts[0].y-ISO.wallH);
  for(let i=1;i<wallPts.length;i++) cx.lineTo(wallPts[i].x,wallPts[i].y-ISO.wallH);
  cx.stroke();

  // ── WINDOWS on back wall (half size, centered in wall) ──
  const winCols=[1.4,10.8]; // 10% closer to Admira TFT (cols 5.0-9.0)
  for(const wc of winCols){
    const wp1=toIso(wc,0), wp2=toIso(wc+1.2,0);
    const whei=Math.floor((ISO.wallH-50)*0.55);
    const wy=wp1.y-ISO.wallH+Math.floor((ISO.wallH-whei)/2)-Math.floor(ISO.wallH*0.15); // raised above furniture line
    const wwid=wp2.x-wp1.x;
    // Window frame outer
    r(wp1.x-3,wy-3,wwid+6,whei+6,'#e8e4dc');
    // Clip to window and draw city through it
    cx.save();
    cx.beginPath();cx.rect(wp1.x,wy,wwid,whei);cx.clip();
    // Sky
    const skyGrad=cx.createLinearGradient(0,wy,0,wy+whei);
    const wSkyCols=G?getSkyColors(G.gameTime):getSkyColors(12);
    skyGrad.addColorStop(0,wSkyCols[0]);
    skyGrad.addColorStop(0.5,wSkyCols[1]);
    skyGrad.addColorStop(1,wSkyCols[2]);
    cx.fillStyle=skyGrad;cx.fillRect(wp1.x,wy,wwid,whei);
    // Clouds
    cx.fillStyle='#d0e8f8';
    const cOff=((tt*0.1+wc*80)%250)-40;
    cx.beginPath();cx.arc(wp1.x+cOff,wy+15,6,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.arc(wp1.x+cOff+10,wy+12,5,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.arc(wp1.x+cOff+18,wy+14,5,0,Math.PI*2);cx.fill();
    // City silhouette through window — matching exterior skyline colors
    // Buildings occupy bottom 50% of window, leaving sky above
    const bCount=5;
    const bSpacing=wwid/bCount;
    for(let bi=0;bi<bCount;bi++){
      const seed=wc*13+bi*7; // deterministic per window
      const bIdx=Math.floor(Math.abs(Math.sin(seed)*CITY_BUILDINGS.length))%CITY_BUILDINGS.length;
      const cb=CITY_BUILDINGS[bIdx];
      const bh=whei*(0.2+0.35*Math.abs(Math.sin(seed*3.7))); // 20-55% of window height
      const bx=wp1.x+bi*bSpacing+2;
      const bw2=bSpacing-3;
      const bBase=wy+whei;
      // Front face
      cx.fillStyle=`hsl(${cb.hue},${cb.sat}%,${cb.lit}%)`;
      cx.fillRect(bx,bBase-bh,bw2,bh);
      // Slight right edge (depth)
      cx.fillStyle=`hsl(${cb.hue},${cb.sat}%,${cb.lit-10}%)`;
      cx.fillRect(bx+bw2-2,bBase-bh,2,bh);
      // Windows on building (small squares)
      const mRows=Math.max(1,Math.floor(bh/8));
      const mCols=Math.max(1,Math.floor(bw2/7));
      for(let mr=0;mr<mRows;mr++){
        for(let mc=0;mc<mCols;mc++){
          const lit=Math.sin(tt*0.004+seed+mc*5+mr*8)>0.15;
          cx.fillStyle=lit?'#eedd77':'#5a7a8a';
          cx.fillRect(bx+2+mc*Math.floor((bw2-4)/mCols),bBase-bh+3+mr*Math.floor(bh/mRows),3,4);
        }
      }
    }
    cx.restore();
    // Crossbars
    cx.strokeStyle='#d0ccbc';cx.lineWidth=2.5;
    cx.beginPath();
    cx.moveTo(wp1.x+wwid/2,wy);cx.lineTo(wp1.x+wwid/2,wy+whei);
    cx.moveTo(wp1.x,wy+whei*0.45);cx.lineTo(wp1.x+wwid,wy+whei*0.45);
    cx.stroke();
    // Frame border
    rx(wp1.x-3,wy-3,wwid+6,whei+6,'#9a8a68',1.5);
    // Window sill
    r(wp1.x-5,wy+whei+3,wwid+10,5,'#c8c0a8');
  }

  // ── BIRDS flying past windows (different color each pass) ──
  const birdColors=['#2a2a2a','#cc4422','#2266cc','#ddaa00','#22aa44','#aa22aa','#dd6622','#4488aa'];
  const birdCycleLen=700;
  const birdCycleNum=Math.floor(tt/birdCycleLen); // which cycle we're on
  const birdPhase=(tt%birdCycleLen)/birdCycleLen;  // 0→1 within cycle
  const birdCol2=0.5+birdPhase*10;
  const birdIso=toIso(birdCol2,0);
  const birdBaseY=toIso(birdCol2,0).y-ISO.wallH+Math.floor((ISO.wallH)*0.35);
  const birdBob=Math.sin(tt*0.12)*3;
  const birdX=birdIso.x;
  const birdY=birdBaseY+birdBob;
  const wingFrame=Math.floor(tt/6)%3;
  // Pick color based on cycle number
  const birdColor=birdColors[birdCycleNum%birdColors.length];
  // Belly/highlight color (lighter version)
  const birdBelly=birdCycleNum%2===0?'#ffffff44':'#ffffff22';
  // Draw bird only through window glass
  for(const wc of winCols){
    const wp1=toIso(wc,0), wp2=toIso(wc+1.2,0);
    const wwy=wp1.y-ISO.wallH+Math.floor((ISO.wallH-Math.floor((ISO.wallH-50)*0.55))/2);
    const wwid2=wp2.x-wp1.x;
    const whei2=Math.floor((ISO.wallH-50)*0.55);
    if(birdX>wp1.x-12&&birdX<wp1.x+wwid2+12){
      cx.save();
      cx.beginPath();cx.rect(wp1.x,wwy,wwid2,whei2);cx.clip();
      // Body
      cx.fillStyle=birdColor;
      cx.beginPath();cx.ellipse(birdX,birdY,5,2.5,0,0,Math.PI*2);cx.fill();
      // Belly highlight
      cx.fillStyle=birdBelly;
      cx.beginPath();cx.ellipse(birdX+1,birdY+1,3,1.5,0,0,Math.PI*2);cx.fill();
      // Wings (flapping)
      cx.fillStyle=birdColor;
      const wy1=wingFrame===0?-5:wingFrame===1?-2:-6;
      const wy2=wingFrame===0?-4:wingFrame===1?-6:-2;
      cx.beginPath();
      cx.moveTo(birdX-2,birdY);cx.lineTo(birdX-8,birdY+wy1);cx.lineTo(birdX-4,birdY-1);cx.fill();
      cx.beginPath();
      cx.moveTo(birdX+2,birdY);cx.lineTo(birdX+8,birdY+wy2);cx.lineTo(birdX+4,birdY-1);cx.fill();
      // Tail
      cx.beginPath();
      cx.moveTo(birdX-5,birdY);cx.lineTo(birdX-9,birdY+2);cx.lineTo(birdX-5,birdY+1);cx.fill();
      // Head/beak
      cx.beginPath();cx.arc(birdX+5,birdY-1,1.5,0,Math.PI*2);cx.fill();
      cx.fillStyle='#ee8800';
      cx.beginPath();cx.moveTo(birdX+7,birdY-1);cx.lineTo(birdX+10,birdY);cx.lineTo(birdX+7,birdY+0.5);cx.fill();
      // Eye
      cx.fillStyle='#fff';
      cx.beginPath();cx.arc(birdX+5.5,birdY-1.5,0.8,0,Math.PI*2);cx.fill();
      cx.fillStyle='#000';
      cx.beginPath();cx.arc(birdX+5.8,birdY-1.5,0.4,0,Math.PI*2);cx.fill();
      cx.restore();
    }
  }

  // ── LEFT WALL (slightly darker, Kairosoft style) ──
  // Extend beyond ISO.rows and fill up to top of canvas to cover all sky
  const lwPts=[];
  for(let rr=0;rr<=ISO.rows+4;rr++) lwPts.push(toIso(0,rr));
  cx.beginPath();
  cx.moveTo(lwPts[0].x,lwPts[0].y);
  for(let i=1;i<lwPts.length;i++) cx.lineTo(lwPts[i].x,lwPts[i].y);
  // from last floor point, go straight up to top of canvas, then across
  cx.lineTo(lwPts[lwPts.length-1].x, 0);
  cx.lineTo(lwPts[0].x, 0);
  cx.closePath();
  cx.fillStyle='#d0c4a8';cx.fill();
  // Left wall baseboard (only visible rows 0-8)
  const lwVisible=[];
  for(let rr=0;rr<=ISO.rows;rr++) lwVisible.push(toIso(0,rr));
  cx.beginPath();
  cx.moveTo(lwVisible[0].x,lwVisible[0].y);
  for(let i=1;i<lwVisible.length;i++) cx.lineTo(lwVisible[i].x,lwVisible[i].y);
  for(let i=lwVisible.length-1;i>=0;i--) cx.lineTo(lwVisible[i].x,lwVisible[i].y-8);
  cx.closePath();
  cx.fillStyle='#8a7858';cx.fill();
  // Ceiling line left (only visible rows)
  cx.strokeStyle='#a09070';cx.lineWidth=1.5;cx.beginPath();
  cx.moveTo(lwVisible[0].x,lwVisible[0].y-ISO.wallH);
  for(let i=1;i<lwVisible.length;i++) cx.lineTo(lwVisible[i].x,lwVisible[i].y-ISO.wallH);
  cx.stroke();

  // ── CORNER FILL (covers sky gap where left wall meets back wall) ──
  {
    const cP=toIso(0,0);
    const bExt=toIso(-0.5,0);
    const lExt=toIso(0,-0.5);
    cx.beginPath();
    cx.moveTo(cP.x, cP.y);
    cx.lineTo(bExt.x, bExt.y);
    cx.lineTo(bExt.x, bExt.y-ISO.wallH);
    cx.lineTo(lExt.x, lExt.y-ISO.wallH);
    cx.lineTo(lExt.x, lExt.y);
    cx.lineTo(cP.x, cP.y);
    cx.closePath();
    cx.fillStyle='#c8bca0'; cx.fill();
  }

  // ── RIGHT WALL door drawn AFTER furniture (see drawGlassDoor below) ──

  // ── CLOCK on left wall ──
  drawWallClock();
  // ── LED on LEFT WALL (top edge) ──
  const ledItem=shopLayout.find(i=>i.id==='led');
  if(ledItem) drawLED(ledItem.sx||1,ledItem.sy||1);
  // ── LED on BACK WALL (top edge, continues from left wall) ──
  drawBackWallLED();
  // ── AIR CONDITIONING on left wall (drawn AFTER LED so it's visible) ──
  drawAirConditioning();
  // ── AROMATIZER on back wall (right side, low) ──
  drawAromatizer();
  // ── TFT ALTADIS (16:9 screen on back wall, above 2nd window) ──
  drawAltadisTFT();

  // ── FURNITURE & ENTITIES (sorted by screen Y for correct occlusion) ──
  const entities=[];

  function isoDepth(col,row){
    const p=toIso(col,row);
    return p.y;
  }

  // Furniture from editable layout (skip wall-mounted: led, tft)
  for(const item of shopLayout){
    if(item.type==='led'||item.type==='tft') continue;
    const d=item.type==='rug'?-999:isoDepth(item.col,item.row+1);
    entities.push({type:item.type,col:item.col,row:item.row,depth:d,layoutId:item.id,sx:item.sx||1,sy:item.sy||1});
  }

  // Staff — use their actual screen Y position for depth
  for(const s of G.staff){
    if(!s.hired) continue;
    entities.push({type:'staff',data:s,col:0,row:0,depth:s.y+27}); // feet Y
  }
  // Customers
  for(const c of G.custs){
    entities.push({type:'cust',data:c,col:0,row:0,depth:c.y+20}); // feet Y
  }

  // Sort by depth (lower screen Y = further back = drawn first)
  entities.sort((a,b)=>a.depth-b.depth);

  // Helper: draw furniture with scaleX/scaleY transform
  function drawScaled(e,fn){
    const scx=e.sx||1, scy=e.sy||1;
    if(scx===1&&scy===1){fn(e.col,e.row);return;}
    const p=toIso(e.col,e.row);
    cx.save();
    cx.translate(p.x,p.y);
    cx.scale(scx,scy);
    cx.translate(-p.x,-p.y);
    fn(e.col,e.row);
    cx.restore();
  }

  // Draw each entity
  for(const e of entities){
    switch(e.type){
      case 'counter': drawScaled(e,drawIsoCounter); break;
      case 'shelves': drawScaled(e,drawIsoShelves); break;
      case 'lottery': drawScaled(e,drawIsoLottery); break;
      case 'manager': drawScaled(e,drawIsoManager); break;
      case 'plant': drawScaled(e,drawIsoPlant); break;
      case 'floorLamp': drawScaled(e,drawIsoFloorLamp); break;
      case 'vending': drawScaled(e,drawIsoVending); break;
      case 'wineRack': drawScaled(e,drawIsoWineRack); break;
      case 'magazines': drawScaled(e,drawIsoMagazineRack); break;
      case 'rug': drawScaled(e,drawIsoRug); break;
      case 'djBooth': drawScaled(e,drawIsoDJBooth); break;
      case 'staff': drawIsoStaff(e.data); break;
      case 'cust': drawIsoCust(e.data); break;
    }
  }

  // ── GLASS DOOR — drawn LAST, always on top of furniture/characters ──
  drawGlassDoor();

  cx.restore(); // end clip
}

function drawXtancoLogo(x,y){
  // Small globe + XTANCO text centered at (x,y)
  const gr=5;
  cx.beginPath();cx.arc(x-10,y,gr,0,Math.PI*2);
  const grd=cx.createRadialGradient(x-12,y-2,1,x-10,y,gr);
  grd.addColorStop(0,'#88ddee');grd.addColorStop(0.5,'#4a99aa');grd.addColorStop(1,'#2a6677');
  cx.fillStyle=grd;cx.fill();cx.strokeStyle='#1a445588';cx.lineWidth=0.6;cx.stroke();
  cx.fillStyle='#1a4455';cx.font='bold 5px monospace';cx.textAlign='left';
  cx.fillText('XTANCO',x-3,y+2);
  cx.textAlign='left';
}

function drawGlassDoor(){
  // Door occupies right wall between row 2 and row 4
  const dt=toIso(ISO.cols,2);  // top corner (higher on screen)
  const dm=toIso(ISO.cols,3);  // middle (center divider)
  const db=toIso(ISO.cols,4);  // bottom corner (lower on screen)
  const doorH=ISO.wallH*0.75;
  // Sliding animation
  const doorAmt=G&&G.doorOpen>0?Math.min(1,G.doorOpen>40?1:(G.doorOpen/40)):0;
  // Slide direction follows the wall diagonal
  const sdx=(dm.x-dt.x)*doorAmt*0.35;
  const sdy=(dm.y-dt.y)*doorAmt*0.35;
  // ── DOOR FRAME (dark wood) ──
  cx.fillStyle='#4a3018';
  // Frame outline
  cx.strokeStyle='#3a2010';cx.lineWidth=3;
  cx.beginPath();
  cx.moveTo(dt.x,dt.y);cx.lineTo(db.x,db.y);
  cx.lineTo(db.x,db.y-doorH);cx.lineTo(dt.x,dt.y-doorH);
  cx.closePath();cx.stroke();
  // Center bar (horizontal divider between two panels)
  cx.lineWidth=2.5;
  cx.beginPath();cx.moveTo(dm.x,dm.y);cx.lineTo(dm.x,dm.y-doorH);cx.stroke();
  // ── TOP PANEL (row 2→3, slides toward center when open) ──
  cx.globalAlpha=0.5;
  cx.fillStyle='#88bbdd';
  cx.beginPath();
  cx.moveTo(dt.x+sdx,dt.y+sdy);         // top-right + slide
  cx.lineTo(dm.x,dm.y);                   // center (fixed)
  cx.lineTo(dm.x,dm.y-doorH);             // center top (fixed)
  cx.lineTo(dt.x+sdx,dt.y-doorH+sdy);     // top-right top + slide
  cx.closePath();cx.fill();
  cx.strokeStyle='#5a4a3844';cx.lineWidth=0.5;cx.stroke();
  // Logo on top panel
  const t1cx=(dt.x+sdx+dm.x)/2;
  const t1cy=((dt.y+sdy+dm.y)/2)-doorH*0.4;
  drawXtancoLogo(t1cx,t1cy);
  // ── BOTTOM PANEL (row 3→4, slides toward center when open) ──
  cx.fillStyle='#7aaacc';
  cx.beginPath();
  cx.moveTo(db.x-sdx,db.y-sdy);           // bottom-left - slide
  cx.lineTo(dm.x,dm.y);                    // center (fixed)
  cx.lineTo(dm.x,dm.y-doorH);              // center top (fixed)
  cx.lineTo(db.x-sdx,db.y-doorH-sdy);      // bottom-left top - slide
  cx.closePath();cx.fill();
  cx.strokeStyle='#5a4a3844';cx.lineWidth=0.5;cx.stroke();
  // Logo on bottom panel
  const b1cx=(db.x-sdx+dm.x)/2;
  const b1cy=((db.y-sdy+dm.y)/2)-doorH*0.4;
  drawXtancoLogo(b1cx,b1cy);
  cx.globalAlpha=1;
  // OPEN sign (only when closed)
  if(doorAmt<0.3){
    const oCx=(dt.x+db.x)/2, oCy=(dt.y+db.y)/2-doorH*0.2;
    tx('OPEN',oCx,oCy,'#2a664466',8,'center');
  }
}

// ── LED DISPLAY (on LEFT WALL, middle height) ────────────────
// ── UNIFIED LED BANNER (back wall + left wall as one continuous strip) ──
// Text scrolls right-to-left across back wall, wraps around corner, continues down left wall.
// Both segments share a single offset so text flows seamlessly.
let ledUnifiedOffset=0;

function _getLedParams(){
  const msgs=T().ledMsgs;
  const currentVideoMsg=(dsMode==='video' && videoPlaying && !videoPaused)
    ? (VIDEO_LED_MESSAGES[VIDEO_LIST[dsVideoIdx]] || `  ◆  VISITAS: AHORA SUENA ${VIDEO_LIST[dsVideoIdx].toUpperCase()}  ◆  `)
    : '';
  const liveData=(state===S.GAME||state===S.PAUSE)
    ? `  ◈  ${T().customers}: ${G?G.customersToday:0}  ◈  ${T().satisfaction}: ${G?(G.satisfaction|0):0}%  ◈  ${T().fame}: ${G?(G.fame|0):0}%  ◈  `
    : '  ◈  ';
  const fullMsg=currentVideoMsg+msgs.join('   ◆   ')+liveData;
  cx.font='bold 9px monospace';
  const msgW=cx.measureText(fullMsg).width;
  return {fullMsg, msgW};
}

// Draw one LED segment. p1→p2 must go LEFT-to-RIGHT (increasing screen X) so text reads correctly.
function _drawLedSegment(p1x,p1y,p2x,p2y,lh,scrollStart,totalLen,fullMsg,msgW){
  cx.save();
  const angle=Math.atan2(p2y-p1y,p2x-p1x);
  const segLen=Math.sqrt((p2x-p1x)**2+(p2y-p1y)**2);
  cx.translate(p1x,p1y);
  cx.rotate(angle);
  // LED body — flush at wall top (no gap)
  r(0,0,segLen,lh,'#1a1408');
  rx(0,0,segLen,lh,'#8a7a50',1);
  // LED dot grid
  cx.globalAlpha=0.04;
  for(let dx=2;dx<segLen-2;dx+=4)
    for(let dy=2;dy<lh-2;dy+=4)
      r(dx,dy,2,2,'#ffaa00');
  cx.globalAlpha=1;
  // Clip text to segment
  cx.beginPath();cx.rect(2,1,segLen-4,lh-2);cx.clip();
  const pulse=0.7+0.3*Math.sin(tt*0.04);
  cx.fillStyle=`rgba(255,${160+(80*pulse)|0},0,1)`;
  cx.font='bold 9px monospace';cx.textAlign='left';
  // Text position: scrolls right-to-left within the combined strip
  const textX=totalLen-ledUnifiedOffset-scrollStart;
  for(let copy=-2;copy<=3;copy++){
    cx.fillText(fullMsg,textX+copy*(msgW+80),12);
  }
  cx.restore();
}

function drawLED(scx,scy){
  scx=scx||1;scy=scy||1;
  const lh=Math.round(16*scy);
  const {fullMsg, msgW}=_getLedParams();

  // Back wall: LEFT to RIGHT (low cols → high cols) = increasing screen X
  const bL=toIso(-0.5,0);   // left end of back wall
  const bR=toIso(ISO.cols+0.5,0); // right end of back wall
  const backLen=Math.sqrt((bR.x-bL.x)**2+(bR.y-bL.y)**2);

  // Left wall: TOP to BOTTOM (low rows → high rows) = LEFT going down in iso
  // In screen coords: toIso(0,0) is top-right, toIso(0,rows) is bottom-left
  // So we go from bottom-left to top-right (increasing X) for readable text
  const lB=toIso(0,ISO.rows+1); // bottom of left wall (screen-left)
  const lT=toIso(0,-0.5);       // top of left wall (screen-right)
  const leftLen=Math.sqrt((lT.x-lB.x)**2+(lT.y-lB.y)**2);

  const totalLen=leftLen+backLen;
  ledUnifiedOffset=(ledUnifiedOffset+0.7)%(msgW+80);

  // Left wall LED sits ABOVE wall top edge (raised so it doesn't cover clock)
  const lwLedY=-ISO.wallH-lh;
  _drawLedSegment(
    lB.x, lB.y+lwLedY,
    lT.x, lT.y+lwLedY,
    lh, 0, totalLen, fullMsg, msgW
  );

  // Back wall LED sits ABOVE wall top edge
  _drawLedSegment(
    bL.x, bL.y-ISO.wallH-lh,
    bR.x, bR.y-ISO.wallH-lh,
    lh, leftLen, totalLen, fullMsg, msgW
  );
}

// ── ALTADIS TFT (big screen below LED, centered on left wall) ─
function drawAltadisTFT(){
  // Draw as a flat parallelogram on the BACK WALL (row=0), above 2nd window (col~6), 16:9
  cx.save();
  // Clip to back wall area
  const bwClipPts=[];
  for(let cc=0;cc<=ISO.cols+4;cc++) bwClipPts.push(toIso(cc,0));
  cx.beginPath();
  cx.moveTo(bwClipPts[0].x,bwClipPts[0].y-ISO.wallH);
  for(let i=1;i<bwClipPts.length;i++) cx.lineTo(bwClipPts[i].x,bwClipPts[i].y-ISO.wallH);
  for(let i=bwClipPts.length-1;i>=0;i--) cx.lineTo(bwClipPts[i].x,bwClipPts[i].y);
  cx.closePath();cx.clip();
  // Screen spans cols 5.0 to 9.0 on back wall — reduced size per user request
  const pL=toIso(5.0,0);
  const pR=toIso(9.0,0);
  // 16:9 aspect ratio: height = width * 9/16, adjusted for wall perspective
  const screenW=pR.x-pL.x;
  const screenH16x9=screenW*9/16;
  // Position screen filling most of wall height, just below LED
  const wallTopY=pL.y-ISO.wallH;
  const screenTopY=wallTopY+ISO.wallH*0.02; // 2% from top (flush with LED)
  // Bezel corners (outer frame) — flat on back wall (same Y for left and right)
  const wallSlope=(pR.y-pL.y)/(pR.x-pL.x); // back wall angle
  const bzTL={x:pL.x, y:screenTopY};
  const bzTR={x:pR.x, y:screenTopY+(pR.y-pL.y)};
  const bzBL={x:pL.x, y:screenTopY+screenH16x9};
  const bzBR={x:pR.x, y:screenTopY+screenH16x9+(pR.y-pL.y)};
  // Draw bezel (black parallelogram)
  cx.beginPath();
  cx.moveTo(bzTL.x,bzTL.y);cx.lineTo(bzTR.x,bzTR.y);
  cx.lineTo(bzBR.x,bzBR.y);cx.lineTo(bzBL.x,bzBL.y);
  cx.closePath();cx.fillStyle='#1a1a1a';cx.fill();
  cx.strokeStyle='#333';cx.lineWidth=1;cx.stroke();
  // Screen corners (inner, with padding from bezel)
  // Interpolate inward by ~8% on each edge
  const pad=0.08;
  const tl={
    x:bzTL.x+(bzTR.x-bzTL.x)*pad+(bzBL.x-bzTL.x)*pad,
    y:bzTL.y+(bzTR.y-bzTL.y)*pad+(bzBL.y-bzTL.y)*pad
  };
  const tr={
    x:bzTR.x-(bzTR.x-bzTL.x)*pad+(bzBR.x-bzTR.x)*pad,
    y:bzTR.y-(bzTR.y-bzTL.y)*pad+(bzBR.y-bzTR.y)*pad
  };
  const bl={
    x:bzBL.x+(bzBR.x-bzBL.x)*pad-(bzBL.x-bzTL.x)*pad,
    y:bzBL.y+(bzBR.y-bzBL.y)*pad-(bzBL.y-bzTL.y)*pad
  };
  const br={
    x:bzBR.x-(bzBR.x-bzBL.x)*pad-(bzBR.x-bzTR.x)*pad,
    y:bzBR.y-(bzBR.y-bzBL.y)*pad-(bzBR.y-bzTR.y)*pad
  };
  // Screen fill (dark blue)
  cx.beginPath();
  cx.moveTo(tl.x,tl.y);cx.lineTo(tr.x,tr.y);
  cx.lineTo(br.x,br.y);cx.lineTo(bl.x,bl.y);
  cx.closePath();cx.fillStyle='#001833';cx.fill();
  // Clip + affine transform: virtual 160×90 (16:9) → screen parallelogram
  cx.save();
  cx.beginPath();
  cx.moveTo(tl.x,tl.y);cx.lineTo(tr.x,tr.y);
  cx.lineTo(br.x,br.y);cx.lineTo(bl.x,bl.y);
  cx.closePath();cx.clip();
  const vW=160,vH=90;
  const ax=(tr.x-tl.x)/vW, ay=(tr.y-tl.y)/vW;
  const bx=(bl.x-tl.x)/vH, by=(bl.y-tl.y)/vH;
  cx.setTransform(ax,ay,bx,by,tl.x,tl.y);
  const cX=vW/2, cY=vH/2;
  const sH=vH;

  if(G&&G.tftParty>0){
    // ── PARTY!! on Admira screen — show DS artist ──
    const flash=Math.sin(tt*0.15)>0;
    cx.fillStyle=flash?'#ff22aa':'#aa1188';cx.fillRect(0,0,vW,vH);
    // Confetti
    for(let i=0;i<12;i++){
      const cx2=10+Math.random()*80,cy2=10+Math.random()*80;
      cx.fillStyle=['#ff0','#0ff','#f0f','#0f0','#f80','#08f'][i%6];
      cx.fillRect(cx2,cy2,4,4);
    }
    cx.textAlign='center';
    // Show current DS video artist name
    const dsArtist=VIDEO_LIST[dsVideoIdx]||'Fiesta';
    const dashIdx=dsArtist.indexOf(' - ');
    const artistName=dashIdx>0?dsArtist.substring(0,dashIdx):dsArtist;
    const songName=dashIdx>0?dsArtist.substring(dashIdx+3):'';
    cx.fillStyle='#ffee44';cx.font='bold 9px monospace';
    cx.fillText('Este video está patrocinado por...',cX,16);
    cx.fillStyle='#ffffff';cx.font='bold 16px monospace';
    cx.fillText(artistName,cX,40);
    if(songName){
      cx.fillStyle='#ffccee';cx.font='bold 12px monospace';
      cx.fillText(songName,cX,58);
    }
    cx.fillStyle='#fff';cx.font='10px monospace';
    cx.fillText('🎉🎊🎉',cX,78);
    cx.textAlign='left';
  } else if(G&&G.tftStockIdx>=0&&G.tftStockIdx<G.prods.length&&G.tftStockTimer>0){
    // ── ADMIRA: Product stock display (virtual 100x100 coords) ──

    const prod=G.prods[pi];

    cx.textAlign='center';
    // ADMIRA header
    cx.fillStyle='#ccaa44';cx.font='bold 8px monospace';

    // Stock bar
    cx.fillStyle='#1a1a2a';cx.fillRect(30,54,100,6);
    cx.fillStyle=stk>0.5?P.green:stk>0.2?P.yellow:P.red;cx.fillRect(30,54,100*stk,6);
    // Stock numbers
    cx.fillStyle='#ffffff';cx.font='10px monospace';
    cx.fillText(prod.stock+'/'+prod.max,cX,70);
    // Percentage
    cx.fillStyle=stk>0.5?'#66ee66':stk>0.2?'#eecc44':'#ee4444';

  } else if(G&&G.tftOgre>0){
    // ── OGRE PIXEL ART (Visita Delegación, virtual 100x100 coords) ──
    cx.fillStyle='#cc44aa';cx.fillRect(0,0,vW,vH);
    const ox=cX,oy=cY;

    // Legs (brown pants)

    r(ox+2*sc,oy+14*sc,6*sc,12*sc,'#8a6a30');
    // Boots
    cx.fillStyle='#3a2a18';
    r(ox-9*sc,oy+25*sc,7*sc,4*sc,'#3a2a18');
    r(ox+2*sc,oy+25*sc,7*sc,4*sc,'#3a2a18');

    r(ox-10*sc,oy-2*sc,5*sc,16*sc,'#6a4a28');
    r(ox+5*sc,oy-2*sc,5*sc,16*sc,'#6a4a28');
    // Belt
    r(ox-8*sc,oy+13*sc,16*sc,2*sc,'#5a3a18');
    // Arms (green skin)
    cx.fillStyle='#88aa22';
    r(ox-14*sc,oy+0*sc,5*sc,12*sc,'#88aa22');

let acOn=false; // AC state: true=on (green LED + wind), false=off (red LED)

function drawAirConditioning(){
  // Fixed position: top-left corner of the canvas, just below the HUD bars
  // This is where the user marked "Aire Acondicionado" in their screenshot
  const acX=8;    // left edge of canvas + small margin
  const acY=30;   // just below the second HUD bar, raised per user request

  const aw=80, ah=20;
  // Shadow behind unit
  r(acX+2,acY+2,aw,ah,'rgba(0,0,0,0.25)');
  // Main body (bright white)
  r(acX,acY,aw,ah,'#f0ece4');
  // Top edge highlight
  r(acX,acY,aw,3,'#e8e4d8');
  // Bottom vent grille
  for(let v=0;v<4;v++){
    r(acX+5,acY+ah-8+v*2,aw-10,1,'#c8c4b8');
  }
  // Border
  rx(acX,acY,aw,ah,'#aaa',1);
  // Status LED: green=on, red=off
  cx.fillStyle=acOn?'#22cc22':'#cc2222';
  cx.beginPath();cx.arc(acX+aw-8,acY+6,2,0,Math.PI*2);cx.fill();
  // Brand label
  cx.fillStyle='#888';cx.font='bold 5px monospace';cx.textAlign='left';
  cx.fillText('DAIKIN',acX+5,acY+9);

  // Clickable area for mouse toggle
  BTNS['acToggle']={x:acX,y:acY,w:aw,h:ah};

  // ── Wind animation (when AC is ON) — 5s on, 5s off cycle, very slow ──
  if(acOn){
    const acCycle=tt%600; // 600 frames = 10s total (5s on + 5s off at ~60fps)
    if(acCycle<300){ // first 5 seconds: show wind
      const windBase=acY+ah;
      const windMaxY=acY+ah+25; // limit so wind doesn't reach LED banner
      for(let i=0;i<8;i++){
        const wx=acX+8+i*9;
        const phase=(tt*0.008+i*1.1)%1;
        const wy=windBase+phase*25; // shorter range
        if(wy>windMaxY) continue; // clip before LED
        const sway=Math.sin(tt*0.006+i*2)*4;
        const len=Math.min(6+Math.sin(tt*0.01+i)*2, windMaxY-wy);
        const alpha=0.7*(1-phase);
        cx.globalAlpha=alpha;
        cx.strokeStyle='#ffffff';
        cx.lineWidth=2;
        cx.beginPath();
        cx.moveTo(wx+sway,wy);
        cx.lineTo(wx+sway,wy+len);
        cx.stroke();
        cx.strokeStyle='#eeeeff';
        cx.lineWidth=1;
        cx.beginPath();
        cx.moveTo(wx+sway+1,wy+1);
        cx.lineTo(wx+sway+1,wy+len-1);
        cx.stroke();
      }
      cx.globalAlpha=1;
    }
  }
  cx.textAlign='left';
}

let aromaOn=false; // Aromatizer state: false=off, true=on (diffusing particles)

function drawAromatizer(){
  // Position on back wall, right side past 2nd window (col ~12.5), low on wall
  const ap=toIso(12.5,0);
  const ax=ap.x, baseY=ap.y;
  const aw=16, ah=22;
  const ay=baseY-Math.floor(ISO.wallH*0.25); // low on wall, near baseboard

  // Shadow behind on wall
  r(ax+2,ay+2,aw,ah,'rgba(0,0,0,0.15)');

  // Main body (black)
  r(ax,ay,aw,ah,'#1a1a1a');
  // Top cap (dark gray, rounded top)
  r(ax,ay,aw,4,'#333');
  r(ax+1,ay-1,aw-2,2,'#444');
  // Blue accent line
  r(ax+2,ay+3,aw-4,1,'#3388cc');
  // USB-C port top-right
  r(ax+aw-5,ay+1,3,1.5,'#222');
  // Play button circle in center
  cx.strokeStyle='#555';cx.lineWidth=0.5;
  cx.beginPath();cx.arc(ax+aw/2,ay+ah*0.4,3,0,Math.PI*2);cx.stroke();
  // Play triangle
  cx.fillStyle='#555';cx.beginPath();
  cx.moveTo(ax+aw/2-1,ay+ah*0.4-2);cx.lineTo(ax+aw/2-1,ay+ah*0.4+2);
  cx.lineTo(ax+aw/2+2,ay+ah*0.4);cx.closePath();cx.fill();
  // Diamond grille at bottom
  cx.globalAlpha=0.4;
  for(let gy=0;gy<4;gy++){
    for(let gx=0;gx<3;gx++){
      const px=ax+3+gx*4+(gy%2)*2;
      const py=ay+ah-10+gy*2.5;
      cx.fillStyle='#333';
      cx.beginPath();
      cx.moveTo(px,py-1);cx.lineTo(px+1,py);cx.lineTo(px,py+1);cx.lineTo(px-1,py);
      cx.closePath();cx.fill();
    }
  }
  cx.globalAlpha=1;
  // Status LED
  cx.fillStyle=aromaOn?'#22cc22':'#cc2222';
  cx.beginPath();cx.arc(ax+aw/2,ay+6,1.5,0,Math.PI*2);cx.fill();
  // Border
  rx(ax,ay,aw,ah,'#333',1);
  // Label
  cx.fillStyle='#555';cx.font='bold 3px monospace';cx.textAlign='center';
  cx.fillText('AROMA',ax+aw/2,ay+ah-1);
  cx.textAlign='left';

  // Clickable area
  BTNS['aromaToggle']={x:ax,y:ay,w:aw,h:ah};

  // ── Scent waves (when ON) — 5s on, 5s off cycle, very slow ──
  if(aromaOn){
    const aromaCycle=(tt+150)%600; // 600 frames = 10s total (5s on + 5s off), offset 2.5s
    if(aromaCycle<300){ // first 5 seconds: show waves
      const waveX=ax+aw/2;
      const waveBase=ay-3;
      for(let i=0;i<5;i++){
        const phase=(tt*0.004+i*0.7)%1; // very slow
        const wy=waveBase-phase*40;
        const wSize=5+phase*14;
        const alpha=0.75*(1-phase);
        cx.globalAlpha=alpha;
        cx.strokeStyle='#cc66ff';
        cx.lineWidth=2;
        cx.beginPath();
        cx.arc(waveX,wy,wSize,Math.PI*1.15,Math.PI*1.85);
        cx.stroke();
        cx.strokeStyle='#ee88ff';
        cx.lineWidth=1;
        cx.beginPath();
        cx.arc(waveX,wy-1,wSize*0.8,Math.PI*1.2,Math.PI*1.8);
        cx.stroke();
      }
      for(let i=0;i<8;i++){
        const phase=(tt*0.003+i*0.9)%1; // very slow
        const px=waveX+Math.sin(tt*0.005+i*2.2)*8;
        const py=waveBase-phase*45;
        const sz=1.2+Math.sin(tt*0.005+i)*0.5;
        const alpha=0.6*(1-phase);
        cx.globalAlpha=alpha;
        cx.fillStyle=i%2===0?'#bb55ee':'#88ddaa';
        cx.beginPath();cx.arc(px,py,sz,0,Math.PI*2);cx.fill();
      }
      cx.globalAlpha=1;
    }
  }
}

// Clock time derived from game time (not real time)
let _clockH=9,_clockM=0;

function drawWallClock(){
  // Position: centered on left wall, just below the LED banner
  const cp=toIso(0,3);
  const clockX=cp.x;
  const clockY=cp.y-ISO.wallH+22; // higher up, closer to wall top edge
  const radius=14;
  cx.save();
  // Clip to left wall
  const wallClipPts=[];
  for(let rr=0;rr<=ISO.rows;rr++) wallClipPts.push(toIso(0,rr));
  cx.beginPath();
  cx.moveTo(wallClipPts[0].x,wallClipPts[0].y-ISO.wallH);
  for(let i=1;i<wallClipPts.length;i++) cx.lineTo(wallClipPts[i].x,wallClipPts[i].y-ISO.wallH);
  for(let i=wallClipPts.length-1;i>=0;i--) cx.lineTo(wallClipPts[i].x,wallClipPts[i].y);
  cx.closePath();cx.clip();
  // Clock face
  cx.beginPath();cx.arc(clockX,clockY,radius+2,0,Math.PI*2);
  cx.fillStyle='#3a3028';cx.fill();
  cx.beginPath();cx.arc(clockX,clockY,radius,0,Math.PI*2);
  cx.fillStyle='#f8f4ee';cx.fill();
  cx.strokeStyle='#5a4a30';cx.lineWidth=1.5;cx.stroke();
  // Hour markers
  for(let i=0;i<12;i++){
    const a=i*Math.PI/6-Math.PI/2;
    const r1=radius-3, r2=radius-1;
    cx.strokeStyle=i%3===0?'#2a2018':'#8a7a60';
    cx.lineWidth=i%3===0?1.5:0.8;
    cx.beginPath();
    cx.moveTo(clockX+Math.cos(a)*r1,clockY+Math.sin(a)*r1);
    cx.lineTo(clockX+Math.cos(a)*r2,clockY+Math.sin(a)*r2);
    cx.stroke();
  }
  // Hour hand (cached, only moves each minute)
  const ha=_clockH*Math.PI/6+_clockM*Math.PI/360-Math.PI/2;
  cx.strokeStyle='#2a1a08';cx.lineWidth=2;cx.lineCap='round';
  cx.beginPath();cx.moveTo(clockX,clockY);
  cx.lineTo(clockX+Math.cos(ha)*(radius*0.5),clockY+Math.sin(ha)*(radius*0.5));
  cx.stroke();
  // Minute hand (cached, only moves each minute)
  const ma=_clockM*Math.PI/30-Math.PI/2;
  cx.strokeStyle='#2a1a08';cx.lineWidth=1.2;
  cx.beginPath();cx.moveTo(clockX,clockY);
  cx.lineTo(clockX+Math.cos(ma)*(radius*0.75),clockY+Math.sin(ma)*(radius*0.75));
  cx.stroke();
  // Center pin
  cx.beginPath();cx.arc(clockX,clockY,1.5,0,Math.PI*2);
  cx.fillStyle='#2a1a08';cx.fill();
  cx.lineCap='butt';
  cx.restore();
}

function drawIsoFloorLamp(col,row){
  const p=toIso(col,row);
  const isOn=elgatoState.on;
  const intensity=G?G.lampIntensity/100:0; // 0.0→1.0

  // ── Halo de luz en el suelo (proporcional a intensidad) ──
  if(isOn&&intensity>0){
    cx.globalAlpha=(0.03+0.12*intensity)+0.02*Math.sin(tt*0.04);
    const haloR=12+18*intensity;
    cx.beginPath();cx.ellipse(p.x,p.y+5,haloR,haloR*0.5,0,0,Math.PI*2);
    cx.fillStyle='#ffee66';cx.fill();
    cx.globalAlpha=1;
  }

  drawIsoShadow(p.x,p.y+4,6,3);

  // Base
  cx.beginPath();cx.ellipse(p.x,p.y+2,6,3,0,0,Math.PI*2);
  cx.fillStyle='#3a3028';cx.fill();
  // Pole
  const poleLight=isOn?Math.floor(60+intensity*20):40;
  r(p.x-1,p.y-50,2,52,`rgb(${poleLight+10},${poleLight},${poleLight-10})`);
  r(p.x,p.y-50,1,52,`rgb(${poleLight+20},${poleLight+10},${poleLight})`);

  if(isOn&&intensity>0){
    // ── Halo vertical (crece con intensidad) ──
    cx.globalAlpha=(0.04+0.12*intensity)+0.02*Math.sin(tt*0.05);
    cx.beginPath();cx.ellipse(p.x,p.y-25,10+8*intensity,20+20*intensity,0,0,Math.PI*2);
    cx.fillStyle='#ffee44';cx.fill();
    cx.globalAlpha=1;
    // Pantalla (más brillante con intensidad)
    const shadeR=Math.floor(200+55*intensity),shadeG=Math.floor(190+50*intensity),shadeB=Math.floor(140+60*intensity);
    cx.beginPath();
    cx.moveTo(p.x-10,p.y-48);cx.lineTo(p.x+10,p.y-48);
    cx.lineTo(p.x+6,p.y-60);cx.lineTo(p.x-6,p.y-60);
    cx.closePath();
    cx.fillStyle=`rgb(${shadeR},${shadeG},${shadeB})`;cx.fill();
    cx.strokeStyle=`rgba(238,221,136,${0.3+intensity*0.7})`;cx.lineWidth=1;cx.stroke();
    // Bombilla (tamaño proporcional)
    const bulbR=2+2*intensity;
    cx.beginPath();cx.arc(p.x,p.y-52,bulbR,0,Math.PI*2);
    cx.fillStyle=`rgba(255,255,136,${0.4+intensity*0.6})`;cx.fill();
    // Resplandor
    cx.globalAlpha=0.15+0.3*intensity;
    cx.beginPath();cx.arc(p.x,p.y-52,bulbR+3+2*intensity,0,Math.PI*2);
    cx.fillStyle='#ffee66';cx.fill();
    cx.globalAlpha=1;
    // Borde superior
    r(p.x-6,p.y-61,12,2,`rgba(238,221,136,${0.3+intensity*0.7})`);
  } else {
    // ── APAGADA ──
    cx.beginPath();
    cx.moveTo(p.x-10,p.y-48);cx.lineTo(p.x+10,p.y-48);
    cx.lineTo(p.x+6,p.y-60);cx.lineTo(p.x-6,p.y-60);
    cx.closePath();
    cx.fillStyle='#7a7068';cx.fill();
    cx.strokeStyle='#5a5850';cx.lineWidth=0.8;cx.stroke();
    cx.beginPath();cx.arc(p.x,p.y-52,2,0,Math.PI*2);
    cx.fillStyle='#5a5850';cx.fill();
    r(p.x-6,p.y-61,12,2,'#5a5850');
  }

  // Clickable area
  BTNS['lampToggle']={x:p.x-14,y:p.y-64,w:28,h:70};
}

// ── DJ BOOTH (mesa de DJ) ────────────────────────────────────
function drawIsoDJBooth(col,row){
  const boothH=26;
  const djOn=G&&G.staff&&G.staff.some(s=>s.hired&&s.role===4);
  const party=G&&G.tftParty>0;

  // Base: matte black with subtle neon edge
  drawIsoBlock(col,row,2,1,boothH,'#2a2a3a','#14141e','#1e1e2c',null);

  // LED strip along front isometric edge
  const eFront0=toIso(col,row), eFront1=toIso(col+2,row);
  const ledCol=party?['#ff44cc','#44ffcc','#ffcc44','#cc44ff'][Math.floor(tt/8)%4]:djOn?'#4466ff':'#333355';
  if(djOn){glow(ledCol,party?16:6);}
  cx.strokeStyle=ledCol;cx.lineWidth=2;
  cx.beginPath();cx.moveTo(eFront0.x,eFront0.y);cx.lineTo(eFront1.x,eFront1.y);cx.stroke();
  nog();

  // ── Vinyl platters (draws ON the table surface) ──
  function _vinyl(px,py,spinDir,labelCol){
    const R=14, scaleY=0.52;
    const spin=djOn?tt*0.055*spinDir:0;
    cx.save();cx.translate(px,py-boothH);cx.scale(1,scaleY);
    // Outer rim
    cx.beginPath();cx.arc(0,0,R,0,Math.PI*2);
    cx.fillStyle='#111418';cx.fill();
    cx.strokeStyle='#444';cx.lineWidth=1.5;cx.stroke();
    // Grooves — alternate dark rings
    for(let g=3;g<=R-2;g+=2){
      cx.beginPath();cx.arc(0,0,g,0,Math.PI*2);
      cx.strokeStyle=g%4===1?'#1e1e24':'#252530';cx.lineWidth=0.8;cx.stroke();
    }
    // Spinning shine highlight (white arc that sweeps)
    cx.save();cx.rotate(spin);
    cx.beginPath();cx.arc(0,0,R-2,0.2,1.1);
    cx.strokeStyle='#ffffff22';cx.lineWidth=2;cx.stroke();
    cx.restore();
    // Center label (spinning sticker)
    cx.save();cx.rotate(spin);
    cx.beginPath();cx.arc(0,0,5,0,Math.PI*2);
    cx.fillStyle=labelCol;cx.fill();
    cx.strokeStyle='#ffffff44';cx.lineWidth=0.5;cx.stroke();
    // Label line detail
    cx.strokeStyle='#ffffff55';cx.lineWidth=0.8;
    cx.beginPath();cx.moveTo(-4,0);cx.lineTo(4,0);cx.stroke();
    cx.restore();
    // Center hole
    cx.beginPath();cx.arc(0,0,1.2,0,Math.PI*2);
    cx.fillStyle='#222';cx.fill();
    // Tonearm (pivot at top-right, needle touching groove)
    const armAngle=djOn?-0.55+Math.sin(tt*0.008)*0.08:-0.7;
    cx.save();cx.rotate(armAngle);
    // Pivot cap
    cx.beginPath();cx.arc(R+1,-R+1,2,0,Math.PI*2);
    cx.fillStyle='#778899';cx.fill();
    // Arm rod
    cx.strokeStyle='#99aabb';cx.lineWidth=1.2;
    cx.beginPath();cx.moveTo(R+1,-R+1);cx.lineTo(0,R-3);cx.stroke();
    // Needle head
    cx.fillStyle='#bbccdd';
    cx.beginPath();cx.arc(0,R-3,1.8,0,Math.PI*2);cx.fill();
    cx.restore();
    cx.restore();
  }

  const lt=toIso(col+0.5,row+0.28);
  _vinyl(lt.x,lt.y,1,'#cc2233');
  const rt2=toIso(col+1.5,row+0.28);
  _vinyl(rt2.x,rt2.y,-1,'#2244cc');

  // ── Central mixer ──
  const mc=toIso(col+1,row+0.52);
  const mx2=mc.x,my2=mc.y-boothH;
  r(mx2-9,my2-7,18,11,'#1a1a24');rx(mx2-9,my2-7,18,11,'#333355',1);
  // 3 channel faders
  for(let i=0;i<3;i++){
    const fx=mx2-5+i*5;
    r(fx,my2-6,2,9,'#2a2a3a');
    const faderY=my2-5+Math.sin(tt*0.03+i*1.1)*(djOn?1.5:0);
    r(fx-1,faderY|0,4,2,'#aabbdd');
  }
  // EQ knobs (3 dots top)
  ['#ff4455','#44ff88','#4488ff'].forEach((kc,i)=>{
    cx.beginPath();cx.arc(mx2-4+i*4,my2-10,1.5,0,Math.PI*2);
    cx.fillStyle=djOn?kc:'#333';cx.fill();
    if(djOn){glow(kc,4);cx.fill();nog();}
  });

  // ── Headphones on right side ──
  const hp=toIso(col+2.1,row+0.25);
  cx.strokeStyle='#778899';cx.lineWidth=1.5;
  cx.beginPath();cx.arc(hp.x,hp.y-boothH-3,4,Math.PI,0,false);cx.stroke();
  r(hp.x-5,hp.y-boothH-4,2,4,'#556677');r(hp.x+3,hp.y-boothH-4,2,4,'#556677');

  // ── "DJ" on front face (grey letters centered on the visible panel) ──
  const fmx=(eFront0.x+eFront1.x)/2;
  const fmy=(eFront0.y+eFront1.y)/2-boothH/2+3;
  if(djOn){glow('#4466ff',8);}
  cx.font='bold 9px monospace';cx.textAlign='center';
  cx.fillStyle=djOn?'#99aacc':'#778899';
  cx.fillText('DJ',fmx,fmy);
  nog();

  // ── Party light cone ──
  if(party){
    const pl=toIso(col+1,row+0.5);
    const pCol=['#ff44cc','#44ffcc','#ffcc44','#cc44ff'][Math.floor(tt/12)%4];
    cx.globalAlpha=0.18+0.12*Math.abs(Math.sin(tt*0.15));
    glow(pCol,20);
    cx.beginPath();cx.arc(pl.x,pl.y-boothH-30,22,0,Math.PI*2);cx.fillStyle=pCol;cx.fill();
    nog();cx.globalAlpha=1;
  }
}

// ── MAGAZINE RACK (revistero) ────────────────────────────────
function drawIsoMagazineRack(col,row){
  const hw=ISO.tileW/2, hh=ISO.tileH/2;
  const p0=toIso(col,row);
  const p=toIso(col+1,row+0.5);
  const rackH=42;
  const magColors=['#dd3333','#3366cc','#33aa55','#dd8822','#cc33aa','#4488aa','#ddcc22','#ee5566','#3388bb'];
  // Rack frame
  drawIsoBlock(col,row,2,1,rackH,'#c8c0b0','#8a8478','#a09890',null);
  // ── RIGHT FACE: magazine spines (lomos) on isometric right face ──
  // Right face corners: top-front, top-back, bottom-back, bottom-front
  const rTF={x:p0.x+2*hw, y:p0.y+2*hh-rackH};       // top front
  const rTB={x:p0.x+2*hw-hw, y:p0.y+2*hh+hh-rackH};  // top back
  const rBF={x:p0.x+2*hw, y:p0.y+2*hh};               // bottom front
  const rBB={x:p0.x+2*hw-hw, y:p0.y+2*hh+hh};         // bottom back
  for(let shelf=0;shelf<3;shelf++){
    const t0=shelf/3, t1=(shelf+1)/3;
    // Top and bottom edges of this shelf band
    const sTopF={x:rTF.x,y:rTF.y+(rBF.y-rTF.y)*t0};
    const sTopB={x:rTB.x,y:rTB.y+(rBB.y-rTB.y)*t0};
    const sBotF={x:rTF.x,y:rTF.y+(rBF.y-rTF.y)*t1};
    const sBotB={x:rTB.x,y:rTB.y+(rBB.y-rTB.y)*t1};
    const shH=sBotF.y-sTopF.y;
    // Draw 5 spines per shelf as parallelograms following the wall
    for(let i=0;i<5;i++){
      const f0=i/5, f1=(i+1)/5;
      const mc=magColors[(shelf*5+i)%magColors.length];
      // Interpolate position along back edge
      const x0=sTopF.x+(sTopB.x-sTopF.x)*f0, y0=sTopF.y+(sTopB.y-sTopF.y)*f0;
      const x1=sTopF.x+(sTopB.x-sTopF.x)*f1, y1=sTopF.y+(sTopB.y-sTopF.y)*f1;
      cx.beginPath();
      cx.moveTo(x0,y0+2);
      cx.lineTo(x1,y1+2);
      cx.lineTo(x1,y1+shH-2);
      cx.lineTo(x0,y0+shH-2);
      cx.closePath();
      cx.fillStyle=mc;cx.fill();
      // Page edge highlight
      cx.fillStyle='#f0eee8';
      cx.beginPath();
      cx.moveTo(x0,y0+shH-3);cx.lineTo(x1,y1+shH-3);
      cx.lineTo(x1,y1+shH-2);cx.lineTo(x0,y0+shH-2);
      cx.closePath();cx.fill();
    }
    // Shelf divider line
    cx.strokeStyle='#6a6458';cx.lineWidth=1;
    cx.beginPath();cx.moveTo(sBotF.x,sBotF.y);cx.lineTo(sBotB.x,sBotB.y);cx.stroke();
  }
  // ── FRONT: magazine covers (on top face, visible from above) ──
  for(let row2=0;row2<3;row2++){
    const ry=p.y-14-row2*10;
    for(let i=0;i<4;i++){
      const mx=p.x-15+i*8;
      const mc=magColors[(row2*4+i)%magColors.length];
      r(mx,ry-6,7,8,mc);
      r(mx,ry+1,7,1,'#f0eee8');
      r(mx+1,ry-5,5,2,'#ffffff55');
      r(mx+1,ry-2,5,3,'#00000022');
    }
    cx.strokeStyle='#9a9488';cx.lineWidth=1;
    cx.beginPath();cx.moveTo(p.x-17,ry+2);cx.lineTo(p.x+17,ry+2);cx.stroke();
  }
  // Top label
  r(p.x-12,p.y-46,24,7,'#f0e8d0');
  tx('PRENSA',p.x,p.y-41,'#3a3a5a',6,'center');
}

// ── DRAW STAFF (ISOMETRIC) ───────────────────────────────────
function drawIsoStaff(s){
  const dir=s.dir||1;
  const isPlayer=G.staff&&s===G.staff[0];
  // Player indicator
  if(isPlayer){
    const bob=Math.sin(tt*0.08)*3;
    cx.globalAlpha=0.7+0.3*Math.sin(tt*0.06);
    tx('▼',s.x+7,s.y-18+bob,'#ee6622',10,'center');
    cx.globalAlpha=1;
  }
  // DJ scratch gesture: lean toward booth while scratching
  if(!isPlayer&&s.role===4&&s.djScratch>0){
    const phase=s.djScratch/30; // 1→0 as gesture completes
    const lean=Math.sin(phase*Math.PI)*8; // arc: lean out and back
    // booth is at col-1,row+1 from DJ → iso direction is (-40+(-40), 14+14) = left+down
    chibi(s.x-lean*0.7,s.y+lean*0.35,-1,s.shirt,s.hair,Math.floor(tt/3)%2,true,tt);
    // arm-reach arc drawn toward the booth surface
    cx.save();
    cx.globalAlpha=0.7*Math.sin(phase*Math.PI);
    cx.strokeStyle='#aabbdd';cx.lineWidth=1.2;
    cx.beginPath();
    cx.moveTo(s.x+7,s.y+10);
    cx.quadraticCurveTo(s.x-lean*0.5,s.y+lean*0.3+18,s.x-lean-8,s.y+lean*0.3+22);
    cx.stroke();
    cx.restore();
  } else {
  // Idle dance: employees dance to the music when not walking or busy
  const djHired=G&&G.staff&&G.staff.some(st=>st.hired&&st.role===4);
  const isIdle=!s.isWalking&&s.busy<=0;
  if(!isPlayer&&isIdle){
    // Faster + bigger bounce when DJ is active, subtle sway otherwise
    const spd=djHired?0.25:0.12;
    const amp=djHired?4:2;
    const bob=Math.sin(tt*spd+s.x*0.15)*amp;
    const jump=djHired?Math.abs(Math.sin(tt*0.18+s.x*0.1))*3:0;
    const fr=Math.floor(tt/(djHired?5:14))%2;
    chibi(s.x,s.y+bob-jump,dir,s.shirt,s.hair,fr,true,tt);
  } else if(isPlayer&&mgrDanceTimer>0){

    const bob=Math.sin(tt*0.3)*5;
    const jump=Math.abs(Math.sin(tt*0.2))*4;
    const sway=Math.sin(tt*0.15)*3;
    chibi(s.x+sway,s.y+bob-jump,Math.sin(tt*0.1)>0?1:-1,s.shirt,s.hair,Math.floor(tt/4)%2,true,tt);

  // Energy bar
  r(s.x-1,s.y+28,16,3,'#c0b8a0');

// ── LIGHT NOTIFICATIONS (Elgato + Hue) ────────────────────────
function drawElgatoNotify(){
  const showElgato=elgatoState.notify>0;
  const showHue=HUE.notify>0;
  if(!showElgato&&!showHue) return;
  const by=2,bh=24,gap=4;
  // Position from right edge
  let rx2=W-4; // right margin
  // Hue badge (rightmost)
  if(showHue){
    HUE.notify--;
    const alpha=Math.min(1,HUE.notify/25);
    cx.globalAlpha=alpha;
    if(HUE.error){
      const isHTTPS=location.protocol==='https:';
      const bw=isHTTPS?160:90;
      const bx=rx2-bw;
      r(bx,by,bw,bh,'#3a0a2a');rx(bx,by,bw,bh,'#cc33aa',1.5);
      tx(isHTTPS?'⚠ Hue: usar localhost:9124':'⚠ Hue offline',bx+bw/2,by+16,'#ff66cc',8,'center');
      rx2=bx-gap;
    } else if(HUE.on){
      const bw=80;const bx=rx2-bw;
      r(bx,by,bw,bh,'#2a1a3a');rx(bx,by,bw,bh,'#aa66cc',1.5);
      tx('🟣 Hue ON',bx+bw/2,by+16,'#cc99ff',9,'center');
      rx2=bx-gap;
    } else {
      const bw=80;const bx=rx2-bw;
      r(bx,by,bw,bh,'#0a0a1a');rx(bx,by,bw,bh,'#6644aa',1.5);
      tx('🟣 Hue OFF',bx+bw/2,by+16,'#8877aa',9,'center');
      rx2=bx-gap;
    }
    cx.globalAlpha=1;
  }
  // Elgato badge (left of Hue)
  if(showElgato){
    elgatoState.notify--;
    const alpha=Math.min(1,elgatoState.notify/25);
    cx.globalAlpha=alpha;
    const bw=100;const bx=rx2-bw;
    if(elgatoState.error){
      r(bx,by,bw,bh,'#4a0a0a');rx(bx,by,bw,bh,'#cc3333',1.5);
      tx('⚠ Elgato offline',bx+bw/2,by+16,'#ff6666',8,'center');
    } else if(elgatoState.on){
      r(bx,by,bw,bh,'#2a3a10');rx(bx,by,bw,bh,'#ccaa22',1.5);
      tx('💡 Elgato ON',bx+bw/2,by+16,'#ffee66',9,'center');
    } else {
      r(bx,by,bw,bh,'#0a0a2a');rx(bx,by,bw,bh,'#4466aa',1.5);
      tx('💡 Elgato OFF',bx+bw/2,by+16,'#8899cc',9,'center');
    }
    cx.globalAlpha=1;
  }
}

// Beep sound for save confirmation
function playSaveBeep(){
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    // Two-tone confirmation beep
    const o1=ac.createOscillator(),g1=ac.createGain();
    o1.type='sine';o1.frequency.value=880;
    g1.gain.setValueAtTime(0.15,ac.currentTime);
    g1.gain.exponentialRampToValueAtTime(0.01,ac.currentTime+0.15);
    o1.connect(g1);g1.connect(ac.destination);
    o1.start(ac.currentTime);o1.stop(ac.currentTime+0.15);
    const o2=ac.createOscillator(),g2=ac.createGain();
    o2.type='sine';o2.frequency.value=1320;
    g2.gain.setValueAtTime(0.15,ac.currentTime+0.12);
    g2.gain.exponentialRampToValueAtTime(0.01,ac.currentTime+0.3);
    o2.connect(g2);g2.connect(ac.destination);
    o2.start(ac.currentTime+0.12);o2.stop(ac.currentTime+0.3);
  }catch(e){}
}

// ── DEMO AUTO-PLAY LOGIC ──────────────────────────────────────
function demoUpdate(){
  if(!demoMode) return;
  demoTimer++;

  // Phase 1: Auto-start game from menu (first 3 seconds)
  if(state===S.MENU&&demoTimer>30){doAction('start');return;}
  if(state===S.MODEL_SEL){doAction('model0');return;}
  if(state===S.TUT){doAction('skipTut');return;}
  if(state!==S.GAME) return;

  // Every ~90 frames (~1.5 seconds) do an action
  if(demoTimer%90!==0) return;
  const phase=(demoTimer/90)|0;

  // Cycle through actions — simulate a full day
  const actions=[
    // Move manager around the shop
    ()=>{
      if(!G.staff||!G.staff[0]) return;
      const dirs=[[0,-1],[1,0],[0,1],[-1,0]];
      const d=dirs[phase%4];
      const s=G.staff[0];
      const nc=Math.max(0,Math.min(ISO.cols-1,s.gridCol+d[0]));
      const nr=Math.max(0,Math.min(ISO.rows-1,s.gridRow+d[1]));
      s.gridCol=nc;s.gridRow=nr;
      const p=toIso(nc,nr);s.x=p.x-7;s.y=p.y-20;
      s.dir=d[0]||s.dir;s.isWalking=true;s.aTimer=0;
    },
    // Open menu and browse tabs
    ()=>{
      if(!uiOpen){uiOpen=true;uiTab=0;}
      else{uiTab=(uiTab+1)%4;}
    },
    // Restock low products
    ()=>{
      for(let i=0;i<G.prods.length;i++){
        if(G.prods[i].stock<G.prods[i].max*0.5&&G.money>=CFG.RESTOCK_COST){
          doAction('rest'+i);return;
        }
      }
    },
    // Hire available staff
    ()=>{
      for(let i=1;i<G.staff.length;i++){
        if(!G.staff[i].hired&&G.money>=CFG.HIRE_COST[i]){
          doAction('hire'+i);return;
        }
      }
    },
    // Show product on Admira screen
    ()=>{
      G.tftStockIdx=phase%G.prods.length;
      G.tftStockTimer=150;
    },
    // Trigger visits
    ()=>{
      const v=['visitCom','visitTec','visitDel','visitGC'];
      doAction(v[phase%4]);
    },
    // Close menu
    ()=>{if(uiOpen) uiOpen=false;},
    // Move again
    ()=>{
      if(!G.staff||!G.staff[0]) return;
      const s=G.staff[0];
      const nc=Math.max(0,Math.min(ISO.cols-1,s.gridCol+1));
      s.gridCol=nc;
      const p=toIso(nc,s.gridRow);s.x=p.x-7;s.y=p.y-20;
      s.dir=1;s.isWalking=true;
    },
  ];
  actions[phase%actions.length]();
}

  const pct=Math.min(1,(elapsed-DEMO_IDLE_MS*0.5)/(DEMO_IDLE_MS*0.5));

function loop(){
  requestAnimationFrame(loop);
  tt++;

  // Always update HTML bar + video position first
  try{updateHtmlBar();}catch(e){}
  try{if(videoPlaying){updateVideoPosition();updateDSCanvases();}}catch(e){}

  // Auto-start game after 5 seconds idle on MENU — skip straight to game
  if(!demoMode&&state===S.MENU&&Date.now()-menuEnteredAt>=AUTOSTART_MS){
    lang=menuSel===0?'es':'en';modelSel=0;initGame();
    state=S.GAME;startVideo();startMusic();guidedTut={active:false,step:0,timer:0};
    menuEnteredAt=Date.now(); // prevent re-trigger
  }
  // Check idle → activate demo mode after 30 seconds from MENU only
  if(!demoMode&&state===S.MENU&&Date.now()-lastInput>DEMO_IDLE_MS){
    demoMode=true;demoTimer=0;
  }

  cx.clearRect(0,0,W,H);
  updateTransition();

  if(state===S.MENU){
    drawMenu();drawDemoCountdown();drawDemoBadge();
    if(demoMode) demoUpdate();
    drawTransition();return;
  }
  if(state===S.INTRO){drawIntro();drawTransition();return;}
  if(state===S.PLATFORM_SEL){drawPlatformSelect();drawTransition();return;}
  if(state===S.MODEL_SEL){drawModelSelect();drawDemoBadge();if(demoMode)demoUpdate();drawTransition();return;}
  if(state===S.TUT){drawTutorial();drawDemoBadge();if(demoMode)demoUpdate();drawTransition();return;}
  if(state===S.YEAR_END){drawYearEnd();drawTransition();return;}
  if(state===S.GAME_END){drawGameEnd();drawTransition();return;}
  if(state===S.EDITOR){drawEditor();drawTransition();return;}
  if(state===S.SETTINGS){drawSettings();drawTransition();return;}
  if(state===S.HELP){drawHelp();drawTransition();return;}
  if(state===S.PAUSE){
    r(0,0,W,H,P.bg);
    cx.save();try{drawCityBg();}catch(e){}cx.restore();
    cx.save();try{drawShop();}catch(e){}cx.restore();
    cx.save();try{drawShopChars();}catch(e){}cx.restore();
    cx.save();try{drawHUD();}catch(e){}cx.restore();
    cx.save();try{drawUI();}catch(e){}cx.restore();
    drawPause();drawTransition();return;
  }
  // GAME
  if(demoMode) demoUpdate();
  try{updateGame();}catch(e){}
  r(0,0,W,H,P.bg);
  // Each render wrapped in save/restore to prevent clip leaks on crash
  cx.save();try{drawCityBg();}catch(e){}cx.restore();
  cx.save();try{drawShop();}catch(e){}cx.restore();
  cx.save();try{drawShopChars();}catch(e){}cx.restore();
  cx.save();try{drawFloats();}catch(e){}cx.restore();
  cx.save();try{drawEvent();}catch(e){}cx.restore();
  cx.save();try{drawHUD();}catch(e){}cx.restore();
  cx.save();try{drawElgatoNotify();}catch(e){}cx.restore();
  cx.save();try{drawDemoBadge();}catch(e){}cx.restore();
  cx.save();try{drawUI();}catch(e){}cx.restore();
  cx.save();try{drawGuidedTut();}catch(e){}cx.restore();
  cx.save();try{drawMobileControls();}catch(e){}cx.restore();
  drawTransition();
}
loop();

        year: G.year,
        totalYears: CFG.TOTAL_YEARS,
        yearTarget: CFG.YEAR_TARGETS[G.year-1],
        yearRevenue: G.yearRevenue,
        satisfaction: G.satisfaction,
        fame: G.fame,
        storeLevel: G.storeLevel,
        customersToday: G.customersToday,
        nowPlaying: G.nowPlaying,
        state: state,
        staffCount: G.staff?G.staff.filter(s=>s.hired).length:0,
        staffTotal: G.staff?G.staff.length:0,
      }};
    },

    staff: function(){
      if(!G||!G.staff) return {ok:false,message:'No hay partida en curso'};
      return {ok:true, data: G.staff.map((s,i)=>({
        slot: i,
        name: s.name,
        role: ROLE_NAMES[s.role]||'desconocido',
        roleId: s.role,
        hired: s.hired,
        level: s.level||0,
        energy: s.energy||0,
        morale: s.morale||0,
        hireCost: CFG.HIRE_COST[s.role],
        trainCost: CFG.TRAIN_COST[s.role],
        salary: CFG.SALARY[s.role],
      }))};
    },

    stock: function(){
      if(!G||!G.prods) return {ok:false,message:'No hay partida en curso'};
      return {ok:true, data: G.prods.map((p,i)=>({
        slot: i,
        name: prodName(i),
        stock: p.stock,
        max: p.max,
        price: p.price,
        pct: Math.round(p.stock/p.max*100),
      }))};
    },

    // ── ACCIONES DIRECTAS ─────────────────────────────────────
    hire: function(slot){
      if(!G) return {ok:false,message:'No hay partida en curso'};
      if(slot<0||slot>=G.staff.length) return {ok:false,message:'Slot '+slot+' no existe (0-'+(G.staff.length-1)+')'};
      const s=G.staff[slot];
      if(s.hired) return {ok:false,message:s.name+' ya está contratado/a'};
      if(G.money<CFG.HIRE_COST[s.role]) return {ok:false,message:'No hay dinero suficiente (necesitas '+CFG.HIRE_COST[s.role]+'€, tienes '+Math.floor(G.money)+'€)'};
      doAction('hire'+slot);
      return {ok:true,message:'Contratado/a '+s.name+' ('+ROLE_NAMES[s.role]+') por '+CFG.HIRE_COST[s.role]+'€'};
    },

    train: function(slot){
      if(!G) return {ok:false,message:'No hay partida en curso'};
      if(slot<0||slot>=G.staff.length) return {ok:false,message:'Slot '+slot+' no existe'};
      const s=G.staff[slot];
      if(!s.hired) return {ok:false,message:s.name+' no está contratado/a'};
      if(s.level>=5) return {ok:false,message:s.name+' ya está al nivel máximo (5)'};
      if(G.money<CFG.TRAIN_COST[s.role]) return {ok:false,message:'No hay dinero suficiente (necesitas '+CFG.TRAIN_COST[s.role]+'€)'};
      doAction('train'+slot);
      return {ok:true,message:s.name+' entrenado/a a nivel '+(s.level)};
    },

    fire: function(slot){
      if(!G) return {ok:false,message:'No hay partida en curso'};
      if(slot<0||slot>=G.staff.length) return {ok:false,message:'Slot '+slot+' no existe'};
      if(slot===0) return {ok:false,message:'No puedes despedir al manager principal (slot 0)'};
      const s=G.staff[slot];
      if(!s.hired) return {ok:false,message:s.name+' no está contratado/a'};
      doAction('fire'+slot);
      return {ok:true,message:s.name+' despedido/a'};
    },

    restock: function(slot){
      if(!G) return {ok:false,message:'No hay partida en curso'};
      if(slot<0||slot>=G.prods.length) return {ok:false,message:'Producto '+slot+' no existe'};
      const p=G.prods[slot];
      if(p.stock>=p.max) return {ok:false,message:prodName(slot)+' ya está al máximo ('+p.max+')'};
      if(G.money<CFG.RESTOCK_COST) return {ok:false,message:'No hay dinero suficiente (necesitas '+CFG.RESTOCK_COST+'€)'};
      doAction('rest'+slot);
      return {ok:true,message:prodName(slot)+' repuesto a '+p.max+' unidades por '+CFG.RESTOCK_COST+'€'};
    },

    advertise: function(tier){
      if(!G) return {ok:false,message:'No hay partida en curso'};
      if(tier<0||tier>2) return {ok:false,message:'Tier debe ser 0 (básica), 1 (media) o 2 (premium)'};
      const ad=CFG.ADVERT[tier];
      if(G.money<ad.cost) return {ok:false,message:'No hay dinero suficiente (necesitas '+ad.cost+'€)'};
      doAction('adv'+tier);
      return {ok:true,message:'Publicidad '+ad.label+' lanzada por '+ad.cost+'€ (+'+ad.fame+' fama)'};
    },

    upgrade: function(){
      if(!G) return {ok:false,message:'No hay partida en curso'};
      if(G.storeLevel>=2) return {ok:false,message:'La tienda ya está al nivel máximo'};
      if(G.money<CFG.UPGRADE_COST) return {ok:false,message:'No hay dinero suficiente (necesitas '+CFG.UPGRADE_COST+'€)'};
      doAction('upgrade');
      return {ok:true,message:'Tienda mejorada a nivel 2 por '+CFG.UPGRADE_COST+'€'};
    },

    visit: function(type){
      if(!G) return {ok:false,message:'No hay partida en curso'};
      const valid=['Com','Tec','Del','GC'];
      const labels={Com:'Comercial',Tec:'Técnico',Del:'Delegación',GC:'Guardia Civil'};
      if(!valid.includes(type)) return {ok:false,message:'Tipo de visita no válido. Usa: Com, Tec, Del, GC'};
      doAction('visit'+type);
      return {ok:true,message:'Visita '+labels[type]+' activada'};
    },

    save: function(){
      doAction('save');
      return {ok:true,message:'Partida guardada'};
    },

    toggleMusic: function(){ doAction('musicToggle'); return {ok:true,message:'Música toggled'}; },
    nextTrack: function(){ doAction('musicNext'); return {ok:true,message:'Siguiente canción: '+(G?G.nowPlaying:'')}; },
    prevTrack: function(){ doAction('musicPrev'); return {ok:true,message:'Canción anterior: '+(G?G.nowPlaying:'')}; },
    toggleLamp: function(){ doAction('lampToggle'); return {ok:true,message:'Lámpara toggled'}; },

    // ── HELPERS POR NOMBRE ────────────────────────────────────
    hireByRole: function(roleName){
      if(!G) return {ok:false,message:'No hay partida en curso'};
      const rid = ROLE_LOOKUP[roleName.toLowerCase()];
      if(rid===undefined) return {ok:false,message:'Rol "'+roleName+'" no reconocido. Roles: cajero, repositor, azafata, manager, dj'};
      const slot = G.staff.findIndex(s=>!s.hired&&s.role===rid);
      if(slot===-1) return {ok:false,message:'No hay ningún '+roleName+' disponible para contratar'};
      return api.hire(slot);
    },

    hireByName: function(name){
      if(!G) return {ok:false,message:'No hay partida en curso'};
      const slot = G.staff.findIndex(s=>!s.hired&&s.name.toLowerCase()===name.toLowerCase());
      if(slot===-1) return {ok:false,message:'No se encontró a "'+name+'" entre el personal disponible'};
      return api.hire(slot);
    },

    restockByName: function(name){
      if(!G) return {ok:false,message:'No hay partida en curso'};
      const n=name.toLowerCase();
      const idx = G.prods.findIndex((_,i)=>prodName(i).toLowerCase().includes(n));
      if(idx===-1) return {ok:false,message:'Producto "'+name+'" no encontrado'};
      return api.restock(idx);
    },

    restockAll: function(){
      if(!G) return {ok:false,message:'No hay partida en curso'};
      const results=[];
      G.prods.forEach((p,i)=>{
        if(p.stock<p.max && G.money>=CFG.RESTOCK_COST){
          results.push(api.restock(i));
        }
      });
      if(results.length===0) return {ok:true,message:'No hay productos que reponer (o no hay dinero)'};
      return {ok:true,message:'Repuestos '+results.length+' productos',data:results};
    },

    hireAll: function(){
      if(!G) return {ok:false,message:'No hay partida en curso'};
      const results=[];
      G.staff.forEach((s,i)=>{
        if(!s.hired && G.money>=CFG.HIRE_COST[s.role]){
          results.push(api.hire(i));
        }
      });
      if(results.length===0) return {ok:true,message:'No hay personal para contratar (o no hay dinero)'};
      return {ok:true,message:'Contratados '+results.length+' empleados',data:results};
    },

    trainAll: function(){
      if(!G) return {ok:false,message:'No hay partida en curso'};
      const results=[];
      G.staff.forEach((s,i)=>{
        if(s.hired && s.level<5 && G.money>=CFG.TRAIN_COST[s.role]){
          results.push(api.train(i));
        }
      });
      if(results.length===0) return {ok:true,message:'No hay personal para entrenar (o no hay dinero)'};
      return {ok:true,message:'Entrenados '+results.length+' empleados',data:results};
    },

    // ── ATAJOS ────────────────────────────────────────────────
    hireDJ:       function(){ return api.hireByRole('dj'); },
    hireCashier:  function(){ return api.hireByRole('cajero'); },
    hireHostess:  function(){ return api.hireByRole('azafata'); },
    hireManager:  function(){ return api.hireByRole('manager'); },
    hireStorcker: function(){ return api.hireByRole('repositor'); },

    // ── AYUDA ─────────────────────────────────────────────────
    help: function(){
      return {ok:true,message:'xtAPI — Comandos disponibles',data:{
        consultas: ['status()','staff()','stock()'],
        acciones: ['hire(slot)','train(slot)','fire(slot)','restock(slot)','advertise(0|1|2)','upgrade()','visit(Com|Tec|Del|GC)','save()'],
        musica: ['toggleMusic()','nextTrack()','prevTrack()','toggleLamp()'],
        helpers: ['hireByRole(rol)','hireByName(nombre)','restockByName(nombre)','restockAll()','hireAll()','trainAll()'],
        atajos: ['hireDJ()','hireCashier()','hireHostess()','hireManager()','hireStorcker()'],
      }};
    },
  };

  console.log('%c🎮 xtAPI loaded — CLI bridge ready','color:#00ffcc;font-size:14px;font-weight:bold');
  return api;
})();
</script>
