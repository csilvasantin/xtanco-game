// ── SFX ENGINE ───────────────────────────────────────────────
const SFX=(()=>{
  let ac=null;
  const vol=()=>(typeof G!=='undefined'&&G&&G.sfxVolume!==undefined)?G.sfxVolume:0.7;
  function ctx(){if(!ac)try{ac=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}return ac;}
  function tone(freq,dur,type='sine',gain=0.15,delay=0){
    const a=ctx();if(!a)return;
    const o=a.createOscillator(),g=a.createGain();
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(gain*vol(),a.currentTime+delay);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+delay+dur);
    o.connect(g);g.connect(a.destination);
    o.start(a.currentTime+delay);o.stop(a.currentTime+delay+dur);
  }
  return{
    cashRegister(){tone(1200,0.06);tone(1600,0.06,'sine',0.12,0.07);tone(2200,0.1,'sine',0.1,0.14);},
    doorBell(){tone(659,0.15);tone(784,0.15,'sine',0.12,0.16);},
    salePop(){tone(500,0.04);tone(800,0.04,'sine',0.1,0.05);},
    hireFanfare(){tone(523,0.1);tone(659,0.1,'sine',0.12,0.12);tone(784,0.12,'sine',0.14,0.24);},
    restockThud(){tone(120,0.12,'triangle',0.2);tone(80,0.08,'triangle',0.1,0.1);},
    rushSiren(){tone(600,0.15,'sawtooth',0.08);tone(800,0.15,'sawtooth',0.08,0.16);tone(600,0.15,'sawtooth',0.08,0.32);},
    inspectionAlarm(){tone(1000,0.08,'square',0.06);tone(1000,0.08,'square',0.06,0.12);tone(1000,0.08,'square',0.06,0.24);},
    weekEnd(){tone(523,0.15,'sine',0.1);tone(659,0.12,'sine',0.08,0.16);tone(784,0.2,'sine',0.12,0.3);},
    gameOver(){tone(400,0.2);tone(300,0.2,'sine',0.12,0.22);tone(200,0.3,'sine',0.14,0.44);},
    levelUp(){tone(784,0.08);tone(988,0.08,'sine',0.1,0.1);tone(1175,0.12,'sine',0.12,0.2);},
    eventChime(){tone(880,0.08,'sine',0.08);tone(1100,0.1,'sine',0.1,0.1);},
    thunder(){tone(60,0.4,'sawtooth',0.2);tone(40,0.6,'sawtooth',0.15,0.15);tone(80,0.3,'triangle',0.1,0.4);tone(30,0.5,'sawtooth',0.08,0.6);},
    rainLoop(){tone(200,0.05,'triangle',0.02);tone(350,0.04,'triangle',0.015,0.03);tone(150,0.06,'triangle',0.01,0.06);},
  };
})();

  const availH=vh-barH;
  const ratio=W/H;
  let cw,ch;
  if(vw/availH > ratio){ ch=availH; cw=Math.floor(ch*ratio); }
  else { cw=vw; ch=Math.floor(cw/ratio); }
  cv.style.width=cw+'px';
  cv.style.height=ch+'px';
  const tb=document.getElementById('topBar');
  if(tb) tb.style.maxWidth=cw+'px';

}

// Auto-select video based on conditions (checked every ~5s of game time)
let dsConditionCheck=0;
function checkDSConditions(){
  if(++dsConditionCheck%300!==0) return; // every ~5s at 60fps
  for(let i=0;i<VIDEO_LIST.length;i++){
    const cond=VIDEO_CONDITIONS[VIDEO_LIST[i]];
    if(cond && cond()){
      if(dsVideoIdx!==i) switchDSVideo(i);
      return;
    }
  }
}

// DS content messages that rotate (fallback when no video file)
const DS_MSGS=[
  {txt:'★ XTANCO ★',sub:'Digital Twin',bg:'#0a1a2a',fg:'#ffaa33'},
  {txt:'ADMIRA',sub:'Red de Estancos',bg:'#1a0a1a',fg:'#cc66ff'},
  {txt:'TABACO',sub:'Marcas Premium',bg:'#1a1a0a',fg:'#ffdd44'},

function renderDSCanvas(ctx,w,h,frame){
  // If we have a video file playing, draw the video frame
  if(dsMode==='video' && dsVideoEl.readyState>=2 && !dsVideoEl.paused){
    ctx.drawImage(dsVideoEl,0,0,w,h);
    // Scan line overlay for retro feel
    ctx.globalAlpha=0.04;
    for(let y=0;y<h;y+=3){ctx.fillStyle='#fff';ctx.fillRect(0,y,w,1);}
    ctx.globalAlpha=1;
    // Video title at bottom
    ctx.fillStyle='#00000088';ctx.fillRect(0,h-12,w,12);
    ctx.fillStyle='#ffffff88';ctx.font='7px monospace';ctx.textAlign='center';
    ctx.fillText('📺 '+VIDEO_LIST[dsVideoIdx],w/2,h-3);
    return;
  }
  // Fallback: animated text slides
  const msgIdx=Math.floor(frame/180)%DS_MSGS.length;
  const m=DS_MSGS[msgIdx];
  const t=frame*0.02;
  // Animated gradient background
  const grd=ctx.createLinearGradient(0,0,w,h);
  const shift=Math.sin(t)*0.3;
  grd.addColorStop(0,m.bg);
  grd.addColorStop(0.5+shift,m.fg+'22');
  grd.addColorStop(1,m.bg);
  ctx.fillStyle=grd;ctx.fillRect(0,0,w,h);
  // Animated scan lines
  ctx.globalAlpha=0.06;
  for(let y=0;y<h;y+=3){ctx.fillStyle='#fff';ctx.fillRect(0,y,w,1);}
  ctx.globalAlpha=1;
  // Main text
  ctx.textAlign='center';
  ctx.fillStyle=m.fg;
  ctx.font='bold 18px monospace';
  ctx.fillText(m.txt,w/2,38);
  // Sub text with pulse
  ctx.globalAlpha=0.6+0.4*Math.sin(t*2);
  ctx.font='11px monospace';
  ctx.fillText(m.sub,w/2,58);
  ctx.globalAlpha=1;
  // Animated bottom bar
  const barW=(frame%120)/120*w;
  ctx.fillStyle=m.fg+'88';
  ctx.fillRect(0,h-4,barW,4);
  // Now playing indicator
  if(G&&G.nowPlaying){
    ctx.fillStyle='#ffffff44';ctx.font='8px monospace';
    ctx.fillText('♪ '+G.nowPlaying,w/2,h-8);
  }
}

// Digital Signage screens on LEFT WALL, flanking Admira TFT (rows 2-4)

const DS_SCREENS=[
  {rowT:0.0, rowB:2.5},  // Screen 1: wider span
  {rowT:4.0, rowB:6.5},  // Screen 2: wider span
];

function positionDSOnLeftWall(el,rowT,rowB){
  // Left wall col=0: as row↑ → x goes left, y goes down
  const pT=toIso(0,rowT), pB=toIso(0,rowB);
  const canvasRect=cv.getBoundingClientRect();
  const scaleX=canvasRect.width/W, scaleY=canvasRect.height/H;
  // Vertical band on wall (between LED and baseboard)
  const midWallFrac=0.12; // 12% from top (higher on wall)
  const screenH=ISO.wallH*0.75; // tall screens to fill wall
  // pT is top-right corner, pB is bottom-left corner (iso left wall)
  const x1=pB.x, y1top=pB.y-ISO.wallH+ISO.wallH*midWallFrac;
  const x2=pT.x, y2top=pT.y-ISO.wallH+ISO.wallH*midWallFrac;
  const mw=x2-x1;
  // Skew angle: wall goes down as x decreases → negative slope
  const wallAngle=Math.atan2((pB.y-pT.y),(pB.x-pT.x))*180/Math.PI;
  // Position at leftmost point, apply skewY so it follows the wall
  el.style.display='block';
  el.style.left=(canvasRect.left+x1*scaleX)+'px';
  el.style.top=(canvasRect.top+y1top*scaleY)+'px';
  el.style.width=(mw*scaleX)+'px';
  el.style.height=(screenH*scaleY)+'px';
  el.style.transformOrigin='bottom left';
  // Wall goes from bottom-left to top-right; skewY tilts the right edge up
  const skew=Math.atan2(pT.y-pB.y,pT.x-pB.x)*180/Math.PI;
  el.style.transform='skewY('+skew+'deg)';
}

function updateVideoPosition(){
  if(!videoPlaying||!G||state!==S.GAME){
    videoEl.style.display='none';videoEl2.style.display='none';return;

  positionDSOnLeftWall(videoEl, DS_SCREENS[0].rowT, DS_SCREENS[0].rowB);
  positionDSOnLeftWall(videoEl2,DS_SCREENS[1].rowT, DS_SCREENS[1].rowB);
}

function updateHtmlBar(){
  const show=state===S.GAME||state===S.PAUSE||state===S.EDITOR;
  bbEl.classList.toggle('show',show);
  if(!show||!G||!G.staff){resizeCanvas();return;}
  const staff=G.staff||[];
  const profit=G.yearRevenue-(staff.filter(s=>s.hired).reduce((a,s)=>a+(CFG.SALARY[s.role]||0)*s.level*(G.week||0),0));
  document.getElementById('bbSales').textContent=(G.yearRevenue|0).toLocaleString()+'€';

  pe.style.color=profit>=0?'#66ee66':'#ee6666';
  document.getElementById('bbSat').textContent=(G.satisfaction|0)+'%';
  document.getElementById('bbCli').textContent=G.customersToday||0;
  const hasProj=staff.some(s=>s.hired&&s.busy>0);
  const se=document.getElementById('bbStatus');
  se.textContent=hasProj?'Vendiendo...':'Idle';
  se.style.color=hasProj?'#88ee88':'#bbaa88';
  // Clock + date

let isMobile=false;
let touchStart=null;
let mobileSwipe=null;
function detectMobile(){isMobile=/Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent)||('ontouchstart' in window);}
detectMobile();
document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.touches[0];
  touchStart={x:t.clientX,y:t.clientY,time:Date.now()};
},{passive:false});
cv.addEventListener('touchend',e=>{
  e.preventDefault();
  if(!touchStart) return;
  const t=e.changedTouches[0];
  const dx=t.clientX-touchStart.x,dy=t.clientY-touchStart.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const elapsed=Date.now()-touchStart.time;
  if(dist<15){
    // Tap — simulate click
    cv.dispatchEvent(new MouseEvent('click',{clientX:t.clientX,clientY:t.clientY}));
  } else if(dist>40&&elapsed<500){
    // Swipe
    if(Math.abs(dx)>Math.abs(dy)){
      mobileSwipe=dx>0?'right':'left';
      // Swipe left/right to change tabs
      if(state===S.GAME&&uiOpen){
        if(mobileSwipe==='left') activeTab=Math.min(3,activeTab+1);
        if(mobileSwipe==='right') activeTab=Math.max(0,activeTab-1);
      }
    } else {
      mobileSwipe=dy>0?'down':'up';
      // Swipe up to open UI, swipe down to close
      if(state===S.GAME){
        if(mobileSwipe==='up'&&!uiOpen) uiOpen=true;
        if(mobileSwipe==='down'&&uiOpen) uiOpen=false;
      }
    }
  }
  touchStart=null;
},{passive:false});

async function elgatoFetch(path,opts){
  // When served from the proxy (localhost:9124), use same origin
  // When served from GitHub Pages, try proxy URLs
  const isLocal=location.hostname==='localhost'||location.hostname==='127.0.0.1';
  const urls=isLocal
    ? [location.origin+path]  // same origin — no CORS issues
    : [
        `http://localhost:${ELGATO.proxyPort}${path}`,
        `http://127.0.0.1:${ELGATO.proxyPort}${path}`,
      ];
  for(const url of urls){
    try{
      const res=await fetch(url,{...opts,signal:AbortSignal.timeout(2000)});
      if(res.ok) return await res.json();
    }catch(e){continue;}
  }
  throw new Error('Proxy unreachable — run: node elgato-proxy.js');
}

async function toggleStudioLight(){
  if(elgatoState.busy) return;
  elgatoState.busy=true;
  elgatoState.error=false;
  // Always toggle visual state immediately (responsive)
  const newOn=!elgatoState.on;
  elgatoState.on=newOn;
  elgatoState.manualOff=!newOn; // if turning off manually, prevent auto-on
  elgatoState.skyRed=newOn;
  elgatoState.notify=120;
  // Play sound
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    const o=ac.createOscillator(),g=ac.createGain();
    o.type='sine';o.frequency.value=newOn?660:440;
    g.gain.setValueAtTime(0.12,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01,ac.currentTime+0.2);
    o.connect(g);g.connect(ac.destination);
    o.start();o.stop(ac.currentTime+0.2);
  }catch(e){}
  // Try to also toggle the real Elgato lamp (non-blocking)
  try{
    await elgatoFetch('/elgato/lights',{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({numberOfLights:1,lights:[{on:newOn?1:0}]}),
    });
    console.log(`[Elgato] Real light: ${newOn?'ON':'OFF'}`);
  }catch(e){
    console.log('[Elgato] Real light unavailable (game lamp still works)');
  }
  // Also toggle Hue lights (bypass throttle for manual action)
  if(HUE.enabled){
    HUE.on=newOn;
    HUE.notify=120;
    HUE.lastSent=0; // force bypass throttle
    hueManualOverride=true;
    hueManualTimer=180; // skip auto-sync for 3 seconds
    try{
      if(newOn) await hueAll({on:true,bri:254,ct:300});
      else await hueAll({on:false});
      console.log(`[Hue] Lights: ${newOn?'ON':'OFF'}`);
    }catch(e){
      HUE.error=true;
      console.log('[Hue] Lights unavailable');
    }
  }
  elgatoState.busy=false;
}

let hueProxyOk=null; // null=unknown, true=working, false=unreachable
async function hueSend(lightId,stateObj){
  if(!HUE.enabled) return;
  const isLocal=location.hostname==='localhost'||location.hostname==='127.0.0.1';
  const isHTTPS=location.protocol==='https:';
  const body=JSON.stringify(stateObj);
  const opts={method:'PUT',body,headers:{'Content-Type':'application/json'},signal:AbortSignal.timeout(2000)};

  // Build URL list by priority
  const urls=[];
  if(isLocal) urls.push(`${location.origin}/hue/lights/${lightId}/state`);
  if(!isHTTPS) urls.push(`http://${HUE.bridgeIP}/api/${HUE.apiKey}/lights/${lightId}/state`);
  if(!isLocal) urls.push(`http://localhost:${ELGATO.proxyPort}/hue/lights/${lightId}/state`);

  for(const url of urls){
    try{
      const res=await fetch(url,opts);
      const json=await res.json().catch(()=>null);
      // Hue API returns [{success:{...}}] on OK, [{error:{...}}] on fail
      if(Array.isArray(json)&&json[0]&&json[0].error){
        console.warn(`[Hue] API error light ${lightId}:`,json[0].error.description);
        HUE.error=true;
        return; // API-level error, don't try other URLs
      }
      console.log(`[Hue] OK light ${lightId} →`,stateObj,`via ${url.split('/')[2]}`);
      HUE.error=false;hueProxyOk=true;
      return;
    }catch(e){
      console.warn(`[Hue] Fetch failed ${url}:`,e.message);
      continue;
    }
  }
  console.error(`[Hue] All URLs failed for light ${lightId}`);
  HUE.error=true;hueProxyOk=false;
}
async function hueSet(lightId,state){
  if(tt-HUE.lastSent<30) return; // throttle: max every 0.5s
  HUE.lastSent=tt;
  await hueSend(lightId,state);
}
async function hueAll(state){
  if(!HUE.enabled) return;
  if(tt-HUE.lastSent<30) return;
  HUE.lastSent=tt;
  const promises=Object.values(HUE.lights).map(id=>hueSend(id,state));
  await Promise.allSettled(promises);
}
async function hueToggle(){
  const newOn=!HUE.on;
  HUE.on=newOn;
  HUE.notify=120;
  if(newOn){
    await hueAll({on:true,bri:254,ct:300});

  }
}
// Sync Hue lights with game state (called from updateGame, throttled)
let hueManualOverride=false; // true when user manually toggled — skip auto-sync briefly
let hueManualTimer=0;
function hueSyncWithGame(){
  if(!HUE.enabled) return;
  if(!G||!G.gameTime) return;
  // If user just toggled manually, skip auto-sync for 3 seconds
  if(hueManualOverride){
    hueManualTimer--;
    if(hueManualTimer<=0) hueManualOverride=false;
    else return;
  }
  const h=G.gameTime;
  // DJ strobe: sync Hue with strobe effect (every 30 frames ≈ 0.5s)
  const djOn=G.staff&&G.staff.some(st=>st.hired&&st.role===4);
  if(djOn){
    if(elgatoState.manualOff) return; // user turned off lights manually — respect it
    if(tt%30===0){
      const flash=Math.sin(tt*0.3)>0;
      HUE.lastSent=0; // force send, bypass throttle
      hueAll({on:true,bri:flash?254:25,xy:[Math.random()*0.3+0.15,Math.random()*0.3+0.1],transitiontime:1});
    }
    return;
  }
  // Normal time-based sync (every 2 seconds)
  if(tt%120!==0) return;
  // Storm: blue flash (priority)
  if(G.weather&&G.weather.type==='rain'&&thunderFlash>4){
    HUE.lastSent=0;
    hueAll({on:true,bri:254,xy:[0.18,0.18],alert:'select'});
    return;
  }
  // Night: warm white, full brightness
  if(h>=19){
    HUE.on=true;
    hueAll({on:true,bri:254,ct:366});
  }
  // Late afternoon: dimmer warm
  else if(h>=17){
    HUE.on=true;
    const bri=Math.round(100+(h-17)*77); // 100→254
    hueAll({on:true,bri:bri,ct:340});
  }
  // Morning/midday: cool daylight
  else {
    hueAll({on:true,bri:254,ct:250});
  }
}

function checkGuidedTut(actionId){
  if(!guidedTut.active) return;
  const step=TUT_STEPS[guidedTut.step];
  if(!step) return;
  if(step.id==='wait'||step.id==='done') return; // auto-advance
  if(actionId.startsWith(step.id)||(step.id==='save'&&actionId==='save')){
    guidedTut.step++;guidedTut.timer=0;
    if(guidedTut.step>=TUT_STEPS.length) guidedTut.active=false;
  }
}
function drawGuidedTut(){
  if(!guidedTut.active) return;
  const step=TUT_STEPS[guidedTut.step];
  if(!step) return;
  // Auto-advance for wait/done steps
  if(step.auto){guidedTut.timer++;if(guidedTut.timer>=step.auto){guidedTut.step++;guidedTut.timer=0;if(guidedTut.step>=TUT_STEPS.length){guidedTut.active=false;return;}}}
  const px2=step.x*W,py2=step.y*H;
  // Arrow + box
  cx.globalAlpha=0.85;
  r(px2-120,py2,240,32,'#0a0a2a');
  glow(P.neon1,8);rx(px2-120,py2,240,32,P.neon1,2);nog();
  cx.globalAlpha=1;
  tx(step.msg,px2,py2+20,P.neon1,8,'center');
  tx('('+(guidedTut.step+1)+'/'+TUT_STEPS.length+')',px2+110,py2+12,'#666',6,'right');
  // Pulsing dot
  cx.globalAlpha=0.5+0.5*Math.sin(tt*0.1);
  cx.beginPath();cx.arc(px2,py2-6,4,0,Math.PI*2);cx.fillStyle=P.neon1;cx.fill();
  cx.globalAlpha=1;
}

// ── LAYOUT PERSISTENCE ───────────────────────────────────────
// Always load from localStorage. If nothing saved, use DEFAULT_LAYOUT.
// The "Save" button in editor saves to localStorage.
// The "Reset" button saves current positions as the new default
// (stored separately so code updates don't overwrite user layout).
function loadLayout(){
  try{
    // Try localStorage
    let d=localStorage.getItem('xtanco_layout_user');
    // Fallback: try IndexedDB-style backup in localStorage with alt key
    if(!d) d=localStorage.getItem('xtanco_layout_backup');
    if(d){
      const saved=JSON.parse(d);
      if(Array.isArray(saved)&&saved.length>0){
        shopLayout=saved;
        // Add any NEW items from DEFAULT that user doesn't have
        for(const def of DEFAULT_LAYOUT){
          if(!shopLayout.find(i=>i.id===def.id)){
            shopLayout.push(JSON.parse(JSON.stringify(def)));
          }
        }
        for(const it of shopLayout){
          if(!it.sx) it.sx=1; if(!it.sy) it.sy=1;
        }
        console.log('[Layout] Loaded user layout ('+shopLayout.length+' items)');
        return;
      }
    }
  }catch(e){console.log('[Layout] Load error:',e);}
  shopLayout=JSON.parse(JSON.stringify(DEFAULT_LAYOUT));
  console.log('[Layout] Using DEFAULT_LAYOUT');
}
function saveLayout(){
  const data=JSON.stringify(shopLayout);
  try{
    localStorage.setItem('xtanco_layout_user',data);
    localStorage.setItem('xtanco_layout_backup',data); // backup key
    console.log('[Layout] Saved ('+shopLayout.length+' items)');
  }catch(e){console.log('[Layout] Save error:',e);}
}
function resetLayout(){
  // Reset to DEFAULT_LAYOUT and save it as the base for new games
  shopLayout=JSON.parse(JSON.stringify(DEFAULT_LAYOUT));
  saveLayout();
  console.log('[Layout] Reset to DEFAULT and saved as base');
}
function resetToFactory(){
  localStorage.removeItem('xtanco_layout_user');
  localStorage.removeItem('xtanco_layout_backup');
  shopLayout=JSON.parse(JSON.stringify(DEFAULT_LAYOUT));
  console.log('[Layout] Factory reset');
}
// Export layout as JSON file download
function exportLayout(){
  const blob=new Blob([JSON.stringify(shopLayout,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='xtanco-layout.json';a.click();URL.revokeObjectURL(a.href);
}
// Import layout from JSON file
function importLayout(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(Array.isArray(data)){shopLayout=data;saveLayout();}
    }catch(err){}
  };
  reader.readAsText(file);
}

// Convert screen coords to iso grid tile
function screenToIso(sx,sy){
  const dx=sx-ISO.ox, dy=sy-ISO.oy;
  const col=(dx/(ISO.tileW/2)+dy/(ISO.tileH/2))/2;
  const row=(dy/(ISO.tileH/2)-dx/(ISO.tileW/2))/2;
  return {col:Math.round(col),row:Math.round(row)};
}

// Furniture footprint sizes (in tiles: [width, depth])
const FURNITURE_SIZE={
  counter:[1,2], shelves:[1,2], wineRack:[2,1], lottery:[2,1],
  vending:[1,1], magazines:[2,1], manager:[2,1], plant:[1,1],
  floorLamp:[1,1], rug:[2,2], djBooth:[2,1],
};

// Check if a tile is blocked by furniture
function isTileBlocked(col,row){
  const c=Math.round(col), r=Math.round(row);
  for(const item of shopLayout){
    if(item.type==='rug'||item.type==='led'||item.type==='tft') continue; // walkable
    const sz=FURNITURE_SIZE[item.type]||[1,1];
    if(c>=item.col && c<item.col+sz[0] && r>=item.row && r<item.row+sz[1]) return true;
  }
  return false;
}

// Full walkability check: on floor grid AND not blocked by furniture
function canWalkTo(screenX,screenY){
  const tile=screenToIso(screenX,screenY);
  if(tile.col<0||tile.col>=ISO.cols||tile.row<0||tile.row>=ISO.rows) return false;
  if(isTileBlocked(tile.col,tile.row)) return false;
  return true;
}

// ── A* PATHFINDING ───────────────────────────────────────────
let walkGrid=null;
function buildWalkGrid(){
  walkGrid=[];
  for(let c=0;c<ISO.cols;c++){walkGrid[c]=[];for(let r=0;r<ISO.rows;r++) walkGrid[c][r]=!isTileBlocked(c,r);}
}
function astarPath(sc,sr,ec,er){
  if(!walkGrid) buildWalkGrid();
  if(sc<0||sc>=ISO.cols||sr<0||sr>=ISO.rows) return null;
  if(ec<0||ec>=ISO.cols||er<0||er>=ISO.rows) return null;
  const key=(c,r)=>c+','+r;
  const open=[{c:sc,r:sr,g:0,h:Math.abs(ec-sc)+Math.abs(er-sr),p:null}];
  const closed=new Set();
  while(open.length>0){
    open.sort((a,b)=>(a.g+a.h)-(b.g+b.h));
    const cur=open.shift();
    if(cur.c===ec&&cur.r===er){
      const path=[];let n=cur;while(n){path.unshift({col:n.c,row:n.r});n=n.p;}return path;
    }
    closed.add(key(cur.c,cur.r));
    for(const[dc,dr]of[[1,0],[-1,0],[0,1],[0,-1]]){
      const nc=cur.c+dc,nr=cur.r+dr;
      if(nc<0||nc>=ISO.cols||nr<0||nr>=ISO.rows)continue;
      if(closed.has(key(nc,nr)))continue;
      if(!(nc===ec&&nr===er)&&walkGrid[nc]&&!walkGrid[nc][nr])continue;
      const g=cur.g+1,h=Math.abs(ec-nc)+Math.abs(er-nr);
      const existing=open.find(o=>o.c===nc&&o.r===nr);
      if(existing){if(g<existing.g){existing.g=g;existing.p=cur;}}
      else open.push({c:nc,r:nr,g,h,p:cur});
    }
  }
  return null;
}

function loadGame(){
  try{

      if(!G.reviews) G.reviews={positive:0,negative:0,spawnMod:1.0};
      // Restore navTarget fields on staff (lost in save/load)
      if(G.staff) G.staff.forEach((s,i)=>{
        if(s.navTarget===undefined){s.navTarget=null;s.navPath=null;s.navPathIdx=0;s.navTick=0;}

document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(state===S.MENU){
    if(e.code==='ArrowLeft'||e.code==='ArrowUp')   menuSel=0;
    if(e.code==='ArrowRight'||e.code==='ArrowDown') menuSel=1;
    if(e.code==='Enter'||e.code==='Space'){lang=menuSel===0?'es':'en';renderMode='8bit';modelSel=0;startTransition(S.MODEL_SEL);}
    return;
  }
  if(state===S.PLATFORM_SEL){
    if(e.code==='ArrowLeft'||e.code==='ArrowUp')   platformSel=0;
    if(e.code==='ArrowRight'||e.code==='ArrowDown') platformSel=1;
    if(e.code==='Enter'||e.code==='Space'){renderMode=platformSel===0?'8bit':'16bit';modelSel=0;startTransition(S.MODEL_SEL);}
    if(e.code==='Escape') startTransition(S.MENU);
    return;
  }
  if(state===S.SETTINGS){
    if(e.code==='Escape'){saveShopSettings();saveHueSettings();state=S.MENU;}
    return;
  }
  if(state===S.HELP){
    if(e.code==='Escape'){state=S.MENU;}
    if(e.code==='ArrowLeft'){helpPage=Math.max(0,helpPage-1);}
    if(e.code==='ArrowRight'){helpPage=Math.min(HELP_PAGES.length-1,helpPage+1);}
    return;
  }
  if(state===S.INTRO){
    if(e.code==='Escape'){state=S.MENU;return;}
    if(e.code==='ArrowRight'||e.code==='Space'||e.code==='Enter'){
      introSlide++;introTimer=0;
      if(introSlide>=INTRO_SLIDES){state=S.MENU;}
      return;
    }
    if(e.code==='ArrowLeft'){introSlide=Math.max(0,introSlide-1);introTimer=0;return;}
    return;
  }
  if(state===S.MODEL_SEL){
    if(e.code==='ArrowLeft')  modelSel=(modelSel+3)%4;
    if(e.code==='ArrowRight') modelSel=(modelSel+1)%4;
    if(e.code==='ArrowUp')    modelSel=(modelSel<2)?modelSel:modelSel-2;
    if(e.code==='ArrowDown')  modelSel=(modelSel>=2)?modelSel:modelSel+2;
    if(e.code==='Enter'||e.code==='Space'){initGame();state=S.TUT;tutPage=0;}
    if(e.code==='Escape'){state=S.MENU;}
    return;
  }
  if(state===S.TUT){
    if(e.code==='Enter'||e.code==='Space'||e.code==='ArrowRight'){
      tutPage++;
      if(tutPage>=T().tut.length){state=S.GAME;}
    }
    return;
  }
  if(state===S.YEAR_END){
    if((e.code==='Enter'||e.code==='Space')&&G.yearEndAnim>80) advanceYear();
    return;
  }
  if(state===S.GAME_END){
    if(e.code==='Enter'||e.code==='Space'){state=S.MENU;menuSel=0;}
    return;
  }
  if(state===S.PAUSE){
    if(e.code==='Escape'||e.code==='Enter'||e.code==='Space'){state=S.GAME;}
    return;
  }
  if(state===S.EDITOR){
    if(e.code==='Escape'){if(edSelIdx>=0)edSelIdx=-1;else state=S.GAME;}
    if(edSelIdx>=0&&edSelIdx<shopLayout.length){
      const it=shopLayout[edSelIdx];
      if(e.code==='ArrowUp'&&it.row>0) it.row--;
      if(e.code==='ArrowDown'&&it.row<ISO.rows-1) it.row++;
      if(e.code==='ArrowLeft'&&it.col>0) it.col--;
      if(e.code==='ArrowRight'&&it.col<ISO.cols-1) it.col++;
    }
    if(e.code==='KeyS'){saveLayout();edSaveNotify=90;playSaveBeep();}
    if(e.code==='KeyR'){resetLayout();edSelIdx=-1;}
    if((e.code==='Delete'||e.code==='Backspace')&&edSelIdx>=0){
      shopLayout.splice(edSelIdx,1);edSelIdx=-1;
    }
    if(edSelIdx>=0){
      const it=shopLayout[edSelIdx];
      // Shift+arrows = resize, plain arrows = move
      if(e.shiftKey){
        if(e.code==='ArrowRight'){it.sx=Math.min(3,(it.sx||1)+0.1);e.preventDefault();}
        if(e.code==='ArrowLeft'){it.sx=Math.max(0.2,(it.sx||1)-0.1);e.preventDefault();}
        if(e.code==='ArrowUp'){it.sy=Math.min(3,(it.sy||1)+0.1);e.preventDefault();}
        if(e.code==='ArrowDown'){it.sy=Math.max(0.2,(it.sy||1)-0.1);e.preventDefault();}
      }
    }
    return;
  }
  if(state===S.GAME){
    if(e.code==='Escape'){if(uiOpen)uiOpen=false;else openPause();}
    if(e.code==='KeyM'){uiOpen=!uiOpen;}
    if(e.code==='KeyE'){state=S.EDITOR;edSelIdx=-1;}
    if(e.code==='Digit1'){activeTab=0;uiOpen=true;}
    if(e.code==='Digit2'){activeTab=1;uiOpen=true;}
    if(e.code==='Digit3'){activeTab=2;uiOpen=true;}
    if(e.code==='Digit4'){activeTab=3;uiOpen=true;}
    // L = toggle Elgato studio light
    if(e.code==='KeyL'){toggleStudioLight();}
    // C = toggle air conditioning
    if(e.code==='KeyC'){acOn=!acOn;}
    // R = toggle aromatizer
    if(e.code==='KeyR'){aromaOn=!aromaOn;}
    // M = toggle background music + video
    if(e.code==='KeyM'){toggleMusic();toggleVideoPause();}
    // Q/A/O/P move the manager — prevent default for those
    if(e.code==='KeyQ'||e.code==='KeyA'||e.code==='KeyO'||e.code==='KeyP'){
      e.preventDefault();
    }
  }
});

cv.addEventListener('click',e=>{
  if(state===S.MODEL_SEL){
    const rr=cv.getBoundingClientRect();
    const mx2=(e.clientX-rr.left)*(W/rr.width)|0, my2=(e.clientY-rr.top)*(H/rr.height)|0;
    // Card grid: 2x2, centered
    const cw2=210,ch2=170,gap2=18,gx=W/2-(cw2*2+gap2)/2,gy=H/2-ch2+10;
    for(let i=0;i<4;i++){
      const col2=i%2,row2=(i/2)|0;
      const cx3=gx+col2*(cw2+gap2),cy3=gy+row2*(ch2+gap2);
      if(mx2>=cx3&&mx2<cx3+cw2&&my2>=cy3&&my2<cy3+ch2){modelSel=i;initGame();state=S.TUT;tutPage=0;return;}
    }
    return;
  }
  if(state===S.TUT){tutPage++;if(tutPage>=T().tut.length){state=S.GAME;startMusic();}return;}
  if(state===S.PAUSE){state=S.GAME;return;}
  if(state===S.YEAR_END&&G.yearEndAnim>80){advanceYear();return;}
  if(state===S.GAME_END){startTransition(S.MENU);menuSel=0;return;}
  if(state!==S.GAME&&state!==S.EDITOR&&state!==S.SETTINGS&&state!==S.MENU&&state!==S.HELP) return;
  const r2=cv.getBoundingClientRect();
  const mx=(e.clientX-r2.left)*(W/r2.width)|0, my=(e.clientY-r2.top)*(H/r2.height)|0;
  // Check buttons first
  for(const[id,b] of Object.entries(BTNS)){if(mx>=b.x&&mx<b.x+b.w&&my>=b.y&&my<b.y+b.h){doAction(id);return;}}
  // Editor: click on tile to move selected item, or click on item to select
  if(state===S.EDITOR){
    const tile=screenToIso(mx,my);
    if(tile.col>=0&&tile.col<ISO.cols&&tile.row>=0&&tile.row<ISO.rows){
      // If item selected, move it to clicked tile
      if(edSelIdx>=0&&edSelIdx<shopLayout.length){
        shopLayout[edSelIdx].col=tile.col;
        shopLayout[edSelIdx].row=tile.row;
      } else {
        // Try to select item at this tile
        for(let i=0;i<shopLayout.length;i++){
          if(shopLayout[i].col===tile.col&&shopLayout[i].row===tile.row){edSelIdx=i;return;}
        }
      }
    }
    return;
  }
});

// ── ACTIONS ───────────────────────────────────────────────────
function doAction(id){
  checkGuidedTut(id);
  if(id.startsWith('tab')){activeTab=parseInt(id[3]);return;}
  if(id.startsWith('hire')){
    const i=parseInt(id[4]);
    const s=G.staff[i];
    if(!s.hired&&G.money>=CFG.HIRE_COST[i]){
      G.money-=CFG.HIRE_COST[i];G.weekExpenses+=CFG.HIRE_COST[i];
      s.hired=true;s.energy=100;s.morale=85;s.level=1;
      s.shirt=0;s.hair=3; // Altadis uniform: blue shirt, black hair
      s.fired=false;s.fireBubble=false;s.clickBubble=0;s.isWalking=false;
      s.djScratch=0;s.djScratchNext=Math.floor(Math.random()*120)+90;
      // DJ enters through door and walks to booth; others snap to their station
      if(s.role===4){
        const doorIso=toIso(ISO.cols-1,3);
        s.x=doorIso.x-7;s.y=doorIso.y-20;
        s.navTarget=null;s.navPath=null;s.navPathIdx=0; // force pathfind to homeCol/homeRow
      } else {
        const origStaff=MODELS[modelSel||0].staffInit[i];
        if(origStaff){
          const iso=toIso(origStaff.col||Math.floor(origStaff.x/60),origStaff.row||Math.floor(origStaff.y/60));
          s.x=iso.x-7;s.y=iso.y-20;
        }
      }
      // Door opens for arrival
      G.doorOpen=60;SFX.hireFanfare();
      showEv(T().events[5],P.neon1);addFloat(s.x,s.y-40,'+'+T().staffLabel[s.role],P.neon1);
      // DJ hired → switch to Novah track
      if(s.role===4){
        G.nowPlaying='Hard Techno - DJ Novah';
        bgMusic.src='music/dj-novah.mp3';
        bgMusic.play().catch(()=>{});
        addFloat(W/2,40,'🎧 DJ Novah ON!','#cc44aa');
      }
    }
  }
  if(id.startsWith('train')){
    const i=parseInt(id[5]);const s=G.staff[i];
    if(s.hired&&G.money>=CFG.TRAIN_COST[s.role%CFG.TRAIN_COST.length]&&s.level<5){
      G.money-=CFG.TRAIN_COST[s.role%CFG.TRAIN_COST.length];G.weekExpenses+=CFG.TRAIN_COST[s.role%CFG.TRAIN_COST.length];
      s.level++;s.morale=Math.min(100,s.morale+10);
      addFloat(s.x,s.y-40,'▲ LVL '+s.level,P.neon3);
    }
  }
  if(id.startsWith('fire')){
    const i=parseInt(id[4]);const s=G.staff[i];
    if(s.hired&&i>0){ // can't fire staff[0] (player-controlled)
      s.fired=true; // mark as leaving
      s.clickBubble=120;
      s.fireBubble=true;
      // Set target to door
      const doorP=toIso(ISO.cols,3);
      s.fireTx=doorP.x;s.fireTy=doorP.y-40;
      G.doorOpen=60;
      addFloat(s.x,s.y-40,'Bye bye!','#cc4444');
      // DJ fired → switch back to normal playlist
      if(s.role===4){
        const prevSong=shopTimeSettings.nowPlaying||SONG_LIST[0];
        G.nowPlaying=prevSong;
        if(SONG_FILES[prevSong]){bgMusic.src=SONG_FILES[prevSong];bgMusic.play().catch(()=>{});}
        addFloat(W/2,40,'🎧 DJ OFF','#886688');
      }
    }
  }
  if(id.startsWith('stockShow')){
    const si=parseInt(id.slice(9));
    G.tftStockIdx=si;G.tftStockTimer=600; // show on Admira for 10 seconds
    return;
  }
  if(id==='restockAll'){
    let count=0;
    for(let i=0;i<G.prods.length;i++){
      const p=G.prods[i];
      if(p.stock<p.max&&G.money>=CFG.RESTOCK_COST){
        G.money-=CFG.RESTOCK_COST;G.weekExpenses+=CFG.RESTOCK_COST;
        p.stock=p.max;count++;
      }
    }
    if(count>0){updateBars();showEv('📦 '+count+' productos repuestos',P.neonB);SFX.restockThud();}
    return;
  }
  if(id.startsWith('rest')){
    const i=parseInt(id[4]);const p=G.prods[i];

    if(G.money>=restCost&&p.stock<p.max){

    shopLayout.splice(edSelIdx,1);

    if(id==='edSxUp'){it.sx=Math.min(3,(it.sx||1)+0.1);return;}

    if(id==='edSyDown'){it.sy=Math.max(0.2,(it.sy||1)-0.1);return;}
  }
}

function showEv(msg,col){
  G.eventMsg=msg;G.eventTimer=160;G.eventColor=col||P.neon1;
  // Show HTML banner below topBar, aligned from Edit left edge to Quit right edge
  const eb=document.getElementById('eventBanner');
  if(eb){
    eb.textContent=msg;
    eb.style.background=col||'#3a2818';
    eb.style.display='block';eb.style.opacity='1';
    // Show the sub-bar container anchored to buttons
    const subBar=document.getElementById('topBarSub');
    if(subBar) subBar.style.display='flex';
    repositionTopBarSub();
    clearTimeout(eb._fadeT);clearTimeout(eb._hideT);
    eb._fadeT=setTimeout(()=>{eb.style.opacity='0';},2400);
    eb._hideT=setTimeout(()=>{eb.style.display='none';},2800);
  }
}
function addFloat(x,y,txt,col){G.floats.push({x,y,txt,col,life:65,vy:-0.65});}
function openPause(){
  G.pauseData={rev:G.weekRevenue,exp:G.weekExpenses,cust:G.customersToday,sat:G.satisfaction,fame:G.fame};
  state=S.PAUSE;
}

// ── GAME LOGIC ────────────────────────────────────────────────
function updateBars(){
  const hi=G.staff.filter(s=>s.hired);
  const avgStk=G.prods.reduce((a,p)=>a+(p.stock/p.max),0)/G.prods.length;
  G.bars[0].val=Math.min(100,35+hi.length*10+G.fame*0.25)|0;
  G.bars[1].val=Math.min(100,15+G.customersToday*3+G.satisfaction*0.4)|0;
  G.bars[2].val=(avgStk*100)|0;
  G.bars[3].val=Math.min(100,25+hi.length*11+G.satisfaction*0.4)|0;
}

function getRating(rev,target){
  const r=rev/target;
  if(r>=1.5) return'S'; if(r>=1.2) return'A'; if(r>=1.0) return'B';
  if(r>=0.8) return'C'; return'D';
}

function advanceYear(){
  if(G.year>=CFG.TOTAL_YEARS){
    // Game end
    const hireScore=G.staff.filter(s=>s.hired).reduce((a,s)=>a+s.level*200,0);
    G.totalScore=(G.totalRevenue/100+hireScore+G.fame*50)|0;
    SFX.gameOver();startTransition(S.GAME_END);
    saveToLeaderboard();saveGame();
    return;
  }
  G.yearsCompleted++;
  G.year++;G.week=1;G.weekTimer=0;G.yearRevenue=0;G.weekRevenue=0;G.weekExpenses=0;
  G.customersToday=0;G.custIn=0;G.custOut=0;G.yearEndAnim=0;G.yearRating=null;
  // Satisfaction decay on year transition
  G.satisfaction=Math.max(20,G.satisfaction-5);
  state=S.GAME;
  saveGame();
}

function endWeek(){
  // Pay salaries
  const salaries=G.staff.filter(s=>s.hired).reduce((a,s)=>a+CFG.SALARY[s.role]*s.level,0);
  if(salaries>0){
    G.money-=salaries;G.weekExpenses+=salaries;
    addFloat(SHOP.x+SHOP.w/2,SHOP.y+20,'-€'+salaries+' SAL.',P.red);
  }
  // Stock decay
  for(const p of G.prods) p.stock=Math.max(0,p.stock-(2+Math.random()*4|0));
  // Record week data for charts
  if(G.weekHistory) G.weekHistory.push({week:G.week,rev:G.weekRevenue,exp:G.weekExpenses,sat:G.satisfaction|0,cust:G.customersToday});
  // Satisfaction decay
  G.satisfaction=Math.max(10,G.satisfaction-1.5);
  // Morale decay for unhired-slots
  for(const s of G.staff) if(s.hired) s.morale=Math.max(20,s.morale-2);
  updateBars();
  G.weekRevenue=0;G.weekExpenses=0;G.customersToday=0;G.custIn=0;G.custOut=0;
  // Reset day for next week
  G.gameTime=shopTimeSettings.openHour;
  G.dayEnded=false;
  G.weekTimer=0;
  // Turn off lamp for new morning — reset manual override
  elgatoState.manualOff=false;
  elgatoState.on=false;
  try{elgatoFetch('/elgato/lights',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({numberOfLights:1,lights:[{on:0}]})});}catch(e){}
  // Reset Hue to cool daylight for morning
  HUE.on=false;
  try{hueAll({on:true,bri:254,ct:250});}catch(e){}
  G.week++;
  if(G.week>CFG.WEEKS_PER_YEAR){
    // Year end
    const target=CFG.YEAR_TARGETS[G.year-1];
    const rating=getRating(G.yearRevenue,target);
    const bonus=T().ratingBonus[rating];
    G.money+=bonus;G.totalRevenue+=G.yearRevenue;
    G.yearRating=rating;G.yearBonus=bonus;G.yearEndAnim=0;
    if(G.yearRevenue<target*CFG.GAMEOVER_THRESHOLD){
      G.gameOverReason='target';
      G.totalScore=(G.totalRevenue/100)|0;
      SFX.gameOver();startTransition(S.GAME_END);
      saveToLeaderboard();saveGame();
      return;
    }
    startTransition(S.YEAR_END);
    saveGame();
    return;
  }
  if(G.week===1&&Math.random()<0.3) showEv(T().events[6],P.neon3);
}

// ── RANDOM EVENTS ────────────────────────────────────────────
function checkRandomEvents(){
  // Holiday event
  if(G.holiday&&G.holiday.active){G.holiday.timer--;if(G.holiday.timer<=0)G.holiday.active=false;}
  else if(Math.random()<0.001){
    const names=['Dia del Padre','San Valentín','Navidad','Reyes','Black Friday','Feria'];
    G.holiday={active:true,timer:200,name:names[Math.floor(Math.random()*names.length)]};
    showEv('🎉 '+G.holiday.name+'! x1.8 ventas',P.neon3);SFX.eventChime();
  }
  // Supplier deal
  if(G.supplierDeal&&G.supplierDeal.active){G.supplierDeal.timer--;if(G.supplierDeal.timer<=0)G.supplierDeal.active=false;}
  else if(Math.random()<0.0008){
    const pi=Math.floor(Math.random()*G.prods.length);
    G.supplierDeal={active:true,timer:300,prodIdx:pi};
    showEv('📦 Oferta proveedor: -50% restock!',P.neonB);SFX.eventChime();
  }
  // Weather
  if(G.weather&&G.weather.timer>0){G.weather.timer--;if(G.weather.timer<=0)G.weather.type=null;}
  else if(Math.random()<0.0004){ // less frequent weather changes
    const wt=Math.random()<0.5?'rain':'sun';
    // Minimum 2 game-hours: calculate frames for 2h
    const dayH=shopTimeSettings.closeHour-shopTimeSettings.openHour;
    const fpd=shopTimeSettings.dayDurationSec*60;
    const twoHourFrames=Math.floor(fpd/dayH*2); // ~3000 frames at default settings
    G.weather={type:wt,timer:twoHourFrames};
    if(wt==='rain'){showEv('🌧 ¡Tormenta! Menos clientes','#6688aa');SFX.thunder();thunderFlash=8;thunderCooldown=300;}
    else showEv('☀ Sol radiante: más clientes!',P.neon2);
  }
  // VIP customer
  if(Math.random()<0.0005){
    spawnCust(true);
    showEv('⭐ Cliente VIP!','#ffd700');SFX.eventChime();
  }
  // Theft attempt
  if(Math.random()<0.0004){
    const hiredCount=G.staff.filter(s=>s.hired).length;
    if(hiredCount<3){
      for(const p of G.prods) p.stock=Math.max(0,Math.floor(p.stock*0.7));
      showEv('🚨 Hurto: -30% stock (pocas empleadas)',P.red);SFX.inspectionAlarm();
    } else {
      showEv('🛡 Intento de hurto frustrado!',P.green);
    }
  }
  // Competitor promo — steals customers for a while
  if(G.comp.promoTimer>0){
    G.comp.promoTimer--;
    if(G.comp.promoTimer===0){
      G.comp.promoBrand=-1;
      showEv(T().compPromoEnd,P.neonB);
    }
  } else if(Math.random()<CFG.COMP_PROMO_CHANCE){
    const bi=Math.floor(Math.random()*4);
    G.comp.promoBrand=bi;G.comp.promoTimer=CFG.COMP_PROMO_DURATION;
    // Boost that competitor's share
    G.comp.shares[bi]=Math.min(45,G.comp.shares[bi]+8);
    const msg=T().compPromoMsg.replace('{brand}',CFG.COMP_NAMES[bi]);
    showEv(msg,P.red);SFX.inspectionAlarm();
    addFloat(W/2,H/2-40,'PROMO RIVAL',P.red);
  }
  // Satisfaction slowly shifts comp shares — high sat pulls customers back
  if(tt%120===0){
    const satFactor=(G.satisfaction-50)/50; // -1 to +1
    for(let i=0;i<4;i++){
      G.comp.shares[i]=Math.max(15,Math.min(45,G.comp.shares[i]-satFactor*0.4+( Math.random()-0.5)*0.3));
    }
  }
  // Employee of the month
  if(Math.random()<0.0003){
    const hired=G.staff.filter(s=>s.hired&&s.level<5);
    if(hired.length>0){
      const emp=hired[Math.floor(Math.random()*hired.length)];
      emp.morale=Math.min(100,emp.morale+30);emp.level=Math.min(5,emp.level+1);
      G.empOfMonth=emp.name;
      showEv('🏆 '+emp.name+' empleado del mes!',P.neon1);SFX.levelUp();
      addFloat(emp.x,emp.y-40,'⭐ +LVL',P.neon1);
    }
  }
}

// ── REPUTATION ───────────────────────────────────────────────
function reviewRating(){
  if(!G.reviews) return 0;
  const total=G.reviews.positive+G.reviews.negative;
  if(total<3) return 0; // not enough reviews yet
  const ratio=G.reviews.positive/total;
  if(ratio>=0.90) return 5;
  if(ratio>=0.70) return 4;
  if(ratio>=0.50) return 3;
  if(ratio>=0.30) return 2;
  return 1;
}
function updateReviewMod(){
  if(!G.reviews) return;
  const r=reviewRating();
  const mods=[1.0,0.75,0.88,1.0,1.12,1.25]; // index = rating (0=no reviews)
  G.reviews.spawnMod=mods[r];
}

// ── STAFF PATHFINDING ────────────────────────────────────────
function updateStaffNav(s){
  if(s.fired||s.role===3) return; // manager is player-controlled
  s.navTick++;

  // Determine desired grid target based on role
  let tCol=s.homeCol, tRow=s.homeRow;
  if(s.role===0){
    // Cashier: move to counter when customers are browsing
    if(G.custs.some(c=>c.st==='browse'||c.st==='leave')){
      const counter=shopLayout.find(f=>f.type==='counter');
      tCol=(counter?counter.col+1:2); tRow=(counter?counter.row:2);
    }
  } else if(s.role===1){
    // Stocker: go to shelves when any product below 30% stock
    const hasLow=G.prods.some(p=>p.stock/p.max<0.3);
    if(hasLow){
      const shelf=shopLayout.find(f=>f.type==='shelves'||f.type==='wineRack'||f.type==='vending');
      tCol=(shelf?shelf.col:4); tRow=(shelf?shelf.row+1:2);
      // Show restock bubble
      if(s.bTimer===0&&Math.random()<0.002){s.bTimer=60;s.bMsg='Reponiendo...';}
    }
  } else if(s.role===2){
    // Hostess: approach nearest browsing customer
    const browsing=G.custs.filter(c=>c.st==='browse');
    if(browsing.length>0){
      const near=browsing.reduce((a,b)=>Math.hypot(b.x-s.x,b.y-s.y)<Math.hypot(a.x-s.x,a.y-s.y)?b:a);
      const tile=screenToIso(near.x+5,near.y+20);
      tCol=Math.max(1,Math.min(ISO.cols-2,Math.round(tile.col)));
      tRow=Math.max(1,Math.min(ISO.rows-2,Math.round(tile.row)));
    }
  }
  // DJ stays at home (role 4)

  // Recompute path when target changes or every 90 frames for dynamic roles
  const targetChanged=!s.navTarget||s.navTarget.col!==tCol||s.navTarget.row!==tRow;
  const shouldRefresh=targetChanged||(s.role===2&&s.navTick%90===0);
  if(shouldRefresh){
    const cur=screenToIso(s.x+7,s.y+20);
    const cCol=Math.max(0,Math.min(ISO.cols-1,Math.round(cur.col)));
    const cRow=Math.max(0,Math.min(ISO.rows-1,Math.round(cur.row)));
    s.navPath=astarPath(cCol,cRow,tCol,tRow);
    s.navPathIdx=0;
    s.navTarget={col:tCol,row:tRow};
  }

  // Move one step along path
  if(s.navPath&&s.navPathIdx<s.navPath.length){
    const wp=s.navPath[s.navPathIdx];
    const wIso=toIso(wp.col,wp.row);
    const dx=(wIso.x-7)-s.x, dy=(wIso.y-20)-s.y;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<3){ s.navPathIdx++; }
    else{
      s.x+=dx/d*1.0; s.y+=dy/d*1.0;
      s.dir=dx<0?-1:1; s.isWalking=true;
      s.aTimer++;if(s.aTimer>8){s.aFrame=(s.aFrame+1)%2;s.aTimer=0;}
    }
  } else { s.isWalking=false; }
}

function updateGame(){
  tt++;
  // ── GAME TIME: advance clock (1 day = dayDurationSec real seconds) ──
  const dayHours=shopTimeSettings.closeHour-shopTimeSettings.openHour;
  const framesPerDay=shopTimeSettings.dayDurationSec*60; // at 60fps
  const hoursPerFrame=dayHours/framesPerDay;
  G.gameTime+=hoursPerFrame;
  // Sync weekTimer to gameTime progress (for compatibility with existing systems)
  G.weekTimer=Math.floor(((G.gameTime-shopTimeSettings.openHour)/dayHours)*CFG.WEEK_TICKS);
  // Sync Hue lights with game time
  try{hueSyncWithGame();}catch(e){}
  // Progressive lighting: afternoon gradual, night full
  let lampIntensity=0;
  if(G.gameTime>=19&&G.gameTime<shopTimeSettings.closeHour&&!G.dayEnded){
    lampIntensity=100; // Night: full brightness
  } else if(G.gameTime>=17&&G.gameTime<19&&!G.dayEnded){
    lampIntensity=Math.min(80,20+(G.gameTime-17)*30); // Late afternoon: gradual 20→80%
  }
  // If manually turned off, intensity is 0 visually
  if(elgatoState.manualOff) lampIntensity=0;
  // DJ strobe effect: lamp flashes on/off rapidly (visual always, real lights respect manualOff)
  const djOn=G.staff&&G.staff.some(st=>st.hired&&st.role===4);
  if(djOn){
    if(!elgatoState.manualOff){
      elgatoState.on=true;
    }
    lampIntensity=Math.sin(tt*0.3)>0?100:10;
  }
  G.lampIntensity=lampIntensity;
  // Auto-turn on lamp when intensity > 0 (only if not manually turned off)
  if(lampIntensity>0&&!elgatoState.on&&!elgatoState.manualOff){
    elgatoState.on=true;
    elgatoState.manualOff=false;
    elgatoState.notify=60;
  }
  // Send progressive brightness to real Elgato lamp (throttled: every 60 frames ≈ 1s)
  if(elgatoState.on&&lampIntensity>0&&!elgatoState.manualOff&&tt%60===0){
    try{elgatoFetch('/elgato/lights',{method:'PUT',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({numberOfLights:1,lights:[{on:1,brightness:Math.round(lampIntensity)}]})
    });}catch(e){}
  }
  // Update wall clock from game time
  _clockH=Math.floor(G.gameTime)%12;
  _clockM=Math.floor((G.gameTime%1)*60);
  // Day end = closing time
  if(G.gameTime>=shopTimeSettings.closeHour&&!G.dayEnded){
    G.dayEnded=true;
    G.weekTimer=CFG.WEEK_TICKS; // trigger endWeek
  }

  // ── PLAYER CONTROL: move manager with Q/A/O/P ──
  // Collision: convert screen position to iso grid, reject if outside floor
  if(G.staff&&G.staff[0]&&G.staff[0].hired){
    const mgr=G.staff[0];
    const spd=1.8;
    let mx=0,my=0;
    // Q=up(NW), A=down(SE), O=left(SW), P=right(NE)
    if(keys['KeyQ']) {mx-=spd*0.7;my-=spd*0.35;}
    if(keys['KeyA']) {mx+=spd*0.7;my+=spd*0.35;}
    if(keys['KeyO']) {mx-=spd*0.7;my+=spd*0.35;}
    if(keys['KeyP']) {mx+=spd*0.7;my-=spd*0.35;}
    if(mx!==0||my!==0){
      // Calculate new position
      const newX=mgr.x+mx, newY=mgr.y+my;
      // Collision: check feet position against floor + furniture
      const feetX=newX+7, feetY=newY+25;
      if(canWalkTo(feetX,feetY)){
        mgr.x=newX;
        mgr.y=newY;
      }
      // Update facing direction even if blocked
      mgr.dir=mx>0?1:-1;
      // Walking animation
      mgr.aTimer++;
      if(mgr.aTimer>6){mgr.aFrame=(mgr.aFrame+1)%2;mgr.aTimer=0;}
      mgr.isWalking=true;
    } else {
      mgr.isWalking=false;
    }
  }

  // ── FIESTA: Any hired staff touches a customer → show on Admira ──
  if(G.staff&&G.custs){
    let partyTriggered=false;
    for(const s of G.staff){
      if(!s.hired||s.fired||partyTriggered) continue;
      for(const c of G.custs){
        const dx=s.x-c.x,dy=s.y-c.y;
        if(Math.sqrt(dx*dx+dy*dy)<18){
          if(!G.tftParty||G.tftParty<=0){
            G.tftParty=180;
            addFloat(s.x,s.y-40,'🎉 Fiesta!','#ff44cc');
          }
          partyTriggered=true;
          break;
        }
      }
    }
  }
  if(G.tftParty>0) G.tftParty--;

  // Rush hour (badge shown in top bar, no floating event)
  if(!G.rush.active&&Math.random()<CFG.RUSH_CHANCE){
    G.rush.active=true;G.rush.timer=CFG.RUSH_DURATION;SFX.rushSiren();
  }
  if(G.rush.active){
    G.rush.timer--;
    if(G.rush.timer<=0){G.rush.active=false;}
  }

  // Inspection (badge shown in top bar, no floating event for start)
  if(!G.inspect.active&&Math.random()<CFG.INSPECT_CHANCE){
    G.inspect.active=true;G.inspect.timer=200;G.inspect.warned=false;SFX.inspectionAlarm();
  }
  if(G.inspect.active){
    G.inspect.timer--;
    if(G.inspect.timer===100&&!G.inspect.warned){
      G.inspect.warned=true;
      const hiCnt=G.staff.filter(s=>s.hired).length;
      const avgStk=G.prods.reduce((a,p)=>a+(p.stock/p.max),0)/G.prods.length;
      if(hiCnt>=1&&avgStk>0.4){
        showEv(T().inspPass,P.green);G.satisfaction=Math.min(100,G.satisfaction+8);
        addFloat(W/2,H/2-40,'✓ PASS',P.green);
      } else {
        const fine=600+Math.random()*400|0;
        G.money-=fine;G.weekExpenses+=fine;
        showEv(T().inspFail,P.inspGlow);addFloat(W/2,H/2-40,'-€'+fine,P.red);
        G.satisfaction=Math.max(10,G.satisfaction-15);
      }
      G.inspect.active=false;
    }
    if(G.inspect.timer<=0) G.inspect.active=false;
  }

  checkRandomEvents();

  // Decrement event timers
  if(G.holiday&&G.holiday.active&&G.holiday.timer<=0) G.holiday.active=false;
  if(G.supplierDeal&&G.supplierDeal.active&&G.supplierDeal.timer<=0) G.supplierDeal.active=false;

  // Staff work
  const mult=(G.rush.active?CFG.RUSH_MULT:1)*(G.holiday&&G.holiday.active?1.8:1);
  for(const s of G.staff){
    if(!s.hired) continue;
    updateStaffNav(s);
    if(!s.isWalking){s.aTimer++;if(s.aTimer>10){s.aFrame=(s.aFrame+1)%2;s.aTimer=0;}}
    if(s.busy>0) s.busy--;
    if(s.bTimer>0) s.bTimer--;
    // DJ scratch: tick down, trigger next gesture when idle at booth
    if(s.role===4&&!s.isWalking){
      if(s.djScratch>0){ s.djScratch--; }
      else{
        s.djScratchNext=(s.djScratchNext||90)-1;
        if(s.djScratchNext<=0){
          s.djScratch=Math.floor(Math.random()*20)+20; // 20-40 frames ≈ 0.3-0.7s
          s.djScratchNext=Math.floor(Math.random()*180)+90; // next in 1.5-4.5s
          addFloat(s.x+5,s.y-30,['🎵','🎶','🎧'][Math.floor(Math.random()*3)],'#cc44ff');
        }
      }
    }
    s.energy=Math.max(15,s.energy-(s.busy>0?0.04:0.01));
    if(s.energy<25) s.energy=Math.min(100,s.energy+0.08);
    const moraleFactor=0.7+(s.morale/100)*0.3;
    if(Math.random()<CFG.SALE_PROB*moraleFactor*mult&&s.bTimer===0){
      const p=G.prods[Math.floor(Math.random()*G.prods.length)];
      if(p.stock>0){
        s.bTimer=70;s.busy=50;
        const qty=Math.max(1,(s.level*CFG.SALE_BASE*(0.7+Math.random()*0.6)*p.factor*mult)|0);
        const rev=qty*p.price;
        G.money+=rev;G.weekRevenue+=rev;G.yearRevenue+=rev;G.totalRevenue+=rev;
        p.stock=Math.max(0,p.stock-Math.max(1,(qty/p.price)|0));
        addFloat(s.x+7,s.y-28,'€'+rev,P.green);SFX.salePop();
        if(G.rush.active) addFloat(s.x+7,s.y-16,'x'+CFG.RUSH_MULT.toFixed(1),P.rushGlow);
        G.satisfaction=Math.min(100,G.satisfaction+0.3);
      }
    }
  }

  // Customers
  const weatherMod=G.weather&&G.weather.type==='rain'?0.5:G.weather&&G.weather.type==='sun'?1.5:1;
  const holidaySpawn=G.holiday&&G.holiday.active?1.6:1;
  const compSteal=G.comp&&G.comp.promoTimer>0?CFG.COMP_PROMO_STEAL:0;
  const repMod=G.reviews?G.reviews.spawnMod:1;
  if(Math.random()<0.006*Math.max(1,G.staff.filter(s=>s.hired).length)*(G.rush.active?2:1)*weatherMod*holidaySpawn*(1-compSteal)*repMod) spawnCust();
  for(let i=G.custs.length-1;i>=0;i--){
    const c=G.custs[i];c.ft++;if(c.ft>10){c.fr=(c.fr+1)%2;c.ft=0;}
    if(c.bTimer>0) c.bTimer--;
    if(c.st==='walk'){
      if(c.path&&c.pathIdx<c.path.length){
        const wp=c.path[c.pathIdx];const wpIso=toIso(wp.col,wp.row);
        const wtx=wpIso.x-7,wty=wpIso.y-20;
        const dx=wtx-c.x,dy=wty-c.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<3){c.pathIdx++;if(c.pathIdx>=c.path.length){c.st='browse';c.timer=60+Math.random()*80;}}
        else{c.x+=dx/d*1.3;c.y+=dy/d*1.3;c.dir=dx<0?-1:1;}
      } else {
        const dx=c.tx-c.x,dy=c.ty-c.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<3){c.st='browse';c.timer=60+Math.random()*80;}
        else{
          const nx=c.x+dx/d*1.3,ny=c.y+dy/d*1.3;
          if(canWalkTo(nx+5,ny+20)){c.x=nx;c.y=ny;c.dir=dx<0?-1:1;}
          else{c.st='browse';c.timer=30+Math.random()*40;}
        }
      }
    } else if(c.st==='browse'){
      // Browse dialogue: show once, 25% chance
      if(!c.bShown&&c.bTimer<=0&&Math.random()<0.005){
        const arr=T().custBrowse;c.bMsg=arr[Math.floor(Math.random()*arr.length)];c.bTimer=80;c.bShown=true;
      }
      c.timer--;if(c.timer<=0){
        // ── REAL PURCHASE LOGIC ──────────────────────────────────
        const wp=c.wantsProdIdx>=0?G.prods[c.wantsProdIdx]:null;
        const inStock=wp&&wp.stock>0;
        if(inStock){
          // Purchase: decrement stock, add revenue, show float
          wp.stock=Math.max(0,wp.stock-1);
          const rev=Math.max(1,Math.round(wp.price*(0.8+Math.random()*0.4)*(c.vip?1.5:1)));
          G.money+=rev;G.weekRevenue+=rev;G.yearRevenue+=rev;G.totalRevenue+=rev;
          addFloat(c.x+7,c.y-28,'€'+rev,c.vip?'#ffd700':P.green);SFX.cashRegister();
          G.satisfaction=Math.min(100,G.satisfaction+0.5);
          c.bought=true;
          const arr=T().custBought;c.bMsg=arr[Math.floor(Math.random()*arr.length)];c.bTimer=70;
          // Review: VIP 60%, regular 15%
          if(G.reviews&&Math.random()<(c.vip?0.6:0.15)){
            G.reviews.positive++;
            const fameBonus=c.vip?3:1;
            G.fame=Math.min(100,G.fame+fameBonus);
            addFloat(c.x+7,c.y-44,T().reviewPos,'#ffd700');
            updateReviewMod();
          }
        } else {
          // No stock — check if any hired staff is close enough to rescue the sale
          const nearStaff=G.staff.find(s=>s.hired&&!s.fired&&Math.hypot(s.x-c.x,s.y-c.y)<85);
          if(nearStaff){
            // Staff rescues: find any in-stock product as substitute
            const alt=G.prods.find(p=>p.stock>0);
            if(alt){
              alt.stock=Math.max(0,alt.stock-1);
              const rev=Math.max(1,Math.round(alt.price*(0.7+Math.random()*0.3)));
              G.money+=rev;G.weekRevenue+=rev;G.yearRevenue+=rev;G.totalRevenue+=rev;
              addFloat(c.x+7,c.y-28,'€'+rev,P.neonB);SFX.cashRegister();
              addFloat(nearStaff.x+7,nearStaff.y-36,'🤝',P.neon1);
              G.satisfaction=Math.min(100,G.satisfaction+0.2);
              c.bought=true;
              const arr=T().custSaved;c.bMsg=arr[Math.floor(Math.random()*arr.length)];c.bTimer=70;
            } else {
              // Nothing in stock at all
              const arr=T().custNoStock;c.bMsg=arr[Math.floor(Math.random()*arr.length)];c.bTimer=70;
              G.satisfaction=Math.max(0,G.satisfaction-2);
            }
          } else {
            // No staff nearby — customer leaves empty-handed
            const arr=T().custNoStock;c.bMsg=arr[Math.floor(Math.random()*arr.length)];c.bTimer=70;
            G.satisfaction=Math.max(0,G.satisfaction-2);
            addFloat(c.x+7,c.y-28,'SIN STOCK',P.red);
            // Review: 30% chance of negative review
            if(G.reviews&&Math.random()<0.30){
              G.reviews.negative++;
              G.fame=Math.max(0,G.fame-2);
              addFloat(c.x+7,c.y-44,T().reviewNeg,P.red);
              updateReviewMod();
            }
          }
        }
        // Compute return path
        const curTile=screenToIso(c.x+5,c.y+20);
        c.leavePath=astarPath(Math.max(0,Math.min(ISO.cols-1,curTile.col)),Math.max(0,Math.min(ISO.rows-1,curTile.row)),ISO.cols-1,3);
        c.leaveIdx=0;
        const dp=toIso(ISO.cols,3);c.st='leave';c.tx=dp.x;c.ty=dp.y-40;G.doorOpen=60;
      }
    } else if(c.st==='leave'){
      if(c.leavePath&&c.leaveIdx<c.leavePath.length){
        const lp=c.leavePath[c.leaveIdx];const lpIso=toIso(lp.col,lp.row);
        const ltx=lpIso.x-7,lty=lpIso.y-20;
        const dx=ltx-c.x,dy=lty-c.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<3){c.leaveIdx++;} else{c.x+=dx/d*1.6;c.y+=dy/d*1.6;c.dir=dx<0?-1:1;}
        if(d<30&&G.doorOpen<30) G.doorOpen=40;
      } else {
        const dx=c.tx-c.x,dy=c.ty-c.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<30&&G.doorOpen<30) G.doorOpen=40;
        if(d<3){G.custOut++;G.custs.splice(i,1);}
        else{
          const nx=c.x+dx/d*1.6,ny=c.y+dy/d*1.6;
          if(canWalkTo(nx+5,ny+20)){c.x=nx;c.y=ny;c.dir=dx<0?-1:1;}
          else{c.x+=dx/d*0.5;c.y+=dy/d*0.5;c.dir=dx<0?-1:1;}
        }
      }
    }
  }

  // Floats
  for(let i=G.floats.length-1;i>=0;i--){
    G.floats[i].y+=G.floats[i].vy;G.floats[i].life--;
    if(G.floats[i].life<=0) G.floats.splice(i,1);
  }

  if(G.eventTimer>0) G.eventTimer--;
  if(G.doorOpen>0) G.doorOpen--;
  if(monitorAlert.timer>0) monitorAlert.timer--;
  else monitorAlert.active=false;
  if(G.tftOgre>0) G.tftOgre--;
  if(G.tftStockTimer>0){G.tftStockTimer--;}else{G.tftStockIdx=-1;}
  // Fired staff walks to door and leaves
  for(const s of G.staff){
    if(!s.fired) continue;
    const dx=s.fireTx-s.x,dy=s.fireTy-s.y;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<5){
      // Reached door — unhire
      s.hired=false;s.fired=false;s.fireBubble=false;s.clickBubble=0;
      G.doorOpen=50;
    } else {
      s.x+=dx/d*1.5;s.y+=dy/d*1.5;
      s.dir=dx>0?1:-1;
      s.aTimer++;if(s.aTimer>6){s.aFrame=(s.aFrame+1)%2;s.aTimer=0;}
      s.isWalking=true;
    }
  }

  // Week end
  if(G.weekTimer>=CFG.WEEK_TICKS){G.weekTimer=0;SFX.weekEnd();endWeek();}
  updateBars();
}

function spawnCust(isVip){
  if(G.custs.length>=7) return;
  const ci=Math.floor(Math.random()*6);
  // Spawn at door, target a walkable tile
  const doorIso=toIso(ISO.cols,3);
  let tCol,tRow,attempts=0;
  do{
    tCol=2+Math.random()*6|0;
    tRow=1+Math.random()*4|0;
    attempts++;
  }while(isTileBlocked(tCol,tRow)&&attempts<20);
  const tIso=toIso(tCol,tRow);
  const path=astarPath(ISO.cols-1,3,tCol,tRow);
  // Pick an entry dialogue
  const isV=!!isVip;
  let cBMsg='',cBTimer=0;
  if(isV){
    const arr=T().custVip;cBMsg=arr[Math.floor(Math.random()*arr.length)];cBTimer=90;
  } else if(Math.random()<0.4){
    const arr=T().custEnter;cBMsg=arr[Math.floor(Math.random()*arr.length)];cBTimer=90;
  }
  // Pick wanted product — prefer stocked ones (70% chance), VIPs prefer high-price items
  let wantsProdIdx=-1;
  if(G.prods&&G.prods.length){
    const stocked=G.prods.map((p,i)=>({i,p})).filter(({p})=>p.stock>0);
    const pool=stocked.length>0&&Math.random()<0.7?stocked:G.prods.map((p,i)=>({i,p}));
    const pick=isV?pool.reduce((a,b)=>a.p.price>=b.p.price?a:b):pool[Math.floor(Math.random()*pool.length)];
    wantsProdIdx=pick.i;
  }
  G.custs.push({
    x:doorIso.x,y:doorIso.y-40,
    tx:tIso.x-7,ty:tIso.y-20,
    gCol:ISO.cols,gRow:3,
    st:'walk',timer:0,col:isVip?'#ffd700':P.prods[ci],hair:Math.floor(Math.random()*6),
    fr:0,ft:0,dir:-1,
    path:path,pathIdx:0,vip:isV,
    bTimer:cBTimer,bMsg:cBMsg,bShown:false,
    wantsProdIdx:wantsProdIdx,bought:false
  });
  G.doorOpen=60;SFX.doorBell(); // open door for customer entering
  G.customersToday++;G.totalCustomers++;G.custIn++; // count entry
}

// ── ISOMETRIC ENGINE ─────────────────────────────────────────
// Kairosoft-style: FULL WIDTH, tall walls, steep angle
// SHOP: x=0, y=28, w=800, h=442 (full width between bars)
// Wall ~170px, floor diamond ~270px
// Grid 12x6 → sum=18, tileW=800*2/18≈88, tileH=270*2/18=30
const ISO={
  tileW:80,tileH:28,    // slightly smaller tiles to fit +1 col/row
  cols:14,rows:8,        // +1 more each direction for bigger shop
  ox:270,oy:185,         // adjusted for larger grid
  wallH:165,             // walls

// Cart→Iso: convert grid (col,row) to screen pixel
function toIso(col,row){
  return {
    x: ISO.ox + (col-row)*ISO.tileW/2,
    y: ISO.oy + (col+row)*ISO.tileH/2
  };
}
// Draw a flat diamond tile
function drawIsoTile(col,row,color,strokeColor){
  if(renderMode==='16bit'){drawIsoTile16(col,row,color,strokeColor);return;}
  const p=toIso(col,row);
  const hw=ISO.tileW/2, hh=ISO.tileH/2;
  cx.beginPath();
  cx.moveTo(p.x,p.y);
  cx.lineTo(p.x+hw,p.y+hh);
  cx.lineTo(p.x,p.y+ISO.tileH);
  cx.lineTo(p.x-hw,p.y+hh);
  cx.closePath();
  cx.fillStyle=color;cx.fill();
  if(strokeColor){cx.strokeStyle=strokeColor;cx.lineWidth=0.5;cx.stroke();}
}
// 16-bit tile: gradient fill + grout lines + top sheen
function drawIsoTile16(col,row,color,strokeColor){
  const p=toIso(col,row);
  const hw=ISO.tileW/2, hh=ISO.tileH/2;
  cx.beginPath();
  cx.moveTo(p.x,p.y);cx.lineTo(p.x+hw,p.y+hh);cx.lineTo(p.x,p.y+ISO.tileH);cx.lineTo(p.x-hw,p.y+hh);
  cx.closePath();
  const grd=cx.createLinearGradient(p.x,p.y,p.x,p.y+ISO.tileH);
  grd.addColorStop(0,cLight(color,20));grd.addColorStop(0.45,color);grd.addColorStop(1,cDark(color,10));
  cx.fillStyle=grd;cx.fill();
  if(strokeColor){cx.strokeStyle=cDark(color,15);cx.lineWidth=0.8;cx.stroke();}
  cx.globalAlpha=0.12;cx.strokeStyle='#fff';cx.lineWidth=1.2;
  cx.beginPath();cx.moveTo(p.x,p.y+1);cx.lineTo(p.x+hw,p.y+hh+1);cx.stroke();
  cx.globalAlpha=1;
}
// Draw a 3D isometric block (box)
function drawIsoBlock(col,row,bw,bd,bh,topCol,leftCol,rightCol,neonCol){
  if(renderMode==='16bit'){drawIsoBlock16(col,row,bw,bd,bh,topCol,leftCol,rightCol,neonCol);return;}
  // bw=width in tiles, bd=depth in tiles, bh=height in px
  const p=toIso(col,row);
  const hw=ISO.tileW/2, hh=ISO.tileH/2;
  const w=bw*hw, d=bd*hw;
  const wh=bw*hh, dh=bd*hh;
  // Top face
  cx.beginPath();
  cx.moveTo(p.x,p.y-bh);
  cx.lineTo(p.x+w,p.y+wh-bh);
  cx.lineTo(p.x+w-d,p.y+wh+dh-bh);
  cx.lineTo(p.x-d,p.y+dh-bh);
  cx.closePath();
  cx.fillStyle=topCol;cx.fill();
  // Left face
  cx.beginPath();
  cx.moveTo(p.x-d,p.y+dh-bh);
  cx.lineTo(p.x+w-d,p.y+wh+dh-bh);
  cx.lineTo(p.x+w-d,p.y+wh+dh);
  cx.lineTo(p.x-d,p.y+dh);
  cx.closePath();
  cx.fillStyle=leftCol;cx.fill();
  // Right face
  cx.beginPath();
  cx.moveTo(p.x+w-d,p.y+wh+dh-bh);
  cx.lineTo(p.x+w,p.y+wh-bh);
  cx.lineTo(p.x+w,p.y+wh);
  cx.lineTo(p.x+w-d,p.y+wh+dh);
  cx.closePath();
  cx.fillStyle=rightCol;cx.fill();
  // Neon edge glow on top edges
  if(neonCol){
    glow(neonCol,6);
    cx.strokeStyle=neonCol;cx.lineWidth=1.5;
    cx.beginPath();
    cx.moveTo(p.x,p.y-bh);cx.lineTo(p.x+w,p.y+wh-bh);
    cx.moveTo(p.x,p.y-bh);cx.lineTo(p.x-d,p.y+dh-bh);
    cx.stroke();nog();
  }
}
// 16-bit isometric block: gradient faces + edge definition
function drawIsoBlock16(col,row,bw,bd,bh,topCol,leftCol,rightCol,neonCol){
  const p=toIso(col,row);

  cx.beginPath();

function _miniIsoTile(mx,my,s,c1,c2,gradient){
  // Draw a tiny isometric tile centered at mx,my
  const tw=14*s,th=5*s;
  cx.beginPath();cx.moveTo(mx,my);cx.lineTo(mx+tw/2,my+th/2);cx.lineTo(mx,my+th);cx.lineTo(mx-tw/2,my+th/2);cx.closePath();
  if(gradient){
    const g=cx.createLinearGradient(mx,my,mx,my+th);g.addColorStop(0,c1);g.addColorStop(1,c2);cx.fillStyle=g;
  } else {cx.fillStyle=c1;}
  cx.fill();cx.strokeStyle=c2;cx.lineWidth=0.5;cx.stroke();
}
