function resizeCanvas(){
  const vw=window.innerWidth, vh=window.innerHeight;
  const barH=document.getElementById('topBar').classList.contains('show')?34:0;
  const availH=vh-barH;
  const ratio=W/H;
  let cw,ch;
  if(vw/availH > ratio){ ch=availH; cw=Math.floor(ch*ratio); }
  else { cw=vw; ch=Math.floor(cw/ratio); }
  cv.style.width=cw+'px';
  cv.style.height=ch+'px';
  const tb=document.getElementById('topBar');
  if(tb) tb.style.maxWidth=cw+'px';
}

function updateVideoPosition(){
  if(!videoPlaying||!G||state!==S.GAME){videoEl.style.display='none';return;}
  // Find counter position in screen coords
  const counterItem=shopLayout.find(i=>i.id==='counter');
  if(!counterItem){videoEl.style.display='none';return;}
  const p=toIso(counterItem.col,counterItem.row);
  // Monitor is on top of counter, slightly offset
  const canvasRect=cv.getBoundingClientRect();
  const scaleX=canvasRect.width/W, scaleY=canvasRect.height/H;
  // Monitor position in canvas coords (above counter)
  const mx=p.x-8, my=p.y-50;
  const mw=45, mh=30;
  // Convert to screen coords
  const sx=canvasRect.left+mx*scaleX;
  const sy=canvasRect.top+my*scaleY;
  const sw=mw*scaleX;
  const sh=mh*scaleY;
  videoEl.style.display='block';
  videoEl.style.left=sx+'px';
  videoEl.style.top=sy+'px';
  videoEl.style.width=sw+'px';
  videoEl.style.height=sh+'px';
}

function startVideo(){
  const song=G?G.nowPlaying:'Titi Me Preguntó - Bad Bunny';
  const vid=YOUTUBE_VIDEOS[song]||'Cr8K88UcO0s';
  if(vid!==currentVideoId){
    currentVideoId=vid;
    ytFrame.src='https://www.youtube.com/embed/'+vid+'?autoplay=1&mute=0&loop=1&playlist='+vid+'&controls=0&modestbranding=1&rel=0&enablejsapi=1';
  }
  videoPlaying=true;videoPaused=false;
  updateVideoPosition();
}

function toggleVideoPause(){
  if(!videoPlaying){startVideo();return;}
  if(videoPaused){
    // Resume — reload iframe (simple approach)
    ytFrame.src=ytFrame.src.replace('autoplay=0','autoplay=1');
    videoPaused=false;
  } else {
    // Pause — stop by clearing src partially
    ytFrame.src=ytFrame.src.replace('autoplay=1','autoplay=0');
    videoPaused=true;
  }
}

    const p=25+2.5*Math.sin(t*0.11+2);
    const b=21+2*Math.sin(t*0.15+3);

    document.getElementById('compAlt').textContent=Math.round(a/total*100)+'%';

    document.getElementById('compBAT').textContent=Math.round(b/total*100)+'%';

  }

// Get sky colors based on game hour (returns [top, mid, bottom])
function getSkyColors(hour){
  if(hour<7)  return ['#0a0a2a','#1a1a3a','#2a2a4a']; // night
  if(hour<9)  return ['#3a5a8a','#5a7aaa','#8aaacc']; // dawn
  if(hour<12) return ['#5a99cc','#7ab8dd','#a8d4ee']; // morning
  if(hour<16) return ['#4a8acc','#6aaadd','#98ccee']; // midday
  if(hour<18) return ['#cc8844','#dd9955','#eebb77']; // sunset
  if(hour<19) return ['#aa4433','#cc5544','#dd7755']; // dusk
  if(hour<20) return ['#3a2244','#4a3355','#5a4466']; // twilight
  return ['#0a0a1a','#1a1a2a','#2a2a3a']; // night
}

async function elgatoFetch(path,opts){
  // When served from the proxy (localhost:9124), use same origin
  // When served from GitHub Pages, try proxy URLs
  const isLocal=location.hostname==='localhost'||location.hostname==='127.0.0.1';
  const urls=isLocal
    ? [location.origin+path]  // same origin — no CORS issues
    : [
        `http://localhost:${ELGATO.proxyPort}${path}`,
        `http://127.0.0.1:${ELGATO.proxyPort}${path}`,
      ];
  for(const url of urls){
    try{
      const res=await fetch(url,{...opts,signal:AbortSignal.timeout(2000)});
      if(res.ok) return await res.json();
    }catch(e){continue;}
  }
  throw new Error('Proxy unreachable — run: node elgato-proxy.js');
}

async function toggleStudioLight(){
  if(elgatoState.busy) return;
  elgatoState.busy=true;
  elgatoState.error=false;
  // Always toggle visual state immediately (responsive)
  const newOn=!elgatoState.on;
  elgatoState.on=newOn;
  elgatoState.manualOff=!newOn; // if turning off manually, prevent auto-on
  elgatoState.skyRed=newOn;
  elgatoState.notify=120;
  // Play sound
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    const o=ac.createOscillator(),g=ac.createGain();
    o.type='sine';o.frequency.value=newOn?660:440;
    g.gain.setValueAtTime(0.12,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01,ac.currentTime+0.2);
    o.connect(g);g.connect(ac.destination);
    o.start();o.stop(ac.currentTime+0.2);
  }catch(e){}
  // Try to also toggle the real Elgato lamp (non-blocking)
  try{
    await elgatoFetch('/elgato/lights',{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({numberOfLights:1,lights:[{on:newOn?1:0}]}),
    });
    console.log(`[Elgato] Real light: ${newOn?'ON':'OFF'}`);
  }catch(e){
    console.log('[Elgato] Real light unavailable (game lamp still works)');
  }
  elgatoState.busy=false;
}

// Always load from localStorage. If nothing saved, use DEFAULT_LAYOUT.
// The "Save" button in editor saves to localStorage.
// The "Reset" button saves current positions as the new default
// (stored separately so code updates don't overwrite user layout).
function loadLayout(){
  try{
    // Try localStorage
    let d=localStorage.getItem('xtanco_layout_user');
    // Fallback: try IndexedDB-style backup in localStorage with alt key
    if(!d) d=localStorage.getItem('xtanco_layout_backup');
    if(d){
      const saved=JSON.parse(d);
      if(Array.isArray(saved)&&saved.length>0){
        shopLayout=saved;
        // Add any NEW items from DEFAULT that user doesn't have
        for(const def of DEFAULT_LAYOUT){
          if(!shopLayout.find(i=>i.id===def.id)){
            shopLayout.push(JSON.parse(JSON.stringify(def)));
          }
        }
        for(const it of shopLayout){
          if(!it.sx) it.sx=1; if(!it.sy) it.sy=1;
        }
        console.log('[Layout] Loaded user layout ('+shopLayout.length+' items)');
        return;
      }
    }
  }catch(e){console.log('[Layout] Load error:',e);}
  shopLayout=JSON.parse(JSON.stringify(DEFAULT_LAYOUT));
  console.log('[Layout] Using DEFAULT_LAYOUT');
}
function saveLayout(){
  const data=JSON.stringify(shopLayout);
  try{
    localStorage.setItem('xtanco_layout_user',data);
    localStorage.setItem('xtanco_layout_backup',data); // backup key
    console.log('[Layout] Saved ('+shopLayout.length+' items)');
  }catch(e){console.log('[Layout] Save error:',e);}
}
function resetLayout(){
  saveLayout(); // Reset = save current as permanent
  console.log('[Layout] Reset = saved current as default');
}

}

// Convert screen coords to iso grid tile
function screenToIso(sx,sy){
  const dx=sx-ISO.ox, dy=sy-ISO.oy;
  const col=(dx/(ISO.tileW/2)+dy/(ISO.tileH/2))/2;
  const row=(dy/(ISO.tileH/2)-dx/(ISO.tileW/2))/2;
  return {col:Math.round(col),row:Math.round(row)};
}

// Furniture footprint sizes (in tiles: [width, depth])
const FURNITURE_SIZE={
  counter:[1,2], shelves:[1,2], wineRack:[2,1], lottery:[2,1],
  vending:[1,1], magazines:[2,1], manager:[2,1], plant:[1,1],
  floorLamp:[1,1], rug:[2,2],
};

// Check if a tile is blocked by furniture
function isTileBlocked(col,row){
  const c=Math.round(col), r=Math.round(row);
  for(const item of shopLayout){
    if(item.type==='rug'||item.type==='led'||item.type==='tft') continue; // walkable
    const sz=FURNITURE_SIZE[item.type]||[1,1];
    if(c>=item.col && c<item.col+sz[0] && r>=item.row && r<item.row+sz[1]) return true;
  }
  return false;
}

// Full walkability check: on floor grid AND not blocked by furniture
function canWalkTo(screenX,screenY){
  const tile=screenToIso(screenX,screenY);
  if(tile.col<0||tile.col>=ISO.cols||tile.row<0||tile.row>=ISO.rows) return false;
  if(isTileBlocked(tile.col,tile.row)) return false;
  return true;
}

  }
  if(state===S.TUT){
    if(e.code==='Enter'||e.code==='Space'||e.code==='ArrowRight'){
      tutPage++;
      if(tutPage>=T().tut.length){state=S.GAME;}
    }
    return;
  }
  if(state===S.YEAR_END){
    if((e.code==='Enter'||e.code==='Space')&&G.yearEndAnim>80) advanceYear();
    return;
  }
  if(state===S.GAME_END){
    if(e.code==='Enter'||e.code==='Space'){state=S.MENU;menuSel=0;}
    return;
  }
  if(state===S.PAUSE){
    if(e.code==='Escape'||e.code==='Enter'||e.code==='Space'){state=S.GAME;}
    return;
  }
  if(state===S.EDITOR){
    if(e.code==='Escape'){if(edSelIdx>=0)edSelIdx=-1;else state=S.GAME;}
    if(edSelIdx>=0&&edSelIdx<shopLayout.length){
      const it=shopLayout[edSelIdx];
      if(e.code==='ArrowUp'&&it.row>0) it.row--;
      if(e.code==='ArrowDown'&&it.row<ISO.rows-1) it.row++;
      if(e.code==='ArrowLeft'&&it.col>0) it.col--;
      if(e.code==='ArrowRight'&&it.col<ISO.cols-1) it.col++;
    }
    if(e.code==='KeyS'){saveLayout();edSaveNotify=90;playSaveBeep();}
    if(e.code==='KeyR'){resetLayout();edSelIdx=-1;}
    if((e.code==='Delete'||e.code==='Backspace')&&edSelIdx>=0){
      shopLayout.splice(edSelIdx,1);edSelIdx=-1;
    }
    if(edSelIdx>=0){
      const it=shopLayout[edSelIdx];
      // Shift+arrows = resize, plain arrows = move
      if(e.shiftKey){
        if(e.code==='ArrowRight'){it.sx=Math.min(3,(it.sx||1)+0.1);e.preventDefault();}
        if(e.code==='ArrowLeft'){it.sx=Math.max(0.2,(it.sx||1)-0.1);e.preventDefault();}
        if(e.code==='ArrowUp'){it.sy=Math.min(3,(it.sy||1)+0.1);e.preventDefault();}
        if(e.code==='ArrowDown'){it.sy=Math.max(0.2,(it.sy||1)-0.1);e.preventDefault();}
      }
    }
    return;
  }
  if(state===S.GAME){
    if(e.code==='Escape'){if(uiOpen)uiOpen=false;else openPause();}
    if(e.code==='KeyM'){uiOpen=!uiOpen;}
    if(e.code==='KeyE'){state=S.EDITOR;edSelIdx=-1;}
    if(e.code==='Digit1'){activeTab=0;uiOpen=true;}
    if(e.code==='Digit2'){activeTab=1;uiOpen=true;}
    if(e.code==='Digit3'){activeTab=2;uiOpen=true;}
    if(e.code==='Digit4'){activeTab=3;uiOpen=true;}
    // L = toggle Elgato studio light
    if(e.code==='KeyL'){toggleStudioLight();}
    // M = toggle background music + video
    if(e.code==='KeyM'){toggleMusic();toggleVideoPause();}
    // Q/A/O/P move the manager — prevent default for those
    if(e.code==='KeyQ'||e.code==='KeyA'||e.code==='KeyO'||e.code==='KeyP'){
      e.preventDefault();
    }
  }
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});
cv.addEventListener('click',e=>{
  if(state===S.MODEL_SEL){
    const rr=cv.getBoundingClientRect();
    const mx2=(e.clientX-rr.left)*(W/rr.width)|0, my2=(e.clientY-rr.top)*(H/rr.height)|0;
    // Card grid: 2x2, centered
    const cw2=210,ch2=170,gap2=18,gx=W/2-(cw2*2+gap2)/2,gy=H/2-ch2+10;
    for(let i=0;i<4;i++){
      const col2=i%2,row2=(i/2)|0;
      const cx3=gx+col2*(cw2+gap2),cy3=gy+row2*(ch2+gap2);
      if(mx2>=cx3&&mx2<cx3+cw2&&my2>=cy3&&my2<cy3+ch2){modelSel=i;initGame();state=S.TUT;tutPage=0;return;}
    }
    return;
  }
  if(state===S.TUT){tutPage++;if(tutPage>=T().tut.length){state=S.GAME;startMusic();}return;}
  if(state===S.PAUSE){state=S.GAME;return;}
  if(state===S.YEAR_END&&G.yearEndAnim>80){advanceYear();return;}
  if(state===S.GAME_END){state=S.MENU;menuSel=0;return;}
  if(state!==S.GAME&&state!==S.EDITOR&&state!==S.SETTINGS&&state!==S.MENU&&state!==S.HELP) return;
  const r2=cv.getBoundingClientRect();
  const mx=(e.clientX-r2.left)*(W/r2.width)|0, my=(e.clientY-r2.top)*(H/r2.height)|0;
  // Check buttons first
  for(const[id,b] of Object.entries(BTNS)){if(mx>=b.x&&mx<b.x+b.w&&my>=b.y&&my<b.y+b.h){doAction(id);return;}}
  // Editor: click on tile to move selected item, or click on item to select
  if(state===S.EDITOR){
    const tile=screenToIso(mx,my);
    if(tile.col>=0&&tile.col<ISO.cols&&tile.row>=0&&tile.row<ISO.rows){
      // If item selected, move it to clicked tile
      if(edSelIdx>=0&&edSelIdx<shopLayout.length){
        shopLayout[edSelIdx].col=tile.col;
        shopLayout[edSelIdx].row=tile.row;
      } else {
        // Try to select item at this tile
        for(let i=0;i<shopLayout.length;i++){
          if(shopLayout[i].col===tile.col&&shopLayout[i].row===tile.row){edSelIdx=i;return;}
        }
      }
    }
    return;
  }
});
// Mouse move for editor hover
cv.addEventListener('mousemove',e=>{
  if(state!==S.EDITOR) return;
  const r2=cv.getBoundingClientRect();
  const mx=(e.clientX-r2.left)*(W/r2.width)|0, my=(e.clientY-r2.top)*(H/r2.height)|0;

});

// ── ACTIONS ───────────────────────────────────────────────────
function doAction(id){
  if(id.startsWith('tab')){activeTab=parseInt(id[3]);return;}
  if(id.startsWith('hire')){
    const i=parseInt(id[4]);
    const s=G.staff[i];
    if(!s.hired&&G.money>=CFG.HIRE_COST[i]){
      G.money-=CFG.HIRE_COST[i];G.weekExpenses+=CFG.HIRE_COST[i];
      s.hired=true;s.energy=100;s.morale=85;s.level=1;
      s.shirt=0;s.hair=3; // Altadis uniform: blue shirt, black hair
      s.fired=false;s.fireBubble=false;s.clickBubble=0;s.isWalking=false;
      // Reset position to their assigned station
      const origStaff=MODELS[modelSel||0].staffInit[i];
      if(origStaff){
        const iso=toIso(origStaff.col||Math.floor(origStaff.x/60),origStaff.row||Math.floor(origStaff.y/60));
        s.x=iso.x-7;s.y=iso.y-20;
        if(s.gridCol!==undefined){s.gridCol=origStaff.col||5;s.gridRow=origStaff.row||3;}
      }
      // Door opens for arrival
      G.doorOpen=60;
      showEv(T().events[5],P.neon1);addFloat(s.x,s.y-40,'+'+T().staffLabel[s.role],P.neon1);
      // DJ hired → switch to Novah track
      if(s.role===4){
        G.nowPlaying='Hard Techno - DJ Novah';
        bgMusic.src='music/dj-novah.mp3';
        bgMusic.play().catch(()=>{});
        addFloat(W/2,40,'🎧 DJ Novah ON!','#cc44aa');
      }
    }
  }
  if(id.startsWith('train')){
    const i=parseInt(id[5]);const s=G.staff[i];
    if(s.hired&&G.money>=CFG.TRAIN_COST[s.role%CFG.TRAIN_COST.length]&&s.level<5){
      G.money-=CFG.TRAIN_COST[s.role%CFG.TRAIN_COST.length];G.weekExpenses+=CFG.TRAIN_COST[s.role%CFG.TRAIN_COST.length];
      s.level++;s.morale=Math.min(100,s.morale+10);
      addFloat(s.x,s.y-40,'▲ LVL '+s.level,P.neon3);
    }
  }
  if(id.startsWith('fire')){
    const i=parseInt(id[4]);const s=G.staff[i];
    if(s.hired&&i>0){ // can't fire staff[0] (player-controlled)
      s.fired=true; // mark as leaving
      s.clickBubble=120;
      s.fireBubble=true;
      // Set target to door
      const doorP=toIso(ISO.cols,3);
      s.fireTx=doorP.x;s.fireTy=doorP.y-40;
      G.doorOpen=60;
      addFloat(s.x,s.y-40,'Bye bye!','#cc4444');
      // DJ fired → switch back to normal playlist
      if(s.role===4){
        const prevSong=shopTimeSettings.nowPlaying||SONG_LIST[0];
        G.nowPlaying=prevSong;
        if(SONG_FILES[prevSong]){bgMusic.src=SONG_FILES[prevSong];bgMusic.play().catch(()=>{});}
        addFloat(W/2,40,'🎧 DJ OFF','#886688');
      }
    }
  }
  if(id.startsWith('stockShow')){
    const si=parseInt(id.slice(9));
    G.tftStockIdx=si;G.tftStockTimer=600; // show on Admira for 10 seconds
    return;
  }
  if(id.startsWith('rest')){
    const i=parseInt(id[4]);const p=G.prods[i];
    if(G.money>=CFG.RESTOCK_COST&&p.stock<p.max){
      G.money-=CFG.RESTOCK_COST;G.weekExpenses+=CFG.RESTOCK_COST;
      p.stock=p.max;updateBars();showEv(T().events[4],P.neonB);
    }
  }
  if(id.startsWith('adv')){
    const i=parseInt(id[3]);const a=CFG.ADVERT[i];
    if(G.money>=a.cost){
      G.money-=a.cost;G.weekExpenses+=a.cost;
      G.fame=Math.min(100,G.fame+a.fame);
      G.satisfaction=Math.min(100,G.satisfaction+5);
      showEv(T().events[7],P.neon2);addFloat(W/2,H/2-40,'+FAMA',P.neon2);
    }
  }
  if(id==='upgrade'){
    if(G.storeLevel<2&&G.money>=CFG.UPGRADE_COST){
      G.money-=CFG.UPGRADE_COST;G.weekExpenses+=CFG.UPGRADE_COST;
      G.storeLevel=2;G.satisfaction=Math.min(100,G.satisfaction+15);
      showEv(T().upgradeMsg,P.neon1);addFloat(W/2,H/2-40,'UPGRADE!',P.neon1);
    }
  }
  // Visit actions
  if(id==='visitCom'){
    G.fame=Math.min(100,G.fame+12);G.satisfaction=Math.min(100,G.satisfaction+5);
    showEv('🧑‍💼 Comercial: +12 fama, nuevos productos!','#44aa44');
    addFloat(W/2,H/2-40,'+FAMA','#44aa44');
    monitorAlert={active:true,timer:300,msg:'VISITA COMERCIAL',color:'#22aa44'};
    uiOpen=false;return;
  }
  if(id==='visitTec'){
    G.satisfaction=Math.min(100,G.satisfaction+15);
    for(const p of G.prods) p.stock=Math.min(p.max,p.stock+Math.floor(p.max*0.3));
    showEv('🔧 Técnico: equipos revisados, +15 satisfacción','#4488aa');
    addFloat(W/2,H/2-40,'+SERVICIO','#4488cc');
    monitorAlert={active:true,timer:300,msg:'VISITA TÉCNICO',color:'#2266cc'};
    uiOpen=false;return;
  }
  if(id==='visitDel'){
    const bonus=500+Math.floor(Math.random()*500);
    G.money+=bonus;G.fame=Math.min(100,G.fame+8);
    showEv('🏛 Delegación: subvención '+bonus+'€, +8 fama','#cc66aa');
    addFloat(W/2,H/2-40,'+'+bonus+'€','#cc66aa');
    monitorAlert={active:true,timer:300,msg:'VISITA DELEGACIÓN',color:'#cc44aa'};
    G.tftOgre=300; // show ogre on TFT for 5 seconds
    uiOpen=false;return;
  }
  if(id==='visitGC'){
    const hiCnt=G.staff.filter(s=>s.hired).length;
    const avgStk=G.prods.reduce((a,p)=>a+(p.stock/p.max),0)/G.prods.length;
    monitorAlert={active:true,timer:300,msg:'GUARDIA CIVIL',color:'#111111'};
    if(hiCnt>=1&&avgStk>0.3){
      G.satisfaction=Math.min(100,G.satisfaction+10);
      showEv('👮 Guardia Civil: inspección superada! +10 sat','#448844');
      addFloat(W/2,H/2-40,'✓ OK','#44aa44');
    } else {
      const fine=400+Math.floor(Math.random()*600);
      G.money-=fine;G.satisfaction=Math.max(10,G.satisfaction-10);
      showEv('👮 Guardia Civil: multa -€'+fine,'#aa4444');
      addFloat(W/2,H/2-40,'-€'+fine,'#cc4444');
    }
    uiOpen=false;return;
  }
  if(id==='lampToggle'){toggleStudioLight();return;}
  if(id.startsWith('staffClick')){
    const si=parseInt(id.slice(10));
    if(G.staff&&G.staff[si]&&G.staff[si].hired){
      G.staff[si].clickBubble=180; // show bubble for 3 seconds
    }
    return;
  }
  // ── Menu touch/click actions ──
  if(id==='menuStart'){lang=menuSel===0?'es':'en';modelSel=0;state=S.MODEL_SEL;return;}
  if(id==='menuLangEs'){menuSel=0;return;}
  if(id==='menuLangEn'){menuSel=1;return;}
  if(id==='menuSettings'){state=S.SETTINGS;return;}
  if(id==='menuHelp'){helpPage=0;state=S.HELP;return;}
  if(id==='helpBack'){state=S.MENU;return;}
  if(id==='helpPrev'){helpPage=Math.max(0,helpPage-1);return;}
  if(id==='helpNext'){helpPage=Math.min(HELP_PAGES.length-1,helpPage+1);return;}
  // ── Model selection touch/click ──
  if(id.startsWith('model')&&id!=='modelConfirm'){
    const mi=parseInt(id.slice(5));
    if(!isNaN(mi)&&mi>=0&&mi<MODELS.length){modelSel=mi;}
    return;
  }
  if(id==='modelConfirm'){
    lang=menuSel===0?'es':'en';initGame(modelSel);tutPage=0;state=S.TUT;return;
  }
  // ── Tutorial touch/click ──
  if(id==='tutNext'){tutPage++;if(tutPage>=T().tut.length){state=S.GAME;startVideo();startMusic();}return;}
  if(id==='skipTut'){state=S.GAME;startVideo();startMusic();return;}
  if(id==='setOpenDown'){shopTimeSettings.openHour=Math.max(0,shopTimeSettings.openHour-1);return;}
  if(id==='setOpenUp'){shopTimeSettings.openHour=Math.min(shopTimeSettings.closeHour-1,shopTimeSettings.openHour+1);return;}
  if(id==='setCloseDown'){shopTimeSettings.closeHour=Math.max(shopTimeSettings.openHour+1,shopTimeSettings.closeHour-1);return;}
  if(id==='setCloseUp'){shopTimeSettings.closeHour=Math.min(24,shopTimeSettings.closeHour+1);return;}
  if(id==='setDurDown'){shopTimeSettings.dayDurationSec=Math.max(60,shopTimeSettings.dayDurationSec-30);return;}
  if(id==='setDurUp'){shopTimeSettings.dayDurationSec=Math.min(600,shopTimeSettings.dayDurationSec+30);return;}
  if(id==='musicToggle'){toggleMusic();return;}
  if(id==='musicPrev'||id==='musicNext'){
    const songs=SONG_LIST;
    const ci=songs.indexOf(G.nowPlaying);
    const ni=id==='musicNext'?(ci+1)%songs.length:(ci-1+songs.length)%songs.length;
    G.nowPlaying=songs[ni];shopTimeSettings.nowPlaying=songs[ni];
    // Switch audio file if available locally
    if(SONG_FILES[songs[ni]]){
      bgMusic.src=SONG_FILES[songs[ni]];
      bgMusic.play().catch(()=>{});
    }
    addFloat(W/2,40,'♪ '+songs[ni],'#cc99dd');
    return;
  }
  if(id==='songPrev'||id==='songNext'){
    const songs=SONG_LIST;
    const ci=songs.indexOf(shopTimeSettings.nowPlaying);
    const ni=id==='songNext'?(ci+1)%songs.length:(ci-1+songs.length)%songs.length;
    shopTimeSettings.nowPlaying=songs[ni];
    if(G) G.nowPlaying=songs[ni];
    return;
  }
  if(id==='setBack'){saveShopSettings();state=S.MENU;return;}
  // Staff name/role settings
  const staffNames=['ANA','JORGE','LUCÍA','MARCOS','PABLO','ELENA','SARA','DIEGO','MARTA','HUGO','ALBA','INÉS'];
  if(id.startsWith('staffNamePrev')){
    const si=parseInt(id.slice(13));const st=shopTimeSettings.staff[si];
    const ci=staffNames.indexOf(st.name);st.name=staffNames[(ci-1+staffNames.length)%staffNames.length];return;
  }
  if(id.startsWith('staffNameNext')){
    const si=parseInt(id.slice(13));const st=shopTimeSettings.staff[si];
    const ci=staffNames.indexOf(st.name);st.name=staffNames[(ci+1)%staffNames.length];return;
  }
  if(id.startsWith('staffRoleCycle')){
    const si=parseInt(id.slice(14));shopTimeSettings.staff[si].role=(shopTimeSettings.staff[si].role+1)%4;return;
  }
  if(id==='menu'){uiOpen=!uiOpen;return;}
  if(id==='closeUI'){uiOpen=false;return;}
  if(id==='save'){saveGame();showEv('💾 Saved!','#88aa55');return;}
  if(id==='editor'){state=S.EDITOR;edSelIdx=-1;return;}
  // Editor actions
  if(id.startsWith('edsel')){edSelIdx=parseInt(id.slice(5));return;}
  if(id==='edSave'){saveLayout();edSaveNotify=90;playSaveBeep();return;}
  if(id==='edReset'){resetLayout();edSelIdx=-1;return;}
  if(id==='edExit'){state=S.GAME;return;}
  if(id==='edDelete'&&edSelIdx>=0&&edSelIdx<shopLayout.length){
    shopLayout.splice(edSelIdx,1);
    edSelIdx=-1;
    return;
  }
  if(id==='edAdd'){
    // Find first missing item from DEFAULT_LAYOUT and add it back
    for(const def of DEFAULT_LAYOUT){
      if(!shopLayout.find(i=>i.id===def.id)){
        shopLayout.push(JSON.parse(JSON.stringify(def)));
        edSelIdx=shopLayout.length-1;
        return;
      }
    }
    return;
  }
  if(edSelIdx>=0&&edSelIdx<shopLayout.length){
    const it=shopLayout[edSelIdx];
    if(id==='edUp'&&it.row>0){it.row--;return;}
    if(id==='edDown'&&it.row<ISO.rows-1){it.row++;return;}
    if(id==='edLeft'&&it.col>0){it.col--;return;}
    if(id==='edRight'&&it.col<ISO.cols-1){it.col++;return;}
    if(id==='edSxUp'){it.sx=Math.min(3,(it.sx||1)+0.1);return;}
    if(id==='edSxDown'){it.sx=Math.max(0.2,(it.sx||1)-0.1);return;}
    if(id==='edSyUp'){it.sy=Math.min(3,(it.sy||1)+0.1);return;}
    if(id==='edSyDown'){it.sy=Math.max(0.2,(it.sy||1)-0.1);return;}
  }
}

function showEv(msg,col){G.eventMsg=msg;G.eventTimer=160;G.eventColor=col||P.neon1;}
function addFloat(x,y,txt,col){G.floats.push({x,y,txt,col,life:65,vy:-0.65});}
function openPause(){
  G.pauseData={rev:G.weekRevenue,exp:G.weekExpenses,cust:G.customersToday,sat:G.satisfaction,fame:G.fame};
  state=S.PAUSE;
}

// ── GAME LOGIC ────────────────────────────────────────────────
function updateBars(){
  const hi=G.staff.filter(s=>s.hired);
  const avgStk=G.prods.reduce((a,p)=>a+(p.stock/p.max),0)/G.prods.length;
  G.bars[0].val=Math.min(100,35+hi.length*10+G.fame*0.25)|0;
  G.bars[1].val=Math.min(100,15+G.customersToday*3+G.satisfaction*0.4)|0;
  G.bars[2].val=(avgStk*100)|0;
  G.bars[3].val=Math.min(100,25+hi.length*11+G.satisfaction*0.4)|0;
}

function getRating(rev,target){
  const r=rev/target;
  if(r>=1.5) return'S'; if(r>=1.2) return'A'; if(r>=1.0) return'B';
  if(r>=0.8) return'C'; return'D';
}

function advanceYear(){
  if(G.year>=CFG.TOTAL_YEARS){
    // Game end
    const hireScore=G.staff.filter(s=>s.hired).reduce((a,s)=>a+s.level*200,0);
    G.totalScore=(G.totalRevenue/100+hireScore+G.fame*50)|0;
    state=S.GAME_END;
    saveGame();
    return;
  }
  G.yearsCompleted++;
  G.year++;G.week=1;G.weekTimer=0;G.yearRevenue=0;G.weekRevenue=0;G.weekExpenses=0;
  G.customersToday=0;G.custIn=0;G.custOut=0;G.yearEndAnim=0;G.yearRating=null;
  // Satisfaction decay on year transition
  G.satisfaction=Math.max(20,G.satisfaction-5);
  state=S.GAME;
  saveGame();
}

function endWeek(){
  // Pay salaries
  const salaries=G.staff.filter(s=>s.hired).reduce((a,s)=>a+CFG.SALARY[s.role]*s.level,0);
  if(salaries>0){
    G.money-=salaries;G.weekExpenses+=salaries;
    addFloat(SHOP.x+SHOP.w/2,SHOP.y+20,'-€'+salaries+' SAL.',P.red);
  }
  // Stock decay
  for(const p of G.prods) p.stock=Math.max(0,p.stock-(2+Math.random()*4|0));
  // Satisfaction decay
  G.satisfaction=Math.max(10,G.satisfaction-1.5);
  // Morale decay for unhired-slots
  for(const s of G.staff) if(s.hired) s.morale=Math.max(20,s.morale-2);
  updateBars();
  G.weekRevenue=0;G.weekExpenses=0;G.customersToday=0;G.custIn=0;G.custOut=0;
  // Reset day for next week
  G.gameTime=shopTimeSettings.openHour;
  G.dayEnded=false;
  G.weekTimer=0;
  // Turn off lamp for new morning — reset manual override
  elgatoState.manualOff=false;
  elgatoState.on=false;
  try{elgatoFetch('/elgato/lights',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({numberOfLights:1,lights:[{on:0}]})});}catch(e){}
  G.week++;
  if(G.week>CFG.WEEKS_PER_YEAR){
    // Year end
    const target=CFG.YEAR_TARGETS[G.year-1];
    const rating=getRating(G.yearRevenue,target);
    const bonus=T().ratingBonus[rating];
    G.money+=bonus;G.totalRevenue+=G.yearRevenue;
    G.yearRating=rating;G.yearBonus=bonus;G.yearEndAnim=0;
    if(G.yearRevenue<target*CFG.GAMEOVER_THRESHOLD){
      G.gameOverReason='target';
      G.totalScore=(G.totalRevenue/100)|0;
      state=S.GAME_END;
      saveGame();
      return;
    }
    state=S.YEAR_END;
    saveGame();
    return;
  }
  if(G.week===1&&Math.random()<0.3) showEv(T().events[6],P.neon3);
}

function updateGame(){
  tt++;
  // ── GAME TIME: advance clock (1 day = dayDurationSec real seconds) ──
  const dayHours=shopTimeSettings.closeHour-shopTimeSettings.openHour;
  const framesPerDay=shopTimeSettings.dayDurationSec*60; // at 60fps
  const hoursPerFrame=dayHours/framesPerDay;
  G.gameTime+=hoursPerFrame;
  // Sync weekTimer to gameTime progress (for compatibility with existing systems)
  G.weekTimer=Math.floor(((G.gameTime-shopTimeSettings.openHour)/dayHours)*CFG.WEEK_TICKS);
  // Progressive lighting: 16h=10%, +25%/h, 20h+=100%, 21h+=off
  // Calculate lamp intensity based on game time
  let lampIntensity=0;
  if(G.gameTime>=16&&G.gameTime<shopTimeSettings.closeHour&&!G.dayEnded){
    lampIntensity=Math.min(100,10+(G.gameTime-16)*25); // 16h=10,17h=35,18h=60,19h=85,20h=100+
  }
  // If manually turned off, intensity is 0 visually
  if(elgatoState.manualOff) lampIntensity=0;
  // DJ strobe effect: lamp flashes on/off rapidly
  const djOn=G.staff&&G.staff.some(st=>st.hired&&st.role===4);
  if(djOn){
    elgatoState.on=true;elgatoState.manualOff=false;
    lampIntensity=Math.sin(tt*0.3)>0?100:10;
  }
  G.lampIntensity=lampIntensity;
  // Auto-turn on lamp when intensity > 0 (only if not manually turned off)
  if(lampIntensity>0&&!elgatoState.on&&!elgatoState.manualOff){
    elgatoState.on=true;
    elgatoState.manualOff=false;
    elgatoState.notify=60;
  }
  // Send progressive brightness to real Elgato lamp (throttled: every 60 frames ≈ 1s)
  if(elgatoState.on&&lampIntensity>0&&!elgatoState.manualOff&&tt%60===0){
    try{elgatoFetch('/elgato/lights',{method:'PUT',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({numberOfLights:1,lights:[{on:1,brightness:Math.round(lampIntensity)}]})
    });}catch(e){}
  }
  // Update wall clock from game time
  _clockH=Math.floor(G.gameTime)%12;
  _clockM=Math.floor((G.gameTime%1)*60);
  // Day end = closing time
  if(G.gameTime>=shopTimeSettings.closeHour&&!G.dayEnded){
    G.dayEnded=true;
    G.weekTimer=CFG.WEEK_TICKS; // trigger endWeek
  }

  // ── PLAYER CONTROL: move manager with Q/A/O/P ──
  // Collision: convert screen position to iso grid, reject if outside floor
  if(G.staff&&G.staff[0]&&G.staff[0].hired){
    const mgr=G.staff[0];
    const spd=1.8;
    let mx=0,my=0;
    // Q=up(NW), A=down(SE), O=left(SW), P=right(NE)
    if(keys['KeyQ']) {mx-=spd*0.7;my-=spd*0.35;}
    if(keys['KeyA']) {mx+=spd*0.7;my+=spd*0.35;}
    if(keys['KeyO']) {mx-=spd*0.7;my+=spd*0.35;}
    if(keys['KeyP']) {mx+=spd*0.7;my-=spd*0.35;}
    if(mx!==0||my!==0){
      // Calculate new position
      const newX=mgr.x+mx, newY=mgr.y+my;
      // Collision: check feet position against floor + furniture
      const feetX=newX+7, feetY=newY+25;
      if(canWalkTo(feetX,feetY)){
        mgr.x=newX;
        mgr.y=newY;
      }
      // Update facing direction even if blocked
      mgr.dir=mx>0?1:-1;
      // Walking animation
      mgr.aTimer++;
      if(mgr.aTimer>6){mgr.aFrame=(mgr.aFrame+1)%2;mgr.aTimer=0;}
      mgr.isWalking=true;
    } else {
      mgr.isWalking=false;
    }
  }

  // ── FIESTA: Any hired staff touches a customer → show on Admira ──
  if(G.staff&&G.custs){
    let partyTriggered=false;
    for(const s of G.staff){
      if(!s.hired||s.fired||partyTriggered) continue;
      for(const c of G.custs){
        const dx=s.x-c.x,dy=s.y-c.y;
        if(Math.sqrt(dx*dx+dy*dy)<18){
          if(!G.tftParty||G.tftParty<=0){
            G.tftParty=180;
            addFloat(s.x,s.y-40,'🎉 Fiesta!','#ff44cc');
          }
          partyTriggered=true;
          break;
        }
      }
    }
  }
  if(G.tftParty>0) G.tftParty--;

  // Rush hour (badge shown in top bar, no floating event)
  if(!G.rush.active&&Math.random()<CFG.RUSH_CHANCE){
    G.rush.active=true;G.rush.timer=CFG.RUSH_DURATION;
  }
  if(G.rush.active){
    G.rush.timer--;
    if(G.rush.timer<=0){G.rush.active=false;}
  }

  // Inspection (badge shown in top bar, no floating event for start)
  if(!G.inspect.active&&Math.random()<CFG.INSPECT_CHANCE){
    G.inspect.active=true;G.inspect.timer=200;G.inspect.warned=false;
  }
  if(G.inspect.active){
    G.inspect.timer--;
    if(G.inspect.timer===100&&!G.inspect.warned){
      G.inspect.warned=true;
      const hiCnt=G.staff.filter(s=>s.hired).length;
      const avgStk=G.prods.reduce((a,p)=>a+(p.stock/p.max),0)/G.prods.length;
      if(hiCnt>=1&&avgStk>0.4){
        showEv(T().inspPass,P.green);G.satisfaction=Math.min(100,G.satisfaction+8);
        addFloat(W/2,H/2-40,'✓ PASS',P.green);
      } else {
        const fine=600+Math.random()*400|0;
        G.money-=fine;G.weekExpenses+=fine;
        showEv(T().inspFail,P.inspGlow);addFloat(W/2,H/2-40,'-€'+fine,P.red);
        G.satisfaction=Math.max(10,G.satisfaction-15);
      }
      G.inspect.active=false;
    }
    if(G.inspect.timer<=0) G.inspect.active=false;
  }

  // Staff work
  const mult=G.rush.active?CFG.RUSH_MULT:1;
  for(const s of G.staff){
    if(!s.hired) continue;
    s.aTimer++;if(s.aTimer>10){s.aFrame=(s.aFrame+1)%2;s.aTimer=0;}
    if(s.busy>0) s.busy--;
    if(s.bTimer>0) s.bTimer--;
    s.energy=Math.max(15,s.energy-(s.busy>0?0.04:0.01));
    if(s.energy<25) s.energy=Math.min(100,s.energy+0.08);
    const moraleFactor=0.7+(s.morale/100)*0.3;
    if(Math.random()<CFG.SALE_PROB*moraleFactor*mult&&s.bTimer===0){
      const p=G.prods[Math.floor(Math.random()*G.prods.length)];
      if(p.stock>0){
        s.bTimer=70;s.busy=50;
        const qty=Math.max(1,(s.level*CFG.SALE_BASE*(0.7+Math.random()*0.6)*p.factor*mult)|0);
        const rev=qty*p.price;
        G.money+=rev;G.weekRevenue+=rev;G.yearRevenue+=rev;G.totalRevenue+=rev;
        p.stock=Math.max(0,p.stock-Math.max(1,(qty/p.price)|0));
        addFloat(s.x+7,s.y-28,'€'+rev,P.green);
        if(G.rush.active) addFloat(s.x+7,s.y-16,'x'+CFG.RUSH_MULT.toFixed(1),P.rushGlow);
        G.satisfaction=Math.min(100,G.satisfaction+0.3);
      }
    }
  }

  // Customers
  if(Math.random()<0.006*Math.max(1,G.staff.filter(s=>s.hired).length)*(G.rush.active?2:1)) spawnCust();
  for(let i=G.custs.length-1;i>=0;i--){
    const c=G.custs[i];c.ft++;if(c.ft>10){c.fr=(c.fr+1)%2;c.ft=0;}
    if(c.st==='walk'){
      const dx=c.tx-c.x,dy=c.ty-c.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<3){c.st='browse';c.timer=60+Math.random()*80;}
      else{
        const nx=c.x+dx/d*1.3, ny=c.y+dy/d*1.3;
        if(canWalkTo(nx+5,ny+20)){c.x=nx;c.y=ny;c.dir=dx<0?-1:1;}
        else{c.st='browse';c.timer=30+Math.random()*40;} // blocked→stop and browse
      }
    } else if(c.st==='browse'){
      c.timer--;if(c.timer<=0){const dp=toIso(ISO.cols,3);c.st='leave';c.tx=dp.x;c.ty=dp.y-40;G.doorOpen=60;}
    } else if(c.st==='leave'){
      const dx=c.tx-c.x,dy=c.ty-c.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<30&&G.doorOpen<30) G.doorOpen=40;
      if(d<3){G.custOut++;G.custs.splice(i,1);}
      else{
        const nx=c.x+dx/d*1.6, ny=c.y+dy/d*1.6;
        if(canWalkTo(nx+5,ny+20)){c.x=nx;c.y=ny;c.dir=dx<0?-1:1;}
        else{c.x+=dx/d*0.5;c.y+=dy/d*0.5;c.dir=dx<0?-1:1;} // slide around when leaving
      }
    }
  }

  // Floats
  for(let i=G.floats.length-1;i>=0;i--){
    G.floats[i].y+=G.floats[i].vy;G.floats[i].life--;
    if(G.floats[i].life<=0) G.floats.splice(i,1);
  }

  if(G.eventTimer>0) G.eventTimer--;
  if(G.doorOpen>0) G.doorOpen--;
  if(monitorAlert.timer>0) monitorAlert.timer--;
  else monitorAlert.active=false;
  if(G.tftOgre>0) G.tftOgre--;
  if(G.tftStockTimer>0){G.tftStockTimer--;}else{G.tftStockIdx=-1;}
  // Fired staff walks to door and leaves
  for(const s of G.staff){
    if(!s.fired) continue;
    const dx=s.fireTx-s.x,dy=s.fireTy-s.y;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<5){
      // Reached door — unhire
      s.hired=false;s.fired=false;s.fireBubble=false;s.clickBubble=0;
      G.doorOpen=50;
    } else {
      s.x+=dx/d*1.5;s.y+=dy/d*1.5;
      s.dir=dx>0?1:-1;
      s.aTimer++;if(s.aTimer>6){s.aFrame=(s.aFrame+1)%2;s.aTimer=0;}
      s.isWalking=true;
    }
  }

  // Week end
  if(G.weekTimer>=CFG.WEEK_TICKS){G.weekTimer=0;endWeek();}
  updateBars();
}

function spawnCust(){
  if(G.custs.length>=7) return;
  const ci=Math.floor(Math.random()*6);
  // Spawn at door, target a walkable tile
  const doorIso=toIso(ISO.cols,3);
  let tCol,tRow,attempts=0;
  do{
    tCol=2+Math.random()*6|0;
    tRow=1+Math.random()*4|0;
    attempts++;
  }while(isTileBlocked(tCol,tRow)&&attempts<20);
  const tIso=toIso(tCol,tRow);
  G.custs.push({
    x:doorIso.x,y:doorIso.y-40,
    tx:tIso.x-7,ty:tIso.y-20,
    gCol:ISO.cols,gRow:3,
    st:'walk',timer:0,col:P.prods[ci],hair:Math.floor(Math.random()*6),
    fr:0,ft:0,dir:-1
  });
  G.doorOpen=60; // open door for customer entering
  G.customersToday++;G.totalCustomers++;G.custIn++; // count entry
}

const rx=(x,y,w,h,c,lw=1)=>{cx.strokeStyle=c;cx.lineWidth=lw;cx.strokeRect((x|0)+.5,(y|0)+.5,w-1,h-1);};
const tx=(s,x,y,c,sz=9,al='left')=>{cx.fillStyle=c;cx.font=sz+'px monospace';cx.textAlign=al;cx.fillText(s,x|0,y|0);cx.textAlign='left';};
const glow=(c,b=8)=>{cx.shadowColor=c;cx.shadowBlur=b;};
const nog=()=>{cx.shadowBlur=0;};
const nl=(x1,y1,x2,y2,c,lw=1)=>{glow(c,5);cx.strokeStyle=c;cx.lineWidth=lw;cx.beginPath();cx.moveTo(x1,y1);cx.lineTo(x2,y2);cx.stroke();nog();};

// ── ISOMETRIC ENGINE ─────────────────────────────────────────
// Kairosoft-style: FULL WIDTH, tall walls, steep angle
// SHOP: x=0, y=28, w=800, h=442 (full width between bars)
// Wall ~170px, floor diamond ~270px
// Grid 12x6 → sum=18, tileW=800*2/18≈88, tileH=270*2/18=30
const ISO={
  tileW:80,tileH:28,    // slightly smaller tiles to fit +1 col/row
  cols:13,rows:7,        // +1 each direction for bigger shop
  ox:270,oy:185,         // adjusted for larger grid
  wallH:165,             // walls
  doorCol:12,doorRow:3,  // door far right (moved with cols)
};
// Cart→Iso: convert grid (col,row) to screen pixel
function toIso(col,row){
  return {
    x: ISO.ox + (col-row)*ISO.tileW/2,
    y: ISO.oy + (col+row)*ISO.tileH/2
  };
}
// Draw a flat diamond tile
function drawIsoTile(col,row,color,strokeColor){
  const p=toIso(col,row);
  const hw=ISO.tileW/2, hh=ISO.tileH/2;
  cx.beginPath();
  cx.moveTo(p.x,p.y);
  cx.lineTo(p.x+hw,p.y+hh);
  cx.lineTo(p.x,p.y+ISO.tileH);
  cx.lineTo(p.x-hw,p.y+hh);
  cx.closePath();
  cx.fillStyle=color;cx.fill();
  if(strokeColor){cx.strokeStyle=strokeColor;cx.lineWidth=0.5;cx.stroke();}
}
// Draw a 3D isometric block (box)
function drawIsoBlock(col,row,bw,bd,bh,topCol,leftCol,rightCol,neonCol){
  // bw=width in tiles, bd=depth in tiles, bh=height in px
  const p=toIso(col,row);
  const hw=ISO.tileW/2, hh=ISO.tileH/2;
  const w=bw*hw, d=bd*hw;
  const wh=bw*hh, dh=bd*hh;
  // Top face
  cx.beginPath();
  cx.moveTo(p.x,p.y-bh);
  cx.lineTo(p.x+w,p.y+wh-bh);
  cx.lineTo(p.x+w-d,p.y+wh+dh-bh);
  cx.lineTo(p.x-d,p.y+dh-bh);
  cx.closePath();
  cx.fillStyle=topCol;cx.fill();
  // Left face
  cx.beginPath();
  cx.moveTo(p.x-d,p.y+dh-bh);
  cx.lineTo(p.x+w-d,p.y+wh+dh-bh);
  cx.lineTo(p.x+w-d,p.y+wh+dh);
  cx.lineTo(p.x-d,p.y+dh);
  cx.closePath();
  cx.fillStyle=leftCol;cx.fill();
  // Right face
  cx.beginPath();
  cx.moveTo(p.x+w-d,p.y+wh+dh-bh);
  cx.lineTo(p.x+w,p.y+wh-bh);
  cx.lineTo(p.x+w,p.y+wh);
  cx.lineTo(p.x+w-d,p.y+wh+dh);
  cx.closePath();
  cx.fillStyle=rightCol;cx.fill();
  // Neon edge glow on top edges
  if(neonCol){
    glow(neonCol,6);
    cx.strokeStyle=neonCol;cx.lineWidth=1.5;
    cx.beginPath();
    cx.moveTo(p.x,p.y-bh);cx.lineTo(p.x+w,p.y+wh-bh);
    cx.moveTo(p.x,p.y-bh);cx.lineTo(p.x-d,p.y+dh-bh);
    cx.stroke();nog();
  }
}
// Draw isometric shadow ellipse
function drawIsoShadow(sx,sy,rw,rh){
  cx.save();cx.globalAlpha=0.18;
  cx.beginPath();cx.ellipse(sx,sy+2,rw,rh,0,0,Math.PI*2);
  cx.fillStyle='#000';cx.fill();
  cx.restore();
}

// ── DRAW CHIBI (ISOMETRIC) ────────────────────────────────────
function chibi(x,y,dir,shirt,hair,frame,busy,tick,scale=1){
  cx.save();
  if(scale!==1){cx.translate(x,y);cx.scale(scale,scale);cx.translate(-x,-y);}
  const flip=dir===-1;
  if(flip){cx.translate(x+12,0);cx.scale(-1,1);cx.translate(-x,0);}
  // Shadow
  drawIsoShadow(x+7,y+27,8,3);
  // Legs with walk animation
  const lk=frame===0?0:2;
  r(x+3,y+18,3,7+lk,P.pants);r(x+8,y+18,3,7-lk,P.pants);
  // Shoes
  r(x+2,y+24+lk,4,3,P.shoes);r(x+8,y+24-lk,4,3,P.shoes);
  // Body (torso)
  r(x+1,y+8,12,11,P.shirts[shirt%P.shirts.length]);
  // Shirt highlight
  r(x+4,y+10,5,3,'#ffffff18');
  // X logo on blue Altadis shirt (shirt index 0)
  if(shirt===0){
    cx.strokeStyle='#ffffff';cx.lineWidth=1.2;
    cx.beginPath();cx.moveTo(x+4,y+10);cx.lineTo(x+10,y+16);cx.stroke();
    cx.beginPath();cx.moveTo(x+10,y+10);cx.lineTo(x+4,y+16);cx.stroke();
  }
  // Arms with busy animation
  const ak=busy?(frame===0?-2:2):0;
  r(x-1,y+9+ak,3,8,P.shirts[shirt%P.shirts.length]);
  r(x+12,y+9-ak,3,8,P.shirts[shirt%P.shirts.length]);
  // Head
  r(x+1,y-1,12,12,P.skin);
  // Hair (fuller, isometric style)
  r(x+0,y-4,14,7,P.hair[hair%P.hair.length]);
  r(x-1,y-3,2,9,P.hair[hair%P.hair.length]);
  r(x+13,y-3,2,9,P.hair[hair%P.hair.length]);
  // Eyes (bigger, more expressive)
  const blink=Math.floor(tick/90)%9===0;
  r(x+3,y+3,3,blink?1:3,'#1a1a2e');
  r(x+9,y+3,3,blink?1:3,'#1a1a2e');
  if(!blink){r(x+4,y+4,1,1,P.white);r(x+10,y+4,1,1,P.white);}
  // Nose hint
  r(x+6,y+7,2,1,'#eebb99');
  cx.restore();
}

function drawHelp(){
  // Background
  r(0,0,W,H,'#0a0a14');
  // Grid
  cx.globalAlpha=0.06;
  for(let i=0;i<W;i+=40) r(i,0,1,H,'#44ccaa');
  for(let i=0;i<H;i+=40) r(0,i,W,1,'#44ccaa');
  cx.globalAlpha=1;

  const pg=HELP_PAGES[helpPage];
  const bw=520,bh=380;
  const bx=(W-bw)/2, by=(H-bh)/2-10;

  // Box shadow + border
  r(bx+4,by+4,bw,bh,'#000');
  r(bx,by,bw,bh,'#0c0c1a');
  glow('#44ccaa',8);rx(bx,by,bw,bh,'#44ccaa',2);nog();

  // Page indicator dots
  const dotY=by+12;
  for(let i=0;i<HELP_PAGES.length;i++){
    const dx=W/2-((HELP_PAGES.length-1)*10)/2+i*10;
    if(i===helpPage){ glow('#44ccaa',6);r(dx-3,dotY-3,6,6,'#44ccaa');nog(); }
    else { r(dx-2,dotY-2,4,4,'#335555'); }
  }

  // Title
  const titleY=by+38;
  glow('#44ccaa',4);tx(pg.title,W/2,titleY,'#44ccaa',12,'center');nog();
  // Separator
  r(bx+30,titleY+6,bw-60,1,'#44ccaa');

  // Content lines
  const startY=titleY+22;
  for(let i=0;i<pg.lines.length;i++){
    const ly=startY+i*22;
    if(ly>by+bh-50) break;
    const line=pg.lines[i];
    if(line.startsWith('  ')){ tx(line,bx+40,ly,'#99bbaa',9); }
    else if(line===''){ /* skip blank */ }
    else if(line.includes('—')){ tx(line,bx+30,ly,'#ccddcc',9); }

  // Page number
  tx((helpPage+1)+'/'+HELP_PAGES.length,W/2,by+bh-12,'#556666',8,'center');

  // Navigation buttons
  const btnW=90,btnH=26;

function drawIsoCityBuilding(b){
  const p=toIso(b.col,b.row);
  const hw=ISO.tileW/2, hh=ISO.tileH/2;
  const w=b.bw*hw, d=b.bd*hw;
  const wh=b.bw*hh, dh=b.bd*hh;
  const topCol=`hsl(${b.hue},${b.sat}%,${b.lit+10}%)`;
  const leftCol=`hsl(${b.hue},${b.sat}%,${b.lit-5}%)`;
  const rightCol=`hsl(${b.hue},${b.sat}%,${b.lit}%)`;
  // Top face
  cx.beginPath();
  cx.moveTo(p.x,p.y-b.h);
  cx.lineTo(p.x+w,p.y+wh-b.h);
  cx.lineTo(p.x+w-d,p.y+wh+dh-b.h);
  cx.lineTo(p.x-d,p.y+dh-b.h);
  cx.closePath();
  cx.fillStyle=topCol;cx.fill();
  // Left face
  cx.beginPath();
  cx.moveTo(p.x-d,p.y+dh-b.h);
  cx.lineTo(p.x+w-d,p.y+wh+dh-b.h);
  cx.lineTo(p.x+w-d,p.y+wh+dh);
  cx.lineTo(p.x-d,p.y+dh);
  cx.closePath();
  cx.fillStyle=leftCol;cx.fill();
  // Right face
  cx.beginPath();
  cx.moveTo(p.x+w-d,p.y+wh+dh-b.h);
  cx.lineTo(p.x+w,p.y+wh-b.h);
  cx.lineTo(p.x+w,p.y+wh);
  cx.lineTo(p.x+w-d,p.y+wh+dh);
  cx.closePath();
  cx.fillStyle=rightCol;cx.fill();
  // Windows on left face
  const faceH=b.h;
  const wRows=Math.min(b.winRows,Math.floor((faceH-8)/9));
  const wCols=Math.min(b.winCols,Math.floor((b.bw*hw)/8));
  for(let wy=0;wy<wRows;wy++){
    for(let wx=0;wx<wCols;wx++){
      const lit=Math.sin(tt*0.004+b.col*10+wx*5+wy*8)>0.15;
      const fy=p.y+dh-b.h+6+wy*9;
      const fx=p.x-d+3+wx*8;
      cx.fillStyle=lit?'#eedd77':'#6a8899';
      cx.fillRect(fx,fy,5,5);
    }
  }
  // Windows on right face
  const rCols=Math.min(b.winCols,Math.floor((b.bd*hw)/8));
  for(let wy=0;wy<wRows;wy++){
    for(let wx=0;wx<rCols;wx++){
      const lit=Math.sin(tt*0.004+b.col*7+wx*4+wy*11)>0.2;
      const fy=p.y+wh+dh-b.h+6+wy*9-(b.bd*hh);
      const fx=p.x+w-d+3+wx*8;
      cx.fillStyle=lit?'#eedd77':'#7a99aa';
      cx.fillRect(fx,fy,4,5);
    }
  }
}

function drawCityBg(){
  const skyTop=SHOP.y;
  const skyH=ISO.wallH+60;
  // Sky gradient
  const skyGrad=cx.createLinearGradient(0,skyTop,0,skyTop+skyH);
  const skyCols=G?getSkyColors(G.gameTime):getSkyColors(12);
  skyGrad.addColorStop(0,skyCols[0]);
  skyGrad.addColorStop(0.5,skyCols[1]);
  skyGrad.addColorStop(1,skyCols[2]);
  cx.fillStyle=skyGrad;
  cx.fillRect(0,skyTop,W,skyH);

  // Clouds
  cx.fillStyle='#d0e8f8';
  const ct=tt*0.12;
  for(let i=0;i<4;i++){
    const cx2=((i*220+ct)%1000)-50;
    const cy2=skyTop+12+i*14;
    cx.beginPath();cx.arc(cx2,cy2,10+i*2,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.arc(cx2+14,cy2-3,8+i,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.arc(cx2+26,cy2+1,9+i,0,Math.PI*2);cx.fill();
  }

  // Draw isometric city buildings (behind shop)
  for(const b of CITY_BUILDINGS){
    drawIsoCityBuilding(b);
  }

  // Isometric street/sidewalk tiles in front of buildings
  for(let c=-2;c<ISO.cols+3;c++){
    for(let rr=-2;rr<0;rr++){
      drawIsoTile(c,rr,'#8a8878','#7a786810');
    }
  }
  // Grass tiles around the shop exterior (bottom and right sides)
  for(let c=-3;c<ISO.cols+5;c++){
    for(let rr=ISO.rows;rr<ISO.rows+4;rr++){
      const gc=((c+rr)%2===0)?'#6a9a48':'#5e8e42';
      drawIsoTile(c,rr,gc,'#5a8a3810');
    }
  }
  for(let c=ISO.cols;c<ISO.cols+5;c++){
    for(let rr=-2;rr<ISO.rows+4;rr++){
      const gc=((c+rr)%2===0)?'#6a9a48':'#5e8e42';
      drawIsoTile(c,rr,gc,'#5a8a3810');
    }
  }
}

// ── DRAW SHOP (ISOMETRIC — Kairosoft warm style) ─────────────
function drawShop(){
  // Clip to shop area
  cx.save();
  cx.beginPath();cx.rect(SHOP.x,SHOP.y,SHOP.w,SHOP.h);cx.clip();

  // ── FLOOR (uniform carpet — Kairosoft style) ──
  for(let row=0;row<ISO.rows;row++){
    for(let col=0;col<ISO.cols;col++){
      // Subtle carpet texture with very slight variation
      let floorCol=((col+row)%2===0)?'#b8b0a0':'#b4ac9c';
      if(G.rush.active){
        const pulse=0.05*Math.sin(tt*.08);
        floorCol=((col+row)%2===0)?`rgba(200,170,110,${0.9+pulse})`:`rgba(195,165,105,${0.9+pulse})`;
      }
      if(G.inspect.active&&G.inspect.timer>100){
        floorCol=((col+row)%2===0)?'#c8a8a8':'#c0a0a0';
      }
      drawIsoTile(col,row,floorCol,'#a8a09010');
    }
  }

  // ── BACK WALL (cream/beige, Kairosoft style) ──
  const wallPts=[];
  for(let c=0;c<=ISO.cols;c++) wallPts.push(toIso(c,0));
  // Wall body
  cx.beginPath();
  cx.moveTo(wallPts[0].x,wallPts[0].y);
  for(let i=1;i<wallPts.length;i++) cx.lineTo(wallPts[i].x,wallPts[i].y);
  for(let i=wallPts.length-1;i>=0;i--) cx.lineTo(wallPts[i].x,wallPts[i].y-ISO.wallH);
  cx.closePath();
  cx.fillStyle=P.wallInner;cx.fill();
  // Wall panel lines (subtle horizontal)
  cx.globalAlpha=0.08;
  for(let h=15;h<ISO.wallH;h+=20){
    cx.strokeStyle='#a09070';cx.lineWidth=0.5;cx.beginPath();
    cx.moveTo(wallPts[0].x,wallPts[0].y-h);
    for(let i=1;i<wallPts.length;i++) cx.lineTo(wallPts[i].x,wallPts[i].y-h);
    cx.stroke();
  }
  cx.globalAlpha=1;
  // Baseboard (darker strip at bottom of wall)
  cx.beginPath();
  cx.moveTo(wallPts[0].x,wallPts[0].y);
  for(let i=1;i<wallPts.length;i++) cx.lineTo(wallPts[i].x,wallPts[i].y);
  for(let i=wallPts.length-1;i>=0;i--) cx.lineTo(wallPts[i].x,wallPts[i].y-8);
  cx.closePath();
  cx.fillStyle='#9a8868';cx.fill();
  // Ceiling line (thin dark border at top)
  cx.strokeStyle='#b0a080';cx.lineWidth=2;cx.beginPath();
  cx.moveTo(wallPts[0].x,wallPts[0].y-ISO.wallH);
  for(let i=1;i<wallPts.length;i++) cx.lineTo(wallPts[i].x,wallPts[i].y-ISO.wallH);
  cx.stroke();

  // ── WINDOWS on back wall (half size, centered in wall) ──
  const winCols=[2.5,6,9.5]; // shifted right toward door (pared 1)
  for(const wc of winCols){
    const wp1=toIso(wc,0), wp2=toIso(wc+1.2,0);
    const whei=Math.floor((ISO.wallH-50)*0.55);
    const wy=wp1.y-ISO.wallH+Math.floor((ISO.wallH-whei)/2)-Math.floor(ISO.wallH*0.1); // 10% higher
    const wwid=wp2.x-wp1.x;
    // Window frame outer
    r(wp1.x-3,wy-3,wwid+6,whei+6,'#e8e4dc');
    // Clip to window and draw city through it
    cx.save();
    cx.beginPath();cx.rect(wp1.x,wy,wwid,whei);cx.clip();
    // Sky
    const skyGrad=cx.createLinearGradient(0,wy,0,wy+whei);
    const wSkyCols=G?getSkyColors(G.gameTime):getSkyColors(12);
    skyGrad.addColorStop(0,wSkyCols[0]);
    skyGrad.addColorStop(0.5,wSkyCols[1]);
    skyGrad.addColorStop(1,wSkyCols[2]);
    cx.fillStyle=skyGrad;cx.fillRect(wp1.x,wy,wwid,whei);
    // Clouds
    cx.fillStyle='#d0e8f8';
    const cOff=((tt*0.1+wc*80)%250)-40;
    cx.beginPath();cx.arc(wp1.x+cOff,wy+15,6,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.arc(wp1.x+cOff+10,wy+12,5,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.arc(wp1.x+cOff+18,wy+14,5,0,Math.PI*2);cx.fill();
    // Isometric buildings through window (scaled down, offset per window)
    const winIdx=(wc-1.5)/3.5;
    for(let bi=0;bi<6;bi++){
      const b=CITY_BUILDINGS[Math.floor(winIdx*5)+bi];
      if(!b) continue;
      // Mini isometric building in window
      const bx=wp1.x+8+bi*((wwid-16)/6);
      const bBase=wy+whei;
      const bh=b.h*0.4;
      const bw2=12+bi%3*4;
      const bd2=6;
      // Front face
      cx.fillStyle=`hsl(${b.hue},${b.sat}%,${b.lit}%)`;
      cx.fillRect(bx,bBase-bh,bw2,bh);
      // Right face (isometric depth)
      cx.beginPath();
      cx.moveTo(bx+bw2,bBase-bh);
      cx.lineTo(bx+bw2+bd2,bBase-bh-bd2*0.5);
      cx.lineTo(bx+bw2+bd2,bBase-bd2*0.5);
      cx.lineTo(bx+bw2,bBase);
      cx.closePath();
      cx.fillStyle=`hsl(${b.hue},${b.sat}%,${b.lit-10}%)`;cx.fill();
      // Top face
      cx.beginPath();
      cx.moveTo(bx,bBase-bh);
      cx.lineTo(bx+bd2,bBase-bh-bd2*0.5);
      cx.lineTo(bx+bw2+bd2,bBase-bh-bd2*0.5);
      cx.lineTo(bx+bw2,bBase-bh);
      cx.closePath();
      cx.fillStyle=`hsl(${b.hue},${b.sat}%,${b.lit+8}%)`;cx.fill();
      // Mini windows
      const mRows=Math.min(4,Math.floor(bh/9));
      const mCols=Math.min(2,Math.floor(bw2/7));
      for(let mr=0;mr<mRows;mr++){
        for(let mc=0;mc<mCols;mc++){
          const lit=Math.sin(tt*0.004+bi*7+mc*4+mr*9)>0.15;
          cx.fillStyle=lit?'#eecc66':'#6a8899';
          cx.fillRect(bx+2+mc*6,bBase-bh+4+mr*9,4,5);
        }
      }
    }
    cx.restore();
    // Crossbars
    cx.strokeStyle='#d0ccbc';cx.lineWidth=2.5;
    cx.beginPath();
    cx.moveTo(wp1.x+wwid/2,wy);cx.lineTo(wp1.x+wwid/2,wy+whei);
    cx.moveTo(wp1.x,wy+whei*0.45);cx.lineTo(wp1.x+wwid,wy+whei*0.45);
    cx.stroke();
    // Frame border
    rx(wp1.x-3,wy-3,wwid+6,whei+6,'#9a8a68',1.5);
    // Window sill
    r(wp1.x-5,wy+whei+3,wwid+10,5,'#c8c0a8');
  }

  // ── BIRDS flying past windows (different color each pass) ──
  const birdColors=['#2a2a2a','#cc4422','#2266cc','#ddaa00','#22aa44','#aa22aa','#dd6622','#4488aa'];
  const birdCycleLen=700;
  const birdCycleNum=Math.floor(tt/birdCycleLen); // which cycle we're on
  const birdPhase=(tt%birdCycleLen)/birdCycleLen;  // 0→1 within cycle
  const birdCol2=0.5+birdPhase*10;
  const birdIso=toIso(birdCol2,0);
  const birdBaseY=toIso(birdCol2,0).y-ISO.wallH+Math.floor((ISO.wallH)*0.35);
  const birdBob=Math.sin(tt*0.12)*3;
  const birdX=birdIso.x;
  const birdY=birdBaseY+birdBob;
  const wingFrame=Math.floor(tt/6)%3;
  // Pick color based on cycle number
  const birdColor=birdColors[birdCycleNum%birdColors.length];
  // Belly/highlight color (lighter version)
  const birdBelly=birdCycleNum%2===0?'#ffffff44':'#ffffff22';
  // Draw bird only through window glass
  for(const wc of winCols){
    const wp1=toIso(wc,0), wp2=toIso(wc+1.2,0);
    const wwy=wp1.y-ISO.wallH+Math.floor((ISO.wallH-Math.floor((ISO.wallH-50)*0.55))/2);
    const wwid2=wp2.x-wp1.x;
    const whei2=Math.floor((ISO.wallH-50)*0.55);
    if(birdX>wp1.x-12&&birdX<wp1.x+wwid2+12){
      cx.save();
      cx.beginPath();cx.rect(wp1.x,wwy,wwid2,whei2);cx.clip();
      // Body
      cx.fillStyle=birdColor;
      cx.beginPath();cx.ellipse(birdX,birdY,5,2.5,0,0,Math.PI*2);cx.fill();
      // Belly highlight
      cx.fillStyle=birdBelly;
      cx.beginPath();cx.ellipse(birdX+1,birdY+1,3,1.5,0,0,Math.PI*2);cx.fill();
      // Wings (flapping)
      cx.fillStyle=birdColor;
      const wy1=wingFrame===0?-5:wingFrame===1?-2:-6;
      const wy2=wingFrame===0?-4:wingFrame===1?-6:-2;
      cx.beginPath();
      cx.moveTo(birdX-2,birdY);cx.lineTo(birdX-8,birdY+wy1);cx.lineTo(birdX-4,birdY-1);cx.fill();
      cx.beginPath();
      cx.moveTo(birdX+2,birdY);cx.lineTo(birdX+8,birdY+wy2);cx.lineTo(birdX+4,birdY-1);cx.fill();
      // Tail
      cx.beginPath();
      cx.moveTo(birdX-5,birdY);cx.lineTo(birdX-9,birdY+2);cx.lineTo(birdX-5,birdY+1);cx.fill();
      // Head/beak
      cx.beginPath();cx.arc(birdX+5,birdY-1,1.5,0,Math.PI*2);cx.fill();
      cx.fillStyle='#ee8800';
      cx.beginPath();cx.moveTo(birdX+7,birdY-1);cx.lineTo(birdX+10,birdY);cx.lineTo(birdX+7,birdY+0.5);cx.fill();
      // Eye
      cx.fillStyle='#fff';
      cx.beginPath();cx.arc(birdX+5.5,birdY-1.5,0.8,0,Math.PI*2);cx.fill();
      cx.fillStyle='#000';
      cx.beginPath();cx.arc(birdX+5.8,birdY-1.5,0.4,0,Math.PI*2);cx.fill();
      cx.restore();
    }
  }

  // ── LEFT WALL (slightly darker, Kairosoft style) ──
  const lwPts=[];
  for(let rr=0;rr<=ISO.rows;rr++) lwPts.push(toIso(0,rr));
  cx.beginPath();
  cx.moveTo(lwPts[0].x,lwPts[0].y);
  for(let i=1;i<lwPts.length;i++) cx.lineTo(lwPts[i].x,lwPts[i].y);
  for(let i=lwPts.length-1;i>=0;i--) cx.lineTo(lwPts[i].x,lwPts[i].y-ISO.wallH);
  cx.closePath();
  cx.fillStyle='#d0c4a8';cx.fill();
  // Left wall baseboard
  cx.beginPath();
  cx.moveTo(lwPts[0].x,lwPts[0].y);
  for(let i=1;i<lwPts.length;i++) cx.lineTo(lwPts[i].x,lwPts[i].y);
  for(let i=lwPts.length-1;i>=0;i--) cx.lineTo(lwPts[i].x,lwPts[i].y-8);
  cx.closePath();
  cx.fillStyle='#8a7858';cx.fill();
  // Ceiling line left
  cx.strokeStyle='#a09070';cx.lineWidth=1.5;cx.beginPath();
  cx.moveTo(lwPts[0].x,lwPts[0].y-ISO.wallH);
  for(let i=1;i<lwPts.length;i++) cx.lineTo(lwPts[i].x,lwPts[i].y-ISO.wallH);
  cx.stroke();

  // ── RIGHT WALL door drawn AFTER furniture (see drawGlassDoor below) ──

  // ── CLOCK on left wall ──
  drawWallClock();
  // ── LED on BACK WALL (middle height) ──
  const ledItem=shopLayout.find(i=>i.id==='led');
  if(ledItem) drawLED(ledItem.sx||1,ledItem.sy||1);
  // ── TFT ALTADIS (big screen below LED on left wall) ──
  drawAltadisTFT();

  // ── FURNITURE & ENTITIES (sorted by screen Y for correct occlusion) ──
  const entities=[];

  function isoDepth(col,row){
    const p=toIso(col,row);
    return p.y;
  }

  // Furniture from editable layout (skip wall-mounted: led, tft)
  for(const item of shopLayout){
    if(item.type==='led'||item.type==='tft') continue;
    const d=item.type==='rug'?-999:isoDepth(item.col,item.row+1);
    entities.push({type:item.type,col:item.col,row:item.row,depth:d,layoutId:item.id,sx:item.sx||1,sy:item.sy||1});
  }

  // Staff — use their actual screen Y position for depth
  for(const s of G.staff){
    if(!s.hired) continue;
    entities.push({type:'staff',data:s,col:0,row:0,depth:s.y+27}); // feet Y
  }
  // Customers
  for(const c of G.custs){
    entities.push({type:'cust',data:c,col:0,row:0,depth:c.y+20}); // feet Y
  }

  // Sort by depth (lower screen Y = further back = drawn first)
  entities.sort((a,b)=>a.depth-b.depth);

  // Helper: draw furniture with scaleX/scaleY transform
  function drawScaled(e,fn){
    const scx=e.sx||1, scy=e.sy||1;
    if(scx===1&&scy===1){fn(e.col,e.row);return;}
    const p=toIso(e.col,e.row);
    cx.save();
    cx.translate(p.x,p.y);
    cx.scale(scx,scy);
    cx.translate(-p.x,-p.y);
    fn(e.col,e.row);
    cx.restore();
  }

  // Draw each entity
  for(const e of entities){
    switch(e.type){
      case 'counter': drawScaled(e,drawIsoCounter); break;
      case 'shelves': drawScaled(e,drawIsoShelves); break;
      case 'lottery': drawScaled(e,drawIsoLottery); break;
      case 'manager': drawScaled(e,drawIsoManager); break;
      case 'plant': drawScaled(e,drawIsoPlant); break;
      case 'floorLamp': drawScaled(e,drawIsoFloorLamp); break;
      case 'vending': drawScaled(e,drawIsoVending); break;
      case 'wineRack': drawScaled(e,drawIsoWineRack); break;
      case 'magazines': drawScaled(e,drawIsoMagazineRack); break;
      case 'rug': drawScaled(e,drawIsoRug); break;
      case 'staff': drawIsoStaff(e.data); break;
      case 'cust': drawIsoCust(e.data); break;
    }
  }

  // ── GLASS DOOR — drawn LAST, always on top of furniture/characters ──
  drawGlassDoor();

  cx.restore(); // end clip
}

function drawXtancoLogo(x,y){
  // Small globe + XTANCO text centered at (x,y)
  const gr=5;
  cx.beginPath();cx.arc(x-10,y,gr,0,Math.PI*2);
  const grd=cx.createRadialGradient(x-12,y-2,1,x-10,y,gr);
  grd.addColorStop(0,'#88ddee');grd.addColorStop(0.5,'#4a99aa');grd.addColorStop(1,'#2a6677');
  cx.fillStyle=grd;cx.fill();cx.strokeStyle='#1a445588';cx.lineWidth=0.6;cx.stroke();
  cx.fillStyle='#1a4455';cx.font='bold 5px monospace';cx.textAlign='left';
  cx.fillText('XTANCO',x-3,y+2);
  cx.textAlign='left';
}

function drawGlassDoor(){
  // Door occupies right wall between row 2 and row 4
  const dt=toIso(ISO.cols,2);  // top corner (higher on screen)
  const dm=toIso(ISO.cols,3);  // middle (center divider)
  const db=toIso(ISO.cols,4);  // bottom corner (lower on screen)
  const doorH=ISO.wallH*0.75;
  // Sliding animation
  const doorAmt=G&&G.doorOpen>0?Math.min(1,G.doorOpen>40?1:(G.doorOpen/40)):0;
  // Slide direction follows the wall diagonal
  const sdx=(dm.x-dt.x)*doorAmt*0.35;
  const sdy=(dm.y-dt.y)*doorAmt*0.35;
  // ── DOOR FRAME (dark wood) ──
  cx.fillStyle='#4a3018';
  // Frame outline
  cx.strokeStyle='#3a2010';cx.lineWidth=3;
  cx.beginPath();
  cx.moveTo(dt.x,dt.y);cx.lineTo(db.x,db.y);
  cx.lineTo(db.x,db.y-doorH);cx.lineTo(dt.x,dt.y-doorH);
  cx.closePath();cx.stroke();
  // Center bar (horizontal divider between two panels)
  cx.lineWidth=2.5;
  cx.beginPath();cx.moveTo(dm.x,dm.y);cx.lineTo(dm.x,dm.y-doorH);cx.stroke();
  // ── TOP PANEL (row 2→3, slides toward center when open) ──
  cx.globalAlpha=0.5;
  cx.fillStyle='#88bbdd';
  cx.beginPath();
  cx.moveTo(dt.x+sdx,dt.y+sdy);         // top-right + slide
  cx.lineTo(dm.x,dm.y);                   // center (fixed)
  cx.lineTo(dm.x,dm.y-doorH);             // center top (fixed)
  cx.lineTo(dt.x+sdx,dt.y-doorH+sdy);     // top-right top + slide
  cx.closePath();cx.fill();
  cx.strokeStyle='#5a4a3844';cx.lineWidth=0.5;cx.stroke();
  // Logo on top panel
  const t1cx=(dt.x+sdx+dm.x)/2;
  const t1cy=((dt.y+sdy+dm.y)/2)-doorH*0.4;
  drawXtancoLogo(t1cx,t1cy);
  // ── BOTTOM PANEL (row 3→4, slides toward center when open) ──
  cx.fillStyle='#7aaacc';
  cx.beginPath();
  cx.moveTo(db.x-sdx,db.y-sdy);           // bottom-left - slide
  cx.lineTo(dm.x,dm.y);                    // center (fixed)
  cx.lineTo(dm.x,dm.y-doorH);              // center top (fixed)
  cx.lineTo(db.x-sdx,db.y-doorH-sdy);      // bottom-left top - slide
  cx.closePath();cx.fill();
  cx.strokeStyle='#5a4a3844';cx.lineWidth=0.5;cx.stroke();
  // Logo on bottom panel
  const b1cx=(db.x-sdx+dm.x)/2;
  const b1cy=((db.y-sdy+dm.y)/2)-doorH*0.4;
  drawXtancoLogo(b1cx,b1cy);
  cx.globalAlpha=1;
  // OPEN sign (only when closed)
  if(doorAmt<0.3){
    const oCx=(dt.x+db.x)/2, oCy=(dt.y+db.y)/2-doorH*0.2;
    tx('OPEN',oCx,oCy,'#2a664466',8,'center');
  }
}

// ── LED DISPLAY (on LEFT WALL, middle height) ────────────────
function drawLED(scx,scy){
  scx=scx||1;scy=scy||1;
  // LED spans across the left wall (col=0) from row 0.5 to row 5.5
  const span=5*scx;
  const start=0.5+(5-span)/2;
  const lp1=toIso(0,start+span); // bottom (text starts here)
  const lp2=toIso(0,start);      // top (text ends here)
  // Position at 30% height (below clock, above TFT)
  const ledYoff=Math.round(ISO.wallH*0.3);
  const ledY=lp1.y-ISO.wallH+ledYoff;
  const lh=Math.round(16*scy);
  cx.save();
  // Clip to left wall
  const wallClipPts=[];
  for(let rr=0;rr<=ISO.rows;rr++) wallClipPts.push(toIso(0,rr));
  cx.beginPath();
  cx.moveTo(wallClipPts[0].x,wallClipPts[0].y-ISO.wallH);
  for(let i=1;i<wallClipPts.length;i++) cx.lineTo(wallClipPts[i].x,wallClipPts[i].y-ISO.wallH);
  for(let i=wallClipPts.length-1;i>=0;i--) cx.lineTo(wallClipPts[i].x,wallClipPts[i].y);
  cx.closePath();cx.clip();
  // Angle from lp1→lp2 (bottom to top = readable direction)
  const angle=Math.atan2(lp2.y-lp1.y,lp2.x-lp1.x);
  const ledLen=Math.sqrt((lp2.x-lp1.x)**2+(lp2.y-lp1.y)**2);
  cx.translate(lp1.x,ledY);
  cx.rotate(angle);
  // LED body
  r(0,-1,ledLen,lh,'#1a1408');
  rx(0,-1,ledLen,lh,'#8a7a50',1);
  // LED dot grid
  cx.globalAlpha=0.04;
  for(let dx=2;dx<ledLen-2;dx+=4)
    for(let dy=1;dy<lh-2;dy+=4)
      r(dx,dy,2,2,'#ffaa00');
  cx.globalAlpha=1;
  // Scrolling text
  const msgs=T().ledMsgs;
  const liveData=(state===S.GAME||state===S.PAUSE)
    ? `  ◈  ${T().customers}: ${G?G.customersToday:0}  ◈  ${T().satisfaction}: ${G?(G.satisfaction|0):0}%  ◈  ${T().fame}: ${G?(G.fame|0):0}%  ◈  `
    : '  ◈  ';
  const fullMsg=msgs.join('   ◆   ')+liveData;
  cx.font='bold 9px monospace';
  const msgW=cx.measureText(fullMsg).width;
  ledOffset=(ledOffset+0.7)%(msgW+ledLen);
  cx.beginPath();cx.rect(2,0,ledLen-4,lh-1);cx.clip();
  const scrollX=ledLen-(ledOffset%(msgW+ledLen));
  const pulse=0.7+0.3*Math.sin(tt*0.04);
  cx.fillStyle=`rgba(255,${160+(80*pulse)|0},0,1)`;
  cx.font='bold 9px monospace';cx.textAlign='left';
  cx.fillText(fullMsg,scrollX,12);
  cx.fillText(fullMsg,scrollX+msgW+ledLen*0.3,12);
  cx.restore();
}

// ── ALTADIS TFT (big screen below LED, centered on left wall) ─
function drawAltadisTFT(){
  // Draw as a flat parallelogram on the left wall, between the two plants
  // Use 4 corner points calculated from iso positions on the wall
  cx.save();
  // Clip to left wall
  const wallClipPts=[];
  for(let rr=0;rr<=ISO.rows;rr++) wallClipPts.push(toIso(0,rr));
  cx.beginPath();
  cx.moveTo(wallClipPts[0].x,wallClipPts[0].y-ISO.wallH);
  for(let i=1;i<wallClipPts.length;i++) cx.lineTo(wallClipPts[i].x,wallClipPts[i].y-ISO.wallH);
  for(let i=wallClipPts.length-1;i>=0;i--) cx.lineTo(wallClipPts[i].x,wallClipPts[i].y);
  cx.closePath();cx.clip();
  // Screen corners on left wall — SMALLER and centered (row 2→4 instead of 1.5→4.5)
  const ledEndY=ISO.wallH*0.3+20;
  const pR=toIso(0,2.0); // visually RIGHT (row 2)
  const pL=toIso(0,4.0); // visually LEFT (row 4)
  // Bezel corners (outer frame)
  const bzTL={x:pL.x, y:pL.y-ISO.wallH+ledEndY+14};
  const bzTR={x:pR.x, y:pR.y-ISO.wallH+ledEndY+14};
  const bzBL={x:pL.x, y:pL.y-14};
  const bzBR={x:pR.x, y:pR.y-14};
  // Draw bezel (black parallelogram)
  cx.beginPath();
  cx.moveTo(bzTL.x,bzTL.y);cx.lineTo(bzTR.x,bzTR.y);
  cx.lineTo(bzBR.x,bzBR.y);cx.lineTo(bzBL.x,bzBL.y);
  cx.closePath();cx.fillStyle='#1a1a1a';cx.fill();
  cx.strokeStyle='#333';cx.lineWidth=1;cx.stroke();
  // Screen corners (inner, with padding from bezel)
  // Interpolate inward by ~8% on each edge
  const pad=0.08;
  const tl={
    x:bzTL.x+(bzTR.x-bzTL.x)*pad+(bzBL.x-bzTL.x)*pad,
    y:bzTL.y+(bzTR.y-bzTL.y)*pad+(bzBL.y-bzTL.y)*pad
  };
  const tr={
    x:bzTR.x-(bzTR.x-bzTL.x)*pad+(bzBR.x-bzTR.x)*pad,
    y:bzTR.y-(bzTR.y-bzTL.y)*pad+(bzBR.y-bzTR.y)*pad
  };
  const bl={
    x:bzBL.x+(bzBR.x-bzBL.x)*pad-(bzBL.x-bzTL.x)*pad,
    y:bzBL.y+(bzBR.y-bzBL.y)*pad-(bzBL.y-bzTL.y)*pad
  };
  const br={
    x:bzBR.x-(bzBR.x-bzBL.x)*pad-(bzBR.x-bzTR.x)*pad,
    y:bzBR.y-(bzBR.y-bzBL.y)*pad-(bzBR.y-bzTR.y)*pad
  };
  // Screen fill (dark blue)
  cx.beginPath();
  cx.moveTo(tl.x,tl.y);cx.lineTo(tr.x,tr.y);
  cx.lineTo(br.x,br.y);cx.lineTo(bl.x,bl.y);
  cx.closePath();cx.fillStyle='#001833';cx.fill();
  // Clip + affine transform: virtual 100×100 → screen parallelogram
  cx.save();
  cx.beginPath();
  cx.moveTo(tl.x,tl.y);cx.lineTo(tr.x,tr.y);
  cx.lineTo(br.x,br.y);cx.lineTo(bl.x,bl.y);
  cx.closePath();cx.clip();
  const vW=100,vH=100;
  const ax=(tr.x-tl.x)/vW, ay=(tr.y-tl.y)/vW;
  const bx=(bl.x-tl.x)/vH, by=(bl.y-tl.y)/vH;
  cx.setTransform(ax,ay,bx,by,tl.x,tl.y);
  const cX=vW/2, cY=vH/2;

// ── WALL CLOCK (above LED on left wall) ──────────────────────
// Clock time derived from game time (not real time)
let _clockH=9,_clockM=0;

function drawWallClock(){
  // Position: centered on left wall, above the LED banner
  const cp=toIso(0,3);
  const clockX=cp.x;
  const clockY=cp.y-ISO.wallH+20;
  const radius=14;
  cx.save();
  // Clip to left wall
  const wallClipPts=[];
  for(let rr=0;rr<=ISO.rows;rr++) wallClipPts.push(toIso(0,rr));
  cx.beginPath();
  cx.moveTo(wallClipPts[0].x,wallClipPts[0].y-ISO.wallH);
  for(let i=1;i<wallClipPts.length;i++) cx.lineTo(wallClipPts[i].x,wallClipPts[i].y-ISO.wallH);
  for(let i=wallClipPts.length-1;i>=0;i--) cx.lineTo(wallClipPts[i].x,wallClipPts[i].y);
  cx.closePath();cx.clip();
  // Clock face
  cx.beginPath();cx.arc(clockX,clockY,radius+2,0,Math.PI*2);
  cx.fillStyle='#3a3028';cx.fill();
  cx.beginPath();cx.arc(clockX,clockY,radius,0,Math.PI*2);
  cx.fillStyle='#f8f4ee';cx.fill();
  cx.strokeStyle='#5a4a30';cx.lineWidth=1.5;cx.stroke();
  // Hour markers
  for(let i=0;i<12;i++){
    const a=i*Math.PI/6-Math.PI/2;
    const r1=radius-3, r2=radius-1;
    cx.strokeStyle=i%3===0?'#2a2018':'#8a7a60';
    cx.lineWidth=i%3===0?1.5:0.8;
    cx.beginPath();
    cx.moveTo(clockX+Math.cos(a)*r1,clockY+Math.sin(a)*r1);
    cx.lineTo(clockX+Math.cos(a)*r2,clockY+Math.sin(a)*r2);
    cx.stroke();
  }
  // Hour hand (cached, only moves each minute)
  const ha=_clockH*Math.PI/6+_clockM*Math.PI/360-Math.PI/2;
  cx.strokeStyle='#2a1a08';cx.lineWidth=2;cx.lineCap='round';
  cx.beginPath();cx.moveTo(clockX,clockY);
  cx.lineTo(clockX+Math.cos(ha)*(radius*0.5),clockY+Math.sin(ha)*(radius*0.5));
  cx.stroke();
  // Minute hand (cached, only moves each minute)
  const ma=_clockM*Math.PI/30-Math.PI/2;
  cx.strokeStyle='#2a1a08';cx.lineWidth=1.2;
  cx.beginPath();cx.moveTo(clockX,clockY);
  cx.lineTo(clockX+Math.cos(ma)*(radius*0.75),clockY+Math.sin(ma)*(radius*0.75));
  cx.stroke();
  // Center pin
  cx.beginPath();cx.arc(clockX,clockY,1.5,0,Math.PI*2);
  cx.fillStyle='#2a1a08';cx.fill();
  cx.lineCap='butt';
  cx.restore();
}

function drawIsoFloorLamp(col,row){
  const p=toIso(col,row);
  const isOn=elgatoState.on;
  const intensity=G?G.lampIntensity/100:0; // 0.0→1.0

  // ── Halo de luz en el suelo (proporcional a intensidad) ──
  if(isOn&&intensity>0){
    cx.globalAlpha=(0.03+0.12*intensity)+0.02*Math.sin(tt*0.04);
    const haloR=12+18*intensity;
    cx.beginPath();cx.ellipse(p.x,p.y+5,haloR,haloR*0.5,0,0,Math.PI*2);
    cx.fillStyle='#ffee66';cx.fill();
    cx.globalAlpha=1;
  }

  drawIsoShadow(p.x,p.y+4,6,3);

  // Base
  cx.beginPath();cx.ellipse(p.x,p.y+2,6,3,0,0,Math.PI*2);
  cx.fillStyle='#3a3028';cx.fill();
  // Pole
  const poleLight=isOn?Math.floor(60+intensity*20):40;
  r(p.x-1,p.y-50,2,52,`rgb(${poleLight+10},${poleLight},${poleLight-10})`);
  r(p.x,p.y-50,1,52,`rgb(${poleLight+20},${poleLight+10},${poleLight})`);

  if(isOn&&intensity>0){
    // ── Halo vertical (crece con intensidad) ──
    cx.globalAlpha=(0.04+0.12*intensity)+0.02*Math.sin(tt*0.05);
    cx.beginPath();cx.ellipse(p.x,p.y-25,10+8*intensity,20+20*intensity,0,0,Math.PI*2);
    cx.fillStyle='#ffee44';cx.fill();
    cx.globalAlpha=1;
    // Pantalla (más brillante con intensidad)
    const shadeR=Math.floor(200+55*intensity),shadeG=Math.floor(190+50*intensity),shadeB=Math.floor(140+60*intensity);
    cx.beginPath();
    cx.moveTo(p.x-10,p.y-48);cx.lineTo(p.x+10,p.y-48);
    cx.lineTo(p.x+6,p.y-60);cx.lineTo(p.x-6,p.y-60);
    cx.closePath();
    cx.fillStyle=`rgb(${shadeR},${shadeG},${shadeB})`;cx.fill();
    cx.strokeStyle=`rgba(238,221,136,${0.3+intensity*0.7})`;cx.lineWidth=1;cx.stroke();
    // Bombilla (tamaño proporcional)
    const bulbR=2+2*intensity;
    cx.beginPath();cx.arc(p.x,p.y-52,bulbR,0,Math.PI*2);
    cx.fillStyle=`rgba(255,255,136,${0.4+intensity*0.6})`;cx.fill();
    // Resplandor
    cx.globalAlpha=0.15+0.3*intensity;
    cx.beginPath();cx.arc(p.x,p.y-52,bulbR+3+2*intensity,0,Math.PI*2);
    cx.fillStyle='#ffee66';cx.fill();
    cx.globalAlpha=1;
    // Borde superior
    r(p.x-6,p.y-61,12,2,`rgba(238,221,136,${0.3+intensity*0.7})`);
  } else {
    // ── APAGADA ──
    cx.beginPath();
    cx.moveTo(p.x-10,p.y-48);cx.lineTo(p.x+10,p.y-48);
    cx.lineTo(p.x+6,p.y-60);cx.lineTo(p.x-6,p.y-60);
    cx.closePath();
    cx.fillStyle='#7a7068';cx.fill();
    cx.strokeStyle='#5a5850';cx.lineWidth=0.8;cx.stroke();
    cx.beginPath();cx.arc(p.x,p.y-52,2,0,Math.PI*2);
    cx.fillStyle='#5a5850';cx.fill();
    r(p.x-6,p.y-61,12,2,'#5a5850');
  }

  // Clickable area
  BTNS['lampToggle']={x:p.x-14,y:p.y-64,w:28,h:70};
}

// ── DRAW STAFF (ISOMETRIC) ───────────────────────────────────
function drawIsoStaff(s){
  const dir=s.dir||1;
  const isPlayer=G.staff&&s===G.staff[0];
  // Player indicator
  if(isPlayer){
    const bob=Math.sin(tt*0.08)*3;
    cx.globalAlpha=0.7+0.3*Math.sin(tt*0.06);
    tx('▼',s.x+7,s.y-18+bob,'#ee6622',10,'center');
    cx.globalAlpha=1;
  }
  // DJ effect: staff dance too (bob + fast walk animation)
  const djHired=G&&G.staff&&G.staff.some(st=>st.hired&&st.role===4);
  if(djHired&&!isPlayer){
    const bob=Math.sin(tt*0.25+s.x*0.15)*4;
    const jump=Math.abs(Math.sin(tt*0.18+s.x*0.1))*3;
    chibi(s.x,s.y+bob-jump,dir,s.shirt,s.hair,Math.floor(tt/5)%2,true,tt);
  } else {
    chibi(s.x,s.y,dir,s.shirt,s.hair,s.aFrame,s.busy>0||s.isWalking,tt);
  }
  // Name tag
  const nameCol=isPlayer?'#cc4400':'#4a3a20';
  tx(s.name,s.x+7,s.y-5,nameCol,7,'center');
  // Clickable area for interaction bubble
  const si=G.staff.indexOf(s);
  if(si>=0) BTNS['staffClick'+si]={x:s.x-4,y:s.y-10,w:22,h:40};
  // Interactive speech bubble when clicked or fired
  if(s.clickBubble&&s.clickBubble>0){
    s.clickBubble--;
    const isFiring=s.fireBubble;
    const msg1=s.name;
    const msg2=isFiring?'Bye bye!! 👋':'I love Altadis!!';
    const borderCol=isFiring?'#cc3333':'#4466cc';
    const bw2=Math.max(msg1.length,msg2.length)*5+14;
    const bh2=22,bx3=s.x+7-bw2/2,by3=s.y-38;
    r(bx3,by3,bw2,bh2,'#ffffffee');rx(bx3,by3,bw2,bh2,borderCol,1.5);
    cx.fillStyle='#ffffffee';
    cx.beginPath();cx.moveTo(s.x+4,by3+bh2);cx.lineTo(s.x+10,by3+bh2);cx.lineTo(s.x+7,by3+bh2+5);cx.closePath();cx.fill();
    tx(msg1,bx3+bw2/2,by3+9,borderCol,7,'center');
    tx(msg2,bx3+bw2/2,by3+18,isFiring?'#cc3333':'#cc4444',6,'center');
  }
  // Energy bar
  r(s.x-1,s.y+28,16,3,'#c0b8a0');
  r(s.x-1,s.y+28,(16*s.energy/100)|0,3,s.energy>50?P.green:s.energy>25?P.yellow:P.red);
  rx(s.x-1,s.y+28,16,3,'#a09880',0.5);
  // Level stars (golden)
  for(let i=0;i<s.level;i++){tx('★',s.x-3+i*8,s.y+38,'#cc9900',7);}
  // Speech bubble
  const djActive=G&&G.staff&&G.staff.some(st=>st.hired&&st.role===4);
  if(djActive){
    // DJ mode: always show "Altadis Party!!" bubble
    const msg='Altadis Party!!';
    const bw=msg.length*6+8,bh=14,bx2=s.x+7-bw/2,by2=s.y-24;
    r(bx2,by2,bw,bh,'#ff44ccdd');rx(bx2,by2,bw,bh,'#cc22aa',1);
    tx(msg,bx2+4,by2+10,'#ffffff',8);r(s.x+4,by2+bh,4,4,'#ff44ccdd');
  } else if(s.bTimer>0){
    const msg=T().bubble[s.bIdx]||'!';
    const bw=msg.length*6+8,bh=14,bx2=s.x+7-bw/2,by2=s.y-24;
    r(bx2,by2,bw,bh,'#ffffffe8');rx(bx2,by2,bw,bh,'#8a7a60',1);
    tx(msg,bx2+4,by2+10,'#4a3a20',8);r(s.x+4,by2+bh,4,4,'#ffffffe8');
  }
  if(G.rush.active&&s.bTimer>0){tx('⚡',s.x+14,s.y-26,'#ff8800',10);}
}

// Beep sound for save confirmation
function playSaveBeep(){
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    // Two-tone confirmation beep
    const o1=ac.createOscillator(),g1=ac.createGain();
    o1.type='sine';o1.frequency.value=880;
    g1.gain.setValueAtTime(0.15,ac.currentTime);
    g1.gain.exponentialRampToValueAtTime(0.01,ac.currentTime+0.15);
    o1.connect(g1);g1.connect(ac.destination);
    o1.start(ac.currentTime);o1.stop(ac.currentTime+0.15);
    const o2=ac.createOscillator(),g2=ac.createGain();
    o2.type='sine';o2.frequency.value=1320;
    g2.gain.setValueAtTime(0.15,ac.currentTime+0.12);
    g2.gain.exponentialRampToValueAtTime(0.01,ac.currentTime+0.3);
    o2.connect(g2);g2.connect(ac.destination);
    o2.start(ac.currentTime+0.12);o2.stop(ac.currentTime+0.3);
  }catch(e){}
}

// ── DEMO AUTO-PLAY LOGIC ──────────────────────────────────────
function demoUpdate(){
  if(!demoMode) return;
  demoTimer++;

  // Phase 1: Auto-start game from menu (first 3 seconds)
  if(state===S.MENU&&demoTimer>30){doAction('start');return;}
  if(state===S.MODEL_SEL){doAction('model0');return;}
  if(state===S.TUT){doAction('skipTut');return;}
  if(state!==S.GAME) return;

  // Every ~90 frames (~1.5 seconds) do an action
  if(demoTimer%90!==0) return;
  const phase=(demoTimer/90)|0;

  // Cycle through actions — simulate a full day
  const actions=[
    // Move manager around the shop
    ()=>{
      if(!G.staff||!G.staff[0]) return;
      const dirs=[[0,-1],[1,0],[0,1],[-1,0]];
      const d=dirs[phase%4];
      const s=G.staff[0];
      const nc=Math.max(0,Math.min(ISO.cols-1,s.gridCol+d[0]));
      const nr=Math.max(0,Math.min(ISO.rows-1,s.gridRow+d[1]));
      s.gridCol=nc;s.gridRow=nr;
      const p=toIso(nc,nr);s.x=p.x-7;s.y=p.y-20;
      s.dir=d[0]||s.dir;s.isWalking=true;s.aTimer=0;
    },
    // Open menu and browse tabs
    ()=>{
      if(!uiOpen){uiOpen=true;uiTab=0;}
      else{uiTab=(uiTab+1)%4;}
    },
    // Restock low products
    ()=>{
      for(let i=0;i<G.prods.length;i++){
        if(G.prods[i].stock<G.prods[i].max*0.5&&G.money>=CFG.RESTOCK_COST){
          doAction('rest'+i);return;
        }
      }
    },
    // Hire available staff
    ()=>{
      for(let i=1;i<G.staff.length;i++){
        if(!G.staff[i].hired&&G.money>=CFG.HIRE_COST[i]){
          doAction('hire'+i);return;
        }
      }
    },
    // Show product on Admira screen
    ()=>{
      G.tftStockIdx=phase%G.prods.length;
      G.tftStockTimer=150;
    },
    // Trigger visits
    ()=>{
      const v=['visitCom','visitTec','visitDel','visitGC'];
      doAction(v[phase%4]);
    },
    // Close menu
    ()=>{if(uiOpen) uiOpen=false;},
    // Move again
    ()=>{
      if(!G.staff||!G.staff[0]) return;
      const s=G.staff[0];
      const nc=Math.max(0,Math.min(ISO.cols-1,s.gridCol+1));
      s.gridCol=nc;
      const p=toIso(nc,s.gridRow);s.x=p.x-7;s.y=p.y-20;
      s.dir=1;s.isWalking=true;
    },
  ];
  actions[phase%actions.length]();
}

function drawDemoCountdown(){
  if(demoMode||state!==S.MENU) return;
  const elapsed=Date.now()-lastInput;
  if(elapsed<DEMO_IDLE_MS*0.5) return; // only show after 50%
  const pct=Math.min(1,(elapsed-DEMO_IDLE_MS*0.5)/(DEMO_IDLE_MS*0.5));
  cx.globalAlpha=0.5*pct;
  const barW=100;
  r(W/2-barW/2,H-20,barW,4,'#333');
  r(W/2-barW/2,H-20,barW*pct,4,'#cc8844');
