function resizeCanvas(){
  const vw=window.innerWidth, vh=window.innerHeight;
  const ratio=W/H; // 1.6
  let cw,ch;
  if(vw/vh > ratio){ ch=vh; cw=ch*ratio; }
  else { cw=vw; ch=cw/ratio; }
  cv.style.width=cw+'px';
  cv.style.height=ch+'px';
}
resizeCanvas();
window.addEventListener('resize',resizeCanvas);

  try{localStorage.setItem('xtanco_save',JSON.stringify({G,lang,state}));}catch(e){}
}
function loadGame(){
  try{
    const d=localStorage.getItem('xtanco_save');
    if(d){const p=JSON.parse(d);G=p.G;lang=p.lang||'es';return true;}
  }catch(e){}
  return false;
}

    if(e.code==='ArrowLeft')  modelSel=(modelSel+3)%4;
    if(e.code==='ArrowRight') modelSel=(modelSel+1)%4;
    if(e.code==='ArrowUp')    modelSel=(modelSel<2)?modelSel:modelSel-2;
    if(e.code==='ArrowDown')  modelSel=(modelSel>=2)?modelSel:modelSel+2;
    if(e.code==='Enter'||e.code==='Space'){initGame();state=S.TUT;tutPage=0;}
    if(e.code==='Escape'){state=S.MENU;}
    return;
  }
  if(state===S.TUT){
    if(e.code==='Enter'||e.code==='Space'||e.code==='ArrowRight'){
      tutPage++;
      if(tutPage>=T().tut.length){state=S.GAME;}
    }
    return;
  }
  if(state===S.YEAR_END){
    if((e.code==='Enter'||e.code==='Space')&&G.yearEndAnim>80) advanceYear();
    return;
  }
  if(state===S.GAME_END){
    if(e.code==='Enter'||e.code==='Space'){state=S.MENU;menuSel=0;}
    return;
  }
  if(state===S.PAUSE){
    if(e.code==='Escape'||e.code==='Enter'||e.code==='Space'){state=S.GAME;}
    return;
  }
  if(state===S.GAME){
    if(e.code==='Escape'){if(uiOpen)uiOpen=false;else openPause();}
    if(e.code==='KeyM'){uiOpen=!uiOpen;}
    if(e.code==='Digit1'){activeTab=0;uiOpen=true;}
    if(e.code==='Digit2'){activeTab=1;uiOpen=true;}
    if(e.code==='Digit3'){activeTab=2;uiOpen=true;}
    if(e.code==='Digit4'){activeTab=3;uiOpen=true;}
  }
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});
cv.addEventListener('click',e=>{
  if(state===S.MODEL_SEL){
    const rr=cv.getBoundingClientRect();
    const mx2=(e.clientX-rr.left)*(W/rr.width)|0, my2=(e.clientY-rr.top)*(H/rr.height)|0;
    // Card grid: 2x2, centered
    const cw2=210,ch2=170,gap2=18,gx=W/2-(cw2*2+gap2)/2,gy=H/2-ch2+10;
    for(let i=0;i<4;i++){
      const col2=i%2,row2=(i/2)|0;
      const cx3=gx+col2*(cw2+gap2),cy3=gy+row2*(ch2+gap2);
      if(mx2>=cx3&&mx2<cx3+cw2&&my2>=cy3&&my2<cy3+ch2){modelSel=i;initGame();state=S.TUT;tutPage=0;return;}
    }
    return;
  }
  if(state===S.TUT){tutPage++;if(tutPage>=T().tut.length)state=S.GAME;return;}
  if(state===S.PAUSE){state=S.GAME;return;}
  if(state===S.YEAR_END&&G.yearEndAnim>80){advanceYear();return;}
  if(state===S.GAME_END){state=S.MENU;menuSel=0;return;}
  if(state!==S.GAME) return;
  const r=cv.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width)|0, my=(e.clientY-r.top)*(H/r.height)|0;
  for(const[id,b] of Object.entries(BTNS)){if(mx>=b.x&&mx<b.x+b.w&&my>=b.y&&my<b.y+b.h){doAction(id);return;}}
});

// ── ACTIONS ───────────────────────────────────────────────────
function doAction(id){
  if(id.startsWith('tab')){activeTab=parseInt(id[3]);return;}
  if(id.startsWith('hire')){
    const i=parseInt(id[4]);
    const s=G.staff[i];
    if(!s.hired&&G.money>=CFG.HIRE_COST[i]){
      G.money-=CFG.HIRE_COST[i];G.weekExpenses+=CFG.HIRE_COST[i];
      s.hired=true;s.energy=100;s.morale=85;
      showEv(T().events[5],P.neon1);addFloat(s.x,s.y-40,'+'+T().staffLabel[i],P.neon1);
    }
  }
  if(id.startsWith('train')){
    const i=parseInt(id[5]);const s=G.staff[i];
    if(s.hired&&G.money>=CFG.TRAIN_COST[i]&&s.level<5){
      G.money-=CFG.TRAIN_COST[i];G.weekExpenses+=CFG.TRAIN_COST[i];
      s.level++;s.morale=Math.min(100,s.morale+10);
      addFloat(s.x,s.y-40,'▲ LVL '+s.level,P.neon3);
    }
  }
  if(id.startsWith('rest')){
    const i=parseInt(id[4]);const p=G.prods[i];
    if(G.money>=CFG.RESTOCK_COST&&p.stock<p.max){
      G.money-=CFG.RESTOCK_COST;G.weekExpenses+=CFG.RESTOCK_COST;
      p.stock=p.max;updateBars();showEv(T().events[4],P.neonB);
    }
  }
  if(id.startsWith('adv')){
    const i=parseInt(id[3]);const a=CFG.ADVERT[i];
    if(G.money>=a.cost){
      G.money-=a.cost;G.weekExpenses+=a.cost;
      G.fame=Math.min(100,G.fame+a.fame);
      G.satisfaction=Math.min(100,G.satisfaction+5);
      showEv(T().events[7],P.neon2);addFloat(W/2,H/2-40,'+FAMA',P.neon2);
    }
  }
  if(id==='upgrade'){
    if(G.storeLevel<2&&G.money>=CFG.UPGRADE_COST){
      G.money-=CFG.UPGRADE_COST;G.weekExpenses+=CFG.UPGRADE_COST;
      G.storeLevel=2;G.satisfaction=Math.min(100,G.satisfaction+15);
      showEv(T().upgradeMsg,P.neon1);addFloat(W/2,H/2-40,'UPGRADE!',P.neon1);
    }
  }
  if(id==='menu'){uiOpen=!uiOpen;return;}
  if(id==='closeUI'){uiOpen=false;return;}
  if(id==='save'){saveGame();showEv('💾 Saved!','#88aa55');return;}
}

function showEv(msg,col){G.eventMsg=msg;G.eventTimer=160;G.eventColor=col||P.neon1;}
function addFloat(x,y,txt,col){G.floats.push({x,y,txt,col,life:65,vy:-0.65});}
function openPause(){
  G.pauseData={rev:G.weekRevenue,exp:G.weekExpenses,cust:G.customersToday,sat:G.satisfaction,fame:G.fame};
  state=S.PAUSE;
}

// ── GAME LOGIC ────────────────────────────────────────────────
function updateBars(){
  const hi=G.staff.filter(s=>s.hired);
  const avgStk=G.prods.reduce((a,p)=>a+(p.stock/p.max),0)/G.prods.length;
  G.bars[0].val=Math.min(100,35+hi.length*10+G.fame*0.25)|0;
  G.bars[1].val=Math.min(100,15+G.customersToday*3+G.satisfaction*0.4)|0;
  G.bars[2].val=(avgStk*100)|0;
  G.bars[3].val=Math.min(100,25+hi.length*11+G.satisfaction*0.4)|0;
}

function getRating(rev,target){
  const r=rev/target;
  if(r>=1.5) return'S'; if(r>=1.2) return'A'; if(r>=1.0) return'B';
  if(r>=0.8) return'C'; return'D';
}

function advanceYear(){
  if(G.year>=CFG.TOTAL_YEARS){
    // Game end
    const hireScore=G.staff.filter(s=>s.hired).reduce((a,s)=>a+s.level*200,0);
    G.totalScore=(G.totalRevenue/100+hireScore+G.fame*50)|0;
    state=S.GAME_END;
    saveGame();
    return;
  }
  G.yearsCompleted++;
  G.year++;G.week=1;G.weekTimer=0;G.yearRevenue=0;G.weekRevenue=0;G.weekExpenses=0;
  G.customersToday=0;G.yearEndAnim=0;G.yearRating=null;
  // Satisfaction decay on year transition
  G.satisfaction=Math.max(20,G.satisfaction-5);
  state=S.GAME;
  saveGame();
}

function endWeek(){
  // Pay salaries
  const salaries=G.staff.filter(s=>s.hired).reduce((a,s)=>a+CFG.SALARY[s.role]*s.level,0);
  if(salaries>0){
    G.money-=salaries;G.weekExpenses+=salaries;
    addFloat(SHOP.x+SHOP.w/2,SHOP.y+20,'-€'+salaries+' SAL.',P.red);
  }
  // Stock decay
  for(const p of G.prods) p.stock=Math.max(0,p.stock-(2+Math.random()*4|0));
  // Satisfaction decay
  G.satisfaction=Math.max(10,G.satisfaction-1.5);
  // Morale decay for unhired-slots
  for(const s of G.staff) if(s.hired) s.morale=Math.max(20,s.morale-2);
  updateBars();
  G.weekRevenue=0;G.weekExpenses=0;G.customersToday=0;
  G.week++;
  if(G.week>CFG.WEEKS_PER_YEAR){
    // Year end
    const target=CFG.YEAR_TARGETS[G.year-1];
    const rating=getRating(G.yearRevenue,target);
    const bonus=T().ratingBonus[rating];
    G.money+=bonus;G.totalRevenue+=G.yearRevenue;
    G.yearRating=rating;G.yearBonus=bonus;G.yearEndAnim=0;
    if(G.yearRevenue<target*CFG.GAMEOVER_THRESHOLD){
      G.gameOverReason='target';
      G.totalScore=(G.totalRevenue/100)|0;
      state=S.GAME_END;
      saveGame();
      return;
    }
    state=S.YEAR_END;
    saveGame();
    return;
  }
  if(G.week===1&&Math.random()<0.3) showEv(T().events[6],P.neon3);
}

function updateGame(){
  tt++;G.weekTimer++;

  // Rush hour
  if(!G.rush.active&&Math.random()<CFG.RUSH_CHANCE){
    G.rush.active=true;G.rush.timer=CFG.RUSH_DURATION;
    showEv(T().rushMsg,P.rushGlow);
  }
  if(G.rush.active){
    G.rush.timer--;
    if(G.rush.timer<=0){G.rush.active=false;showEv(T().rushEnd,P.neon3);}
  }

  // Inspection
  if(!G.inspect.active&&Math.random()<CFG.INSPECT_CHANCE){
    G.inspect.active=true;G.inspect.timer=200;G.inspect.warned=false;
    showEv(T().inspMsg,P.inspGlow);
  }
  if(G.inspect.active){
    G.inspect.timer--;
    if(G.inspect.timer===100&&!G.inspect.warned){
      G.inspect.warned=true;
      const hiCnt=G.staff.filter(s=>s.hired).length;
      const avgStk=G.prods.reduce((a,p)=>a+(p.stock/p.max),0)/G.prods.length;
      if(hiCnt>=1&&avgStk>0.4){
        showEv(T().inspPass,P.green);G.satisfaction=Math.min(100,G.satisfaction+8);
        addFloat(W/2,H/2-40,'✓ PASS',P.green);
      } else {
        const fine=600+Math.random()*400|0;
        G.money-=fine;G.weekExpenses+=fine;
        showEv(T().inspFail,P.inspGlow);addFloat(W/2,H/2-40,'-€'+fine,P.red);
        G.satisfaction=Math.max(10,G.satisfaction-15);
      }
      G.inspect.active=false;
    }
    if(G.inspect.timer<=0) G.inspect.active=false;
  }

  // Staff work
  const mult=G.rush.active?CFG.RUSH_MULT:1;
  for(const s of G.staff){
    if(!s.hired) continue;
    s.aTimer++;if(s.aTimer>10){s.aFrame=(s.aFrame+1)%2;s.aTimer=0;}
    if(s.busy>0) s.busy--;
    if(s.bTimer>0) s.bTimer--;
    s.energy=Math.max(15,s.energy-(s.busy>0?0.04:0.01));
    if(s.energy<25) s.energy=Math.min(100,s.energy+0.08);
    const moraleFactor=0.7+(s.morale/100)*0.3;
    if(Math.random()<CFG.SALE_PROB*moraleFactor*mult&&s.bTimer===0){
      const p=G.prods[Math.floor(Math.random()*G.prods.length)];
      if(p.stock>0){
        s.bTimer=70;s.busy=50;
        const qty=Math.max(1,(s.level*CFG.SALE_BASE*(0.7+Math.random()*0.6)*p.factor*mult)|0);
        const rev=qty*p.price;
        G.money+=rev;G.weekRevenue+=rev;G.yearRevenue+=rev;G.totalRevenue+=rev;
        G.customersToday++;G.totalCustomers++;
        p.stock=Math.max(0,p.stock-Math.max(1,(qty/p.price)|0));
        addFloat(s.x+7,s.y-28,'€'+rev,P.green);
        if(G.rush.active) addFloat(s.x+7,s.y-16,'x'+CFG.RUSH_MULT.toFixed(1),P.rushGlow);
        G.satisfaction=Math.min(100,G.satisfaction+0.3);
      }
    }
  }

  // Customers
  if(Math.random()<0.006*Math.max(1,G.staff.filter(s=>s.hired).length)*(G.rush.active?2:1)) spawnCust();
  for(let i=G.custs.length-1;i>=0;i--){
    const c=G.custs[i];c.ft++;if(c.ft>10){c.fr=(c.fr+1)%2;c.ft=0;}
    if(c.st==='walk'){
      const dx=c.tx-c.x,dy=c.ty-c.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<3){c.st='browse';c.timer=60+Math.random()*80;}
      else{c.x+=dx/d*1.3;c.y+=dy/d*1.3;c.dir=dx<0?-1:1;}
    } else if(c.st==='browse'){
      c.timer--;if(c.timer<=0){const dp=toIso(ISO.cols,3);c.st='leave';c.tx=dp.x;c.ty=dp.y-40;}
    } else if(c.st==='leave'){
      const dx=c.tx-c.x,dy=c.ty-c.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<3) G.custs.splice(i,1);
      else{c.x+=dx/d*1.6;c.y+=dy/d*1.6;c.dir=dx<0?-1:1;}
    }
  }

  // Floats
  for(let i=G.floats.length-1;i>=0;i--){
    G.floats[i].y+=G.floats[i].vy;G.floats[i].life--;
    if(G.floats[i].life<=0) G.floats.splice(i,1);
  }

  if(G.eventTimer>0) G.eventTimer--;

  // Week end
  if(G.weekTimer>=CFG.WEEK_TICKS){G.weekTimer=0;endWeek();}
  updateBars();
}

function spawnCust(){
  if(G.custs.length>=7) return;
  const ci=Math.floor(Math.random()*6);
  // Spawn at door on right wall (between row 2-4)
  const doorIso=toIso(ISO.cols,3);
  const tCol=2+Math.random()*6|0, tRow=1+Math.random()*4|0;
  const tIso=toIso(tCol,tRow);
  G.custs.push({
    x:doorIso.x,y:doorIso.y-40,
    tx:tIso.x-7,ty:tIso.y-20,
    gCol:ISO.cols,gRow:3,
    st:'walk',timer:0,col:P.prods[ci],hair:Math.floor(Math.random()*6),
    fr:0,ft:0,dir:-1
  });
}

// ── DRAW HELPERS ──────────────────────────────────────────────
const r=(x,y,w,h,c)=>{cx.fillStyle=c;cx.fillRect(x|0,y|0,w,h);};
const rx=(x,y,w,h,c,lw=1)=>{cx.strokeStyle=c;cx.lineWidth=lw;cx.strokeRect((x|0)+.5,(y|0)+.5,w-1,h-1);};
const tx=(s,x,y,c,sz=9,al='left')=>{cx.fillStyle=c;cx.font=sz+'px monospace';cx.textAlign=al;cx.fillText(s,x|0,y|0);cx.textAlign='left';};
const glow=(c,b=8)=>{cx.shadowColor=c;cx.shadowBlur=b;};
const nog=()=>{cx.shadowBlur=0;};
const nl=(x1,y1,x2,y2,c,lw=1)=>{glow(c,5);cx.strokeStyle=c;cx.lineWidth=lw;cx.beginPath();cx.moveTo(x1,y1);cx.lineTo(x2,y2);cx.stroke();nog();};
const nt=(s,x,y,c,sz=12)=>{glow(c,10);tx(s,x,y,c,sz,'center');nog();};

// ── SHOP LAYOUT ───────────────────────────────────────────────
// SHOP now takes FULL width (like GDS). UI panel is an overlay.
const SHOP={x:0,y:28,w:W,h:H-28-30}; // between top bar (28px) and bottom bar (30px)
const UI={x:W-170,w:170}; // overlay panel (shown/hidden)
let uiOpen=false; // toggle with Menu button

// ── ISOMETRIC ENGINE ─────────────────────────────────────────
// Kairosoft-style: FULL WIDTH, tall walls, steep angle
// SHOP: x=0, y=28, w=800, h=442 (full width between bars)
// Wall ~170px, floor diamond ~270px
// Grid 12x6 → sum=18, tileW=800*2/18≈88, tileH=270*2/18=30
const ISO={
  tileW:88,tileH:30,    // wide tiles filling 800px width
  cols:12,rows:6,        // wide grid
  ox:400,oy:198,         // centered in full width, below wall
  wallH:170,             // tall Kairosoft walls
  doorCol:11,doorRow:3,  // door far right
};
// Cart→Iso: convert grid (col,row) to screen pixel
function toIso(col,row){
  return {
    x: ISO.ox + (col-row)*ISO.tileW/2,
    y: ISO.oy + (col+row)*ISO.tileH/2
  };
}
// Draw a flat diamond tile
function drawIsoTile(col,row,color,strokeColor){
  const p=toIso(col,row);
  const hw=ISO.tileW/2, hh=ISO.tileH/2;
  cx.beginPath();
  cx.moveTo(p.x,p.y);
  cx.lineTo(p.x+hw,p.y+hh);
  cx.lineTo(p.x,p.y+ISO.tileH);
  cx.lineTo(p.x-hw,p.y+hh);
  cx.closePath();
  cx.fillStyle=color;cx.fill();
  if(strokeColor){cx.strokeStyle=strokeColor;cx.lineWidth=0.5;cx.stroke();}
}
// Draw a 3D isometric block (box)
function drawIsoBlock(col,row,bw,bd,bh,topCol,leftCol,rightCol,neonCol){
  // bw=width in tiles, bd=depth in tiles, bh=height in px
  const p=toIso(col,row);
  const hw=ISO.tileW/2, hh=ISO.tileH/2;
  const w=bw*hw, d=bd*hw;
  const wh=bw*hh, dh=bd*hh;
  // Top face
  cx.beginPath();
  cx.moveTo(p.x,p.y-bh);
  cx.lineTo(p.x+w,p.y+wh-bh);
  cx.lineTo(p.x+w-d,p.y+wh+dh-bh);
  cx.lineTo(p.x-d,p.y+dh-bh);
  cx.closePath();
  cx.fillStyle=topCol;cx.fill();
  // Left face
  cx.beginPath();
  cx.moveTo(p.x-d,p.y+dh-bh);
  cx.lineTo(p.x+w-d,p.y+wh+dh-bh);
  cx.lineTo(p.x+w-d,p.y+wh+dh);
  cx.lineTo(p.x-d,p.y+dh);
  cx.closePath();
  cx.fillStyle=leftCol;cx.fill();
  // Right face
  cx.beginPath();
  cx.moveTo(p.x+w-d,p.y+wh+dh-bh);
  cx.lineTo(p.x+w,p.y+wh-bh);
  cx.lineTo(p.x+w,p.y+wh);
  cx.lineTo(p.x+w-d,p.y+wh+dh);
  cx.closePath();
  cx.fillStyle=rightCol;cx.fill();
  // Neon edge glow on top edges
  if(neonCol){
    glow(neonCol,6);
    cx.strokeStyle=neonCol;cx.lineWidth=1.5;
    cx.beginPath();
    cx.moveTo(p.x,p.y-bh);cx.lineTo(p.x+w,p.y+wh-bh);
    cx.moveTo(p.x,p.y-bh);cx.lineTo(p.x-d,p.y+dh-bh);
    cx.stroke();nog();
  }
}
// Draw isometric shadow ellipse
function drawIsoShadow(sx,sy,rw,rh){
  cx.save();cx.globalAlpha=0.18;
  cx.beginPath();cx.ellipse(sx,sy+2,rw,rh,0,0,Math.PI*2);
  cx.fillStyle='#000';cx.fill();
  cx.restore();
}

// ── DRAW CHIBI (ISOMETRIC) ────────────────────────────────────
function chibi(x,y,dir,shirt,hair,frame,busy,tick,scale=1){
  cx.save();
  if(scale!==1){cx.translate(x,y);cx.scale(scale,scale);cx.translate(-x,-y);}
  const flip=dir===-1;
  if(flip){cx.translate(x+12,0);cx.scale(-1,1);cx.translate(-x,0);}
  // Shadow
  drawIsoShadow(x+7,y+27,8,3);
  // Legs with walk animation
  const lk=frame===0?0:2;
  r(x+3,y+18,3,7+lk,P.pants);r(x+8,y+18,3,7-lk,P.pants);
  // Shoes
  r(x+2,y+24+lk,4,3,P.shoes);r(x+8,y+24-lk,4,3,P.shoes);
  // Body (torso)
  r(x+1,y+8,12,11,P.shirts[shirt%P.shirts.length]);
  // Shirt highlight
  r(x+4,y+10,5,3,'#ffffff18');
  // Arms with busy animation
  const ak=busy?(frame===0?-2:2):0;
  r(x-1,y+9+ak,3,8,P.shirts[shirt%P.shirts.length]);
  r(x+12,y+9-ak,3,8,P.shirts[shirt%P.shirts.length]);
  // Head
  r(x+1,y-1,12,12,P.skin);
  // Hair (fuller, isometric style)
  r(x+0,y-4,14,7,P.hair[hair%P.hair.length]);
  r(x-1,y-3,2,9,P.hair[hair%P.hair.length]);
  r(x+13,y-3,2,9,P.hair[hair%P.hair.length]);
  // Eyes (bigger, more expressive)
  const blink=Math.floor(tick/90)%9===0;
  r(x+3,y+3,3,blink?1:3,'#1a1a2e');
  r(x+9,y+3,3,blink?1:3,'#1a1a2e');
  if(!blink){r(x+4,y+4,1,1,P.white);r(x+10,y+4,1,1,P.white);}
  // Nose hint
  r(x+6,y+7,2,1,'#eebb99');
  cx.restore();
}

// ── DRAW MENU ─────────────────────────────────────────────────
let mStars=[];for(let i=0;i<110;i++) mStars.push({x:Math.random()*W,y:Math.random()*H,b:Math.random(),r:Math.random()>.8?2:1});
function drawMenu(){
  r(0,0,W,H,P.bg);
  cx.globalAlpha=0.18;
  for(let x=0;x<W;x+=32){cx.strokeStyle=P.wall;cx.lineWidth=1;cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke();}
  for(let y=0;y<H;y+=32){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}
  cx.globalAlpha=1;
  for(const s of mStars){cx.globalAlpha=.12+.22*Math.sin(tt*.02+s.b*9);r(s.x,s.y,s.r,s.r,P.neon1);}
  cx.globalAlpha=1;

// ── CITY BACKGROUND (isometric buildings matching shop perspective) ──
// Generate isometric city buildings using same tile system
const CITY_BUILDINGS=[];
// Buildings behind the back wall (row < 0, extending left/right)
for(let i=0;i<14;i++){
  CITY_BUILDINGS.push({
    col:-3+i*1.3,          // spread across back
    row:-4-Math.random()*3, // behind shop
    bw:1+Math.random()*1.5, // width in tiles
    bd:0.8+Math.random(),   // depth in tiles
    h:40+Math.random()*120|0, // pixel height
    hue:200+Math.random()*40|0,
    sat:15+Math.random()*20|0,
    lit:50+Math.random()*25|0,
    winCols:2+Math.random()*3|0,
    winRows:2+Math.random()*7|0,
  });
}
// Sort by depth (furthest first)
CITY_BUILDINGS.sort((a,b)=>(a.col+a.row)-(b.col+b.row));

function drawIsoCityBuilding(b){
  const p=toIso(b.col,b.row);
  const hw=ISO.tileW/2, hh=ISO.tileH/2;
  const w=b.bw*hw, d=b.bd*hw;
  const wh=b.bw*hh, dh=b.bd*hh;
  const topCol=`hsl(${b.hue},${b.sat}%,${b.lit+10}%)`;
  const leftCol=`hsl(${b.hue},${b.sat}%,${b.lit-5}%)`;
  const rightCol=`hsl(${b.hue},${b.sat}%,${b.lit}%)`;
  // Top face
  cx.beginPath();
  cx.moveTo(p.x,p.y-b.h);
  cx.lineTo(p.x+w,p.y+wh-b.h);
  cx.lineTo(p.x+w-d,p.y+wh+dh-b.h);
  cx.lineTo(p.x-d,p.y+dh-b.h);
  cx.closePath();
  cx.fillStyle=topCol;cx.fill();
  // Left face
  cx.beginPath();
  cx.moveTo(p.x-d,p.y+dh-b.h);
  cx.lineTo(p.x+w-d,p.y+wh+dh-b.h);
  cx.lineTo(p.x+w-d,p.y+wh+dh);
  cx.lineTo(p.x-d,p.y+dh);
  cx.closePath();
  cx.fillStyle=leftCol;cx.fill();
  // Right face
  cx.beginPath();
  cx.moveTo(p.x+w-d,p.y+wh+dh-b.h);
  cx.lineTo(p.x+w,p.y+wh-b.h);
  cx.lineTo(p.x+w,p.y+wh);
  cx.lineTo(p.x+w-d,p.y+wh+dh);
  cx.closePath();
  cx.fillStyle=rightCol;cx.fill();
  // Windows on left face
  const faceH=b.h;
  const wRows=Math.min(b.winRows,Math.floor((faceH-8)/9));
  const wCols=Math.min(b.winCols,Math.floor((b.bw*hw)/8));
  for(let wy=0;wy<wRows;wy++){
    for(let wx=0;wx<wCols;wx++){
      const lit=Math.sin(tt*0.004+b.col*10+wx*5+wy*8)>0.15;
      const fy=p.y+dh-b.h+6+wy*9;
      const fx=p.x-d+3+wx*8;
      cx.fillStyle=lit?'#eedd77':'#6a8899';
      cx.fillRect(fx,fy,5,5);
    }
  }
  // Windows on right face
  const rCols=Math.min(b.winCols,Math.floor((b.bd*hw)/8));
  for(let wy=0;wy<wRows;wy++){
    for(let wx=0;wx<rCols;wx++){
      const lit=Math.sin(tt*0.004+b.col*7+wx*4+wy*11)>0.2;
      const fy=p.y+wh+dh-b.h+6+wy*9-(b.bd*hh);
      const fx=p.x+w-d+3+wx*8;
      cx.fillStyle=lit?'#eedd77':'#7a99aa';
      cx.fillRect(fx,fy,4,5);
    }
  }
}

function drawCityBg(){
  const skyTop=SHOP.y;
  const skyH=ISO.wallH+60;

  skyGrad.addColorStop(0,'#5a99cc');
  skyGrad.addColorStop(0.4,'#7ab8dd');
  skyGrad.addColorStop(1,'#a8d4ee');
  cx.fillStyle=skyGrad;
  cx.fillRect(0,skyTop,W,skyH);

  // Clouds
  cx.fillStyle='#d0e8f8';
  const ct=tt*0.12;
  for(let i=0;i<4;i++){
    const cx2=((i*220+ct)%1000)-50;
    const cy2=skyTop+12+i*14;
    cx.beginPath();cx.arc(cx2,cy2,10+i*2,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.arc(cx2+14,cy2-3,8+i,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.arc(cx2+26,cy2+1,9+i,0,Math.PI*2);cx.fill();

      drawIsoTile(c,rr,'#8a8878','#7a786810');
    }
  }
}

// ── DRAW SHOP (ISOMETRIC — Kairosoft warm style) ─────────────
function drawShop(){
  // Clip to shop area
  cx.save();
  cx.beginPath();cx.rect(SHOP.x,SHOP.y,SHOP.w,SHOP.h);cx.clip();

  // ── FLOOR (uniform carpet — Kairosoft style) ──
  for(let row=0;row<ISO.rows;row++){
    for(let col=0;col<ISO.cols;col++){
      // Subtle carpet texture with very slight variation
      let floorCol=((col+row)%2===0)?'#b8b0a0':'#b4ac9c';
      if(G.rush.active){
        const pulse=0.05*Math.sin(tt*.08);
        floorCol=((col+row)%2===0)?`rgba(200,170,110,${0.9+pulse})`:`rgba(195,165,105,${0.9+pulse})`;
      }
      if(G.inspect.active&&G.inspect.timer>100){
        floorCol=((col+row)%2===0)?'#c8a8a8':'#c0a0a0';
      }
      drawIsoTile(col,row,floorCol,'#a8a09010');
    }
  }

  // ── BACK WALL (cream/beige, Kairosoft style) ──
  const wallPts=[];
  for(let c=0;c<=ISO.cols;c++) wallPts.push(toIso(c,0));
  // Wall body
  cx.beginPath();
  cx.moveTo(wallPts[0].x,wallPts[0].y);
  for(let i=1;i<wallPts.length;i++) cx.lineTo(wallPts[i].x,wallPts[i].y);
  for(let i=wallPts.length-1;i>=0;i--) cx.lineTo(wallPts[i].x,wallPts[i].y-ISO.wallH);
  cx.closePath();
  cx.fillStyle=P.wallInner;cx.fill();
  // Wall panel lines (subtle horizontal)
  cx.globalAlpha=0.08;
  for(let h=15;h<ISO.wallH;h+=20){
    cx.strokeStyle='#a09070';cx.lineWidth=0.5;cx.beginPath();
    cx.moveTo(wallPts[0].x,wallPts[0].y-h);
    for(let i=1;i<wallPts.length;i++) cx.lineTo(wallPts[i].x,wallPts[i].y-h);
    cx.stroke();
  }
  cx.globalAlpha=1;
  // Baseboard (darker strip at bottom of wall)
  cx.beginPath();
  cx.moveTo(wallPts[0].x,wallPts[0].y);
  for(let i=1;i<wallPts.length;i++) cx.lineTo(wallPts[i].x,wallPts[i].y);
  for(let i=wallPts.length-1;i>=0;i--) cx.lineTo(wallPts[i].x,wallPts[i].y-8);
  cx.closePath();
  cx.fillStyle='#9a8868';cx.fill();
  // Ceiling line (thin dark border at top)
  cx.strokeStyle='#b0a080';cx.lineWidth=2;cx.beginPath();
  cx.moveTo(wallPts[0].x,wallPts[0].y-ISO.wallH);
  for(let i=1;i<wallPts.length;i++) cx.lineTo(wallPts[i].x,wallPts[i].y-ISO.wallH);
  cx.stroke();

  // ── WINDOWS on back wall (half size, centered in wall) ──
  const winCols=[1.5,4,6.5,9];
  for(const wc of winCols){
    const wp1=toIso(wc,0), wp2=toIso(wc+1.2,0);
    const whei=Math.floor((ISO.wallH-50)*0.55);
    const wy=wp1.y-ISO.wallH+Math.floor((ISO.wallH-whei)/2);
    const wwid=wp2.x-wp1.x;
    // Window frame outer
    r(wp1.x-3,wy-3,wwid+6,whei+6,'#e8e4dc');
    // Clip to window and draw city through it
    cx.save();
    cx.beginPath();cx.rect(wp1.x,wy,wwid,whei);cx.clip();
    // Sky
    const skyGrad=cx.createLinearGradient(0,wy,0,wy+whei);
    skyGrad.addColorStop(0,'#5a99cc');
    skyGrad.addColorStop(0.5,'#7ab8dd');
    skyGrad.addColorStop(1,'#a8d4ee');
    cx.fillStyle=skyGrad;cx.fillRect(wp1.x,wy,wwid,whei);
    // Clouds
    cx.fillStyle='#d0e8f8';
    const cOff=((tt*0.1+wc*80)%250)-40;
    cx.beginPath();cx.arc(wp1.x+cOff,wy+15,6,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.arc(wp1.x+cOff+10,wy+12,5,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.arc(wp1.x+cOff+18,wy+14,5,0,Math.PI*2);cx.fill();
    // Isometric buildings through window (scaled down, offset per window)
    const winIdx=(wc-1.5)/3.5;
    for(let bi=0;bi<6;bi++){
      const b=CITY_BUILDINGS[Math.floor(winIdx*5)+bi];
      if(!b) continue;
      // Mini isometric building in window
      const bx=wp1.x+8+bi*((wwid-16)/6);
      const bBase=wy+whei;
      const bh=b.h*0.4;
      const bw2=12+bi%3*4;
      const bd2=6;
      // Front face
      cx.fillStyle=`hsl(${b.hue},${b.sat}%,${b.lit}%)`;
      cx.fillRect(bx,bBase-bh,bw2,bh);
      // Right face (isometric depth)
      cx.beginPath();
      cx.moveTo(bx+bw2,bBase-bh);
      cx.lineTo(bx+bw2+bd2,bBase-bh-bd2*0.5);
      cx.lineTo(bx+bw2+bd2,bBase-bd2*0.5);
      cx.lineTo(bx+bw2,bBase);
      cx.closePath();
      cx.fillStyle=`hsl(${b.hue},${b.sat}%,${b.lit-10}%)`;cx.fill();
      // Top face
      cx.beginPath();
      cx.moveTo(bx,bBase-bh);
      cx.lineTo(bx+bd2,bBase-bh-bd2*0.5);
      cx.lineTo(bx+bw2+bd2,bBase-bh-bd2*0.5);
      cx.lineTo(bx+bw2,bBase-bh);
      cx.closePath();
      cx.fillStyle=`hsl(${b.hue},${b.sat}%,${b.lit+8}%)`;cx.fill();
      // Mini windows
      const mRows=Math.min(4,Math.floor(bh/9));
      const mCols=Math.min(2,Math.floor(bw2/7));
      for(let mr=0;mr<mRows;mr++){
        for(let mc=0;mc<mCols;mc++){
          const lit=Math.sin(tt*0.004+bi*7+mc*4+mr*9)>0.15;
          cx.fillStyle=lit?'#eecc66':'#6a8899';
          cx.fillRect(bx+2+mc*6,bBase-bh+4+mr*9,4,5);
        }
      }
    }
    cx.restore();
    // Crossbars
    cx.strokeStyle='#d0ccbc';cx.lineWidth=2.5;
    cx.beginPath();
    cx.moveTo(wp1.x+wwid/2,wy);cx.lineTo(wp1.x+wwid/2,wy+whei);
    cx.moveTo(wp1.x,wy+whei*0.45);cx.lineTo(wp1.x+wwid,wy+whei*0.45);
    cx.stroke();
    // Frame border
    rx(wp1.x-3,wy-3,wwid+6,whei+6,'#9a8a68',1.5);
    // Window sill
    r(wp1.x-5,wy+whei+3,wwid+10,5,'#c8c0a8');
  }

  // ── LEFT WALL (slightly darker, Kairosoft style) ──
  const lwPts=[];
  for(let rr=0;rr<=ISO.rows;rr++) lwPts.push(toIso(0,rr));
  cx.beginPath();
  cx.moveTo(lwPts[0].x,lwPts[0].y);
  for(let i=1;i<lwPts.length;i++) cx.lineTo(lwPts[i].x,lwPts[i].y);
  for(let i=lwPts.length-1;i>=0;i--) cx.lineTo(lwPts[i].x,lwPts[i].y-ISO.wallH);
  cx.closePath();
  cx.fillStyle='#d0c4a8';cx.fill();
  // Left wall baseboard
  cx.beginPath();
  cx.moveTo(lwPts[0].x,lwPts[0].y);
  for(let i=1;i<lwPts.length;i++) cx.lineTo(lwPts[i].x,lwPts[i].y);
  for(let i=lwPts.length-1;i>=0;i--) cx.lineTo(lwPts[i].x,lwPts[i].y-8);
  cx.closePath();
  cx.fillStyle='#8a7858';cx.fill();
  // Ceiling line left
  cx.strokeStyle='#a09070';cx.lineWidth=1.5;cx.beginPath();
  cx.moveTo(lwPts[0].x,lwPts[0].y-ISO.wallH);
  for(let i=1;i<lwPts.length;i++) cx.lineTo(lwPts[i].x,lwPts[i].y-ISO.wallH);
  cx.stroke();

  // ── RIGHT WALL with DOOR (entry wall) ──
  const rwPts=[];
  for(let rr=0;rr<=ISO.rows;rr++) rwPts.push(toIso(ISO.cols,rr));
  // Right wall body
  cx.beginPath();
  cx.moveTo(rwPts[0].x,rwPts[0].y);
  for(let i=1;i<rwPts.length;i++) cx.lineTo(rwPts[i].x,rwPts[i].y);
  for(let i=rwPts.length-1;i>=0;i--) cx.lineTo(rwPts[i].x,rwPts[i].y-ISO.wallH);
  cx.closePath();
  cx.fillStyle='#c8bca0';cx.fill();
  // Baseboard
  cx.beginPath();
  cx.moveTo(rwPts[0].x,rwPts[0].y);
  for(let i=1;i<rwPts.length;i++) cx.lineTo(rwPts[i].x,rwPts[i].y);
  for(let i=rwPts.length-1;i>=0;i--) cx.lineTo(rwPts[i].x,rwPts[i].y-6);
  cx.closePath();
  cx.fillStyle='#8a7858';cx.fill();
  // Ceiling line
  cx.strokeStyle='#a09070';cx.lineWidth=1;cx.beginPath();
  cx.moveTo(rwPts[0].x,rwPts[0].y-ISO.wallH);
  for(let i=1;i<rwPts.length;i++) cx.lineTo(rwPts[i].x,rwPts[i].y-ISO.wallH);
  cx.stroke();

  // Door on right wall (between row 2 and row 4)
  const doorTop=toIso(ISO.cols,2);
  const doorBot=toIso(ISO.cols,4);
  const doorH=ISO.wallH*0.7;
  // Door frame (dark wood)
  cx.beginPath();
  cx.moveTo(doorTop.x,doorTop.y);
  cx.lineTo(doorBot.x,doorBot.y);
  cx.lineTo(doorBot.x,doorBot.y-doorH);
  cx.lineTo(doorTop.x,doorTop.y-doorH);
  cx.closePath();
  cx.fillStyle='#5a4228';cx.fill();
  // Glass panels (animated sliding)
  const doorOff=(Math.sin(tt*.022)*3+3)|0;
  const dMidY=(doorTop.y+doorBot.y)/2;
  const dMidYh=(doorTop.y-doorH+doorBot.y-doorH)/2;
  // Top glass panel
  cx.beginPath();
  cx.moveTo(doorTop.x,doorTop.y-doorOff*0.8);
  cx.lineTo(dMidY>doorBot.y?doorBot.x:doorTop.x+(doorBot.x-doorTop.x)*0.48,dMidY-doorOff*0.4);
  cx.lineTo(dMidY>doorBot.y?doorBot.x:doorTop.x+(doorBot.x-doorTop.x)*0.48,dMidYh+doorOff*0.4);
  cx.lineTo(doorTop.x,doorTop.y-doorH+doorOff*0.3);
  cx.closePath();
  cx.fillStyle='#88bbdd';cx.fill();
  // Bottom glass panel
  cx.beginPath();
  cx.moveTo(doorBot.x,doorBot.y-doorOff*0.3);
  cx.lineTo(doorTop.x+(doorBot.x-doorTop.x)*0.52,dMidY+doorOff*0.4);
  cx.lineTo(doorTop.x+(doorBot.x-doorTop.x)*0.52,dMidYh-doorOff*0.3);
  cx.lineTo(doorBot.x,doorBot.y-doorH+doorOff*0.2);
  cx.closePath();
  cx.fillStyle='#7aaacc';cx.fill();
  // Door frame outline
  cx.strokeStyle='#4a3018';cx.lineWidth=2;
  cx.beginPath();
  cx.moveTo(doorTop.x,doorTop.y);cx.lineTo(doorBot.x,doorBot.y);
  cx.lineTo(doorBot.x,doorBot.y-doorH);cx.lineTo(doorTop.x,doorTop.y-doorH);
  cx.closePath();cx.stroke();
  // OPEN sign on door
  const doorCx=(doorTop.x+doorBot.x)/2;
  const doorCy=(doorTop.y+doorBot.y)/2-doorH*0.3;
  tx('OPEN',doorCx,doorCy,'#4a3018',8,'center');

  // ── SIGN on back wall (wooden board — below windows) ──
  const signP=toIso(4,0);
  const signP2=toIso(9,0);
  const signY=signP.y-18;
  const signW=signP2.x-signP.x;
  // Wooden sign board
  r(signP.x-2,signY-2,signW+4,26,'#5a4020');
  r(signP.x,signY,signW,22,'#7a5a30');
  r(signP.x,signY,signW,4,'#8a6a3a');
  rx(signP.x-2,signY-2,signW+4,26,'#4a3018',1.5);
  // Sign text
  const signCol=MODELS[activeModel].neon;
  tx('✦ '+T().modelNames[activeModel]+' ✦',(signP.x+signP2.x)/2,signY+16,'#f0e8d0',11,'center');
  if(G.storeLevel>=2){tx('★LVL2',signP2.x-30,signY+16,P.yellow,8);}

  // ── LED DISPLAY + TFT SCREEN on left wall ──
  drawLED();
  drawTFTScreen();

  // ── FURNITURE & ENTITIES (sorted by screen Y for correct occlusion) ──
  const entities=[];

  // Helper: get bottom screen Y of an entity for sorting (painter's algorithm)
  // Objects with higher Y (lower on screen) are drawn LATER (on top)
  function isoDepth(col,row){
    const p=toIso(col,row);
    return p.y; // screen Y = depth for isometric sorting
  }

  // Rug first (flat on floor, always behind everything)
  entities.push({type:'rug',col:3,row:2,depth:-999});

  // Furniture positions in grid
  entities.push({type:'counter',col:1,row:1,depth:isoDepth(1,2)});    // bottom edge of counter
  entities.push({type:'shelves',col:5,row:0,depth:isoDepth(5,2)});    // bottom edge of shelves
  entities.push({type:'lottery',col:8,row:1,depth:isoDepth(8,2)});
  entities.push({type:'manager',col:8,row:4,depth:isoDepth(8,5)});
  entities.push({type:'plant',col:0,row:0,depth:isoDepth(0,1)});
  entities.push({type:'plant',col:0,row:5,depth:isoDepth(0,6)});
  entities.push({type:'plant',col:4,row:5,depth:isoDepth(4,6)});
  entities.push({type:'vending',col:10,row:0,depth:isoDepth(10,1)});
  entities.push({type:'wineRack',col:2,row:0,depth:isoDepth(2,1)});
  entities.push({type:'magazines',col:6,row:4,depth:isoDepth(6,5)});

  // Staff — use their actual screen Y position for depth
  for(const s of G.staff){
    if(!s.hired) continue;
    entities.push({type:'staff',data:s,col:0,row:0,depth:s.y+27}); // feet Y
  }
  // Customers
  for(const c of G.custs){
    entities.push({type:'cust',data:c,col:0,row:0,depth:c.y+20}); // feet Y
  }

  // Sort by depth (lower screen Y = further back = drawn first)
  entities.sort((a,b)=>a.depth-b.depth);

  // Draw each entity
  for(const e of entities){
    switch(e.type){
      case 'counter': drawIsoCounter(e.col,e.row); break;
      case 'shelves': drawIsoShelves(e.col,e.row); break;
      case 'lottery': drawIsoLottery(e.col,e.row); break;
      case 'manager': drawIsoManager(e.col,e.row); break;
      // door is now drawn on the right wall, not as a floor entity
      case 'plant': drawIsoPlant(e.col,e.row); break;
      case 'vending': drawIsoVending(e.col,e.row); break;
      case 'wineRack': drawIsoWineRack(e.col,e.row); break;
      case 'magazines': drawIsoMagazineRack(e.col,e.row); break;
      case 'rug': drawIsoRug(e.col,e.row); break;
      case 'staff': drawIsoStaff(e.data); break;
      case 'cust': drawIsoCust(e.data); break;
    }
  }

  cx.restore(); // end clip
}

// ── LED DISPLAY (on wall) ────────────────────────────────────
function drawLED(){
  // LED on LEFT WALL — text reads from bottom-left to top-right (readable)
  // We go from lp2 (bottom) to lp1 (top) so text direction is correct
  const lp1=toIso(0,5);   // bottom of wall (start of text)
  const lp2=toIso(0,1);   // top of wall (end of text)
  const ledYoff=30; // below ceiling
  const ledY1=lp1.y-ISO.wallH+ledYoff;
  const ledY2=lp2.y-ISO.wallH+ledYoff;
  const lh=16;
  cx.save();
  // Clip to left wall
  const wallClipPts=[];
  for(let rr=0;rr<=ISO.rows;rr++) wallClipPts.push(toIso(0,rr));
  cx.beginPath();
  cx.moveTo(wallClipPts[0].x,wallClipPts[0].y-ISO.wallH);
  for(let i=1;i<wallClipPts.length;i++) cx.lineTo(wallClipPts[i].x,wallClipPts[i].y-ISO.wallH);
  for(let i=wallClipPts.length-1;i>=0;i--) cx.lineTo(wallClipPts[i].x,wallClipPts[i].y);
  cx.closePath();cx.clip();
  // Angle from lp1→lp2 (bottom to top = readable direction)
  const angle=Math.atan2(lp2.y-lp1.y,lp2.x-lp1.x);
  const ledLen=Math.sqrt((lp2.x-lp1.x)**2+(lp2.y-lp1.y)**2);
  cx.translate(lp1.x,ledY1);
  cx.rotate(angle);
  // LED body
  r(0,-1,ledLen,lh,'#1a1408');
  rx(0,-1,ledLen,lh,'#8a7a50',1);
  // LED dot grid
  cx.globalAlpha=0.04;
  for(let dx=2;dx<ledLen-2;dx+=4)
    for(let dy=1;dy<lh-2;dy+=4)
      r(dx,dy,2,2,'#ffaa00');
  cx.globalAlpha=1;
  // Scrolling text
  const msgs=T().ledMsgs;
  const liveData=(state===S.GAME||state===S.PAUSE)
    ? `  ◈  ${T().customers}: ${G?G.customersToday:0}  ◈  ${T().satisfaction}: ${G?(G.satisfaction|0):0}%  ◈  ${T().fame}: ${G?(G.fame|0):0}%  ◈  `
    : '  ◈  ';
  const fullMsg=msgs.join('   ◆   ')+liveData;
  cx.font='bold 8px monospace';
  const msgW=cx.measureText(fullMsg).width;
  ledOffset=(ledOffset+0.6)%(msgW+ledLen);
  cx.beginPath();cx.rect(2,0,ledLen-4,lh-1);cx.clip();
  const scrollX=ledLen-(ledOffset%(msgW+ledLen));
  const pulse=0.7+0.3*Math.sin(tt*0.04);
  cx.fillStyle=`rgba(255,${160+(80*pulse)|0},0,1)`;
  cx.font='bold 8px monospace';cx.textAlign='left';
  cx.fillText(fullMsg,scrollX,11);
  cx.fillText(fullMsg,scrollX+msgW+ledLen*0.3,11);
  cx.restore();
}

// ── TFT SCREEN 42" on left wall (Altadis digital signage) ────
function drawTFTScreen(){
  // Position: below LED, touching the floor
  const tp1=toIso(0,1.5);
  const tp2=toIso(0,4.5);
  // Calculate Y so screen bottom touches the wall base
  const wallBaseY=tp1.y; // wall meets floor here
  const scrW=55;
  const tftY1=wallBaseY-scrW; // bottom of screen = floor level
  cx.save();
  // Clip to left wall
  const wallClipPts=[];
  for(let rr=0;rr<=ISO.rows;rr++) wallClipPts.push(toIso(0,rr));
  cx.beginPath();
  cx.moveTo(wallClipPts[0].x,wallClipPts[0].y-ISO.wallH);
  for(let i=1;i<wallClipPts.length;i++) cx.lineTo(wallClipPts[i].x,wallClipPts[i].y-ISO.wallH);
  for(let i=wallClipPts.length-1;i>=0;i--) cx.lineTo(wallClipPts[i].x,wallClipPts[i].y);
  cx.closePath();cx.clip();
  // Follow wall angle for the panel shape
  const wallAngle=Math.atan2(tp2.y-tp1.y,tp2.x-tp1.x);
  const scrLen=Math.sqrt((tp2.x-tp1.x)**2+(tp2.y-tp1.y)**2);
  cx.translate(tp1.x,tftY1);
  cx.rotate(wallAngle);
  // TV bezel (black frame)
  r(-4,-4,scrLen+8,scrW+8,'#1a1a1a');
  r(-3,-3,scrLen+6,scrW+6,'#222');
  // Screen background
  const scrGrad=cx.createLinearGradient(0,0,0,scrW);
  scrGrad.addColorStop(0,'#002a55');
  scrGrad.addColorStop(0.5,'#003d77');
  scrGrad.addColorStop(1,'#002850');
  cx.fillStyle=scrGrad;
  cx.fillRect(0,0,scrLen,scrW);
  // Rotate text content 90° (counter-clockwise) inside the screen
  // so text reads vertically from bottom to top
  cx.save();
  cx.translate(scrLen/2,scrW/2); // center of screen
  cx.rotate(-Math.PI);            // rotate -180° (90° more)
  // Now drawing in rotated space: x goes "up", y goes "right"
  // Available space: width=scrW, height=scrLen (swapped)
  const tw=scrW, th=scrLen;
  // Altadis branding — animated slideshow
  const slide=Math.floor(tt/300)%4;
  // Subtle bg pattern
  cx.globalAlpha=0.06;
  for(let i=0;i<5;i++){
    cx.beginPath();cx.arc(i*14-tw*0.3,i*10-th*0.2,15,0,Math.PI*2);
    cx.fillStyle='#ffffff';cx.fill();
  }
  cx.globalAlpha=1;
  cx.textAlign='center';
  if(slide===0){
    cx.fillStyle='#ffffff';cx.font='bold 12px monospace';
    cx.fillText('ALTADIS',0,-8);
    cx.font='7px monospace';
    cx.fillText('DISTRIBUCIÓN',0,4);
    cx.strokeStyle='#cc8800';cx.lineWidth=1.5;
    cx.beginPath();cx.moveTo(-tw*0.35,8);cx.lineTo(tw*0.35,8);cx.stroke();
    cx.fillStyle='#ccaa44';cx.font='6px monospace';
    cx.fillText('Tu estanco de confianza',0,18);
  } else if(slide===1){
    cx.fillStyle='#ffcc00';cx.font='bold 10px monospace';
    cx.fillText('★ XTANCO ★',0,-8);
    cx.fillStyle='#ffffff';cx.font='7px monospace';
    cx.fillText('Red de estancos',0,4);
    cx.fillStyle='#88ccff';cx.font='6px monospace';
    cx.fillText('digitales',0,14);
  } else if(slide===2){
    cx.fillStyle='#ff8800';cx.font='bold 11px monospace';
    cx.fillText('ADMIRA',0,-6);
    cx.fillStyle='#ffffff';cx.font='7px monospace';
    cx.fillText('La red de estancos',0,6);
    cx.fillStyle='#aaddff';cx.font='6px monospace';
    cx.fillText('del futuro',0,16);
  } else {
    cx.fillStyle='#66ff88';cx.font='bold 8px monospace';
    cx.fillText('HOY',0,-12);
    cx.fillStyle='#ffffff';cx.font='8px monospace';
    if(G){
      cx.fillText('Clientes:'+G.customersToday,0,0);
      cx.fillText('Sat:'+(G.satisfaction|0)+'%',0,12);
    }
  }
  cx.textAlign='left';
  cx.restore(); // undo text rotation
  // Screen glare
  cx.globalAlpha=0.05;
  cx.fillStyle='#ffffff';
  cx.beginPath();cx.moveTo(0,0);cx.lineTo(scrLen*0.5,0);cx.lineTo(0,scrW*0.5);cx.closePath();cx.fill();
  cx.globalAlpha=1;
  // Bezel edge
  cx.strokeStyle='#333';cx.lineWidth=0.5;
  cx.strokeRect(-2,-2,scrLen+4,scrW+4);
  // Wall mount
  r(scrLen*0.35,-7,scrLen*0.3,4,'#444');
  cx.restore(); // undo wall clip + angle
}

function drawIsoCounter(col,row){

  drawIsoBlock(col,row,3,1,24,P.furnitureLight,P.furnitureDark,P.furniture,null);

  const p=toIso(col+1,row);
  r(p.x-10,p.y-32,20,10,'#ddd8c8');rx(p.x-10,p.y-32,20,10,'#aaa090',1);

  r(p.x-8,p.y-30,12,6,'#224422');
  tx('€'+(G.money|0>9999?((G.money/1000|0)+'K'):(G.money|0)),p.x-7,p.y-25,'#66cc66',6);
  // Products displayed on counter
  for(let i=0;i<Math.min(4,G.prods.length);i++){
    const pp=toIso(col+0.4+i*0.55,row-0.15);
    r(pp.x-3,pp.y-28,6,8,G.prods[i].color);

function drawIsoShelves(col,row){
  // Wooden shelf unit: 2 wide, 2 deep, 55px tall
  drawIsoBlock(col,row,2,2,55,P.furnitureLight,P.furnitureDark,P.furniture,null);
  // Shelf levels with products (colorful boxes)
  const levels=[12,24,36,48];
  const p=toIso(col+1,row+1);
  for(let lv=0;lv<levels.length;lv++){
    const numP=G.storeLevel>=2?5:3;
    for(let i=0;i<numP;i++){
      const prod=G.prods[i%G.prods.length];
      const stk=prod.stock/prod.max;
      const px2=p.x-14+i*7, py2=p.y-levels[lv]-8;
      // Product box
      r(px2,py2,5,6+lv%2,prod.color);
      r(px2,py2,5,2,'#ffffff33');

}

function drawIsoWineRack(col,row){
  // Wooden rack: 2 wide, 1 deep, 48px tall
  drawIsoBlock(col,row,2,1,48,P.furnitureLight,P.furnitureDark,P.furniture,null);
  const p=toIso(col+1,row+0.5);
  // Shelf dividers
  for(let lv=0;lv<4;lv++){
    const sy=p.y-10-lv*10;
    cx.strokeStyle=P.furnitureLight;cx.lineWidth=0.8;
    cx.beginPath();cx.moveTo(p.x-16,sy);cx.lineTo(p.x+16,sy);cx.stroke();
  }
  // Bottles (lying horizontal, colored)
  const bottleColors=['#660022','#880033','#550028','#772244','#993355','#440018','#aa2244','#661133'];
  for(let lv=0;lv<4;lv++){
    const numB=3+lv%2;
    for(let i=0;i<numB;i++){
      const bx=p.x-14+i*8, by=p.y-14-lv*10;
      const bc=bottleColors[(lv*3+i)%bottleColors.length];
      // Bottle body (horizontal)
      r(bx,by,7,4,bc);
      // Bottle neck
      r(bx+7,by+1,3,2,bc);
      // Cap/foil
      r(bx+10,by+1,1,2,'#ccaa44');
      // Glass highlight
      r(bx+1,by,2,1,'#ffffff33');
    }
  }

function drawIsoMagazineRack(col,row){

      r(mx+1,ry-2,5,3,'#00000022');

    cx.beginPath();cx.moveTo(p.x-17,ry+2);cx.lineTo(p.x+17,ry+2);cx.stroke();

  nt(T().pauseCont,W/2,py2+ph-18,P.gray,8);cx.globalAlpha=1;
}

// ── DRAW YEAR END ─────────────────────────────────────────────
const RATING_COLS={S:P.neon3,A:P.green,B:P.neonB,C:P.yellow,D:P.red};
function drawYearEnd(){
  G.yearEndAnim++;
  cx.globalAlpha=Math.min(0.88,G.yearEndAnim/30);r(0,0,W,H,'#000');cx.globalAlpha=1;
  if(G.yearEndAnim<15) return;
  const pw=500,ph=340,px2=W/2-pw/2,py2=H/2-ph/2;
  r(px2,py2,pw,ph,'#050510');
  const rating=G.yearRating||'C';
  const rc=RATING_COLS[rating];
  glow(rc,18);rx(px2,py2,pw,ph,rc,2);nog();
  nt(T().yearEndTitle+' '+G.year,W/2,py2+28,rc,16);
  nl(px2+20,py2+38,px2+pw-20,py2+38,rc,1);
  // Revenue bar animation
  const target=CFG.YEAR_TARGETS[G.year-1];
  const maxBar=pw-80;
  const barProg=Math.min(1,(G.yearEndAnim-20)/60);
  const revProg=Math.min(G.yearRevenue,target*Math.min(1,barProg));
  tx(T().yearRev,px2+22,py2+60,P.uiT3,9);
  r(px2+22,py2+66,maxBar,14,P.uiB);
  r(px2+22,py2+66,(maxBar*(revProg/target))|0,14,rc);
  // Target line
  const tLine=px2+22+(maxBar*Math.min(1,1))|0;
  nl(tLine,py2+62,tLine,py2+84,P.white,1);
  tx('€'+G.yearRevenue.toLocaleString(),px2+22,py2+91,rc,10);
  tx(T().yearTarget+': €'+target.toLocaleString(),px2+22,py2+104,P.uiT3,8);
  // Rating reveal
  if(G.yearEndAnim>70){
    const ratingTxt=T().ratings[rating];
    glow(rc,20);tx(rating,W/2-40,py2+165,rc,72,'center');nog();
    nt(ratingTxt,W/2+55,py2+155,rc,13);
  }
  // Bonus
  if(G.yearEndAnim>85){
    const bonus=G.yearBonus;
    const bc=bonus>0?P.green:bonus<0?P.red:P.gray;
    nl(px2+20,py2+195,px2+pw-20,py2+195,P.gray,1);
    tx(T().yearBonus+':',px2+22,py2+215,P.uiT3,9);
    glow(bc,6);tx((bonus>=0?'+':'')+'€'+bonus,px2+22,py2+230,bc,16);nog();
    if(G.year<CFG.TOTAL_YEARS){
      cx.globalAlpha=.5+.5*Math.abs(Math.sin(tt*.05));
      nt(T().yearCont,W/2,py2+ph-18,P.neon1,10);cx.globalAlpha=1;
    } else {
      cx.globalAlpha=.5+.5*Math.abs(Math.sin(tt*.05));
      nt(T().yearCont,W/2,py2+ph-18,P.neon3,10);cx.globalAlpha=1;
    }
  }
}

// ── DRAW GAME END ─────────────────────────────────────────────
function drawGameEnd(){
  r(0,0,W,H,P.bg);
  cx.globalAlpha=0.15;
  for(const s of mStars){cx.globalAlpha=.08+.12*Math.sin(tt*.015+s.b*7);r(s.x,s.y,s.r,s.r,P.neon1);}
  cx.globalAlpha=1;
  nl(0,5,W,5,P.neon2,3);nl(0,H-5,W,H-5,P.neon1,3);
  const isWin=G.yearsCompleted>=CFG.TOTAL_YEARS;
  const titleCol=isWin?P.neon3:P.red;
  const pw=520,ph=380,px2=W/2-pw/2,py2=H/2-ph/2;
  r(px2,py2,pw,ph,'#050510');glow(titleCol,18);rx(px2,py2,pw,ph,titleCol,2);nog();
  nt(T().gameEndTitle,W/2,py2+28,titleCol,18);
  nt(T().gameEndSub,W/2,py2+50,P.neon1,11);
  nl(px2+20,py2+60,px2+pw-20,py2+60,titleCol,1);
  // Stats
  const rows=[
    [T().gameEndYears,G.yearsCompleted+'/'+CFG.TOTAL_YEARS,P.neonB],
    [T().revenue+' TOTAL','€'+G.totalRevenue.toLocaleString(),P.green],
    ['CLIENTES TOTALES',G.totalCustomers.toLocaleString(),P.neon1],
    [T().satisfaction,(G.satisfaction|0)+'%',G.satisfaction>70?P.green:P.yellow],
    [T().fame,(G.fame|0)+'%',P.neon2],
  ];
  rows.forEach(([lbl,val,col],i)=>{
    tx(lbl,px2+28,py2+85+i*28,P.uiT3,9);
    glow(col,4);tx(''+val,px2+pw-28,py2+85+i*28,col,11,'right');nog();
  });
  nl(px2+20,py2+235,px2+pw-20,py2+235,P.gray,1);
  // Score
  tx(T().gameEndScore,px2+28,py2+258,P.uiT3,9);
  glow(titleCol,10);tx(G.totalScore.toLocaleString(),px2+28,py2+280,titleCol,28);nog();
  // Rank
  const rankIdx=Math.min(G.yearsCompleted,T().gameEndRanks.length-1);
  nt('"'+T().gameEndRanks[rankIdx]+'"',W/2,py2+315,P.neon3,13);
  cx.globalAlpha=.4+.6*Math.abs(Math.sin(tt*.04));
  nt(T().gameEndRestart,W/2,py2+ph-18,P.neon1,9);cx.globalAlpha=1;
}

// ── MAIN LOOP ─────────────────────────────────────────────────
function loop(){
  requestAnimationFrame(loop);
  tt++;
  cx.clearRect(0,0,W,H);
  if(state===S.MENU){drawMenu();return;}
  if(state===S.MODEL_SEL){drawModelSelect();return;}
  if(state===S.TUT){drawTutorial();return;}
  if(state===S.YEAR_END){drawYearEnd();return;}
  if(state===S.GAME_END){drawGameEnd();return;}
  if(state===S.PAUSE){
    r(0,0,W,H,P.bg);drawCityBg();drawShop();drawShopChars();drawHUD();drawBottomBar();drawUI();
    drawPause();return;
  }
  // GAME
  updateGame();
  r(0,0,W,H,P.bg);
  drawCityBg();drawShop();drawShopChars();drawFloats();drawEvent();drawHUD();drawBottomBar();drawUI();
}
loop();
</script>
