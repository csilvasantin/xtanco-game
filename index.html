// ── SAVE / LOAD ───────────────────────────────────────────────
function saveGame(){
  try{localStorage.setItem('xtanco_save',JSON.stringify({G,lang,state}));}catch(e){}
}
function loadGame(){
  try{
    const d=localStorage.getItem('xtanco_save');
    if(d){const p=JSON.parse(d);G=p.G;lang=p.lang||'es';return true;}
  }catch(e){}
  return false;
}

// ── INPUT ─────────────────────────────────────────────────────
let activeTab=0;
const keys={};
const BTNS={};
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(state===S.MENU){
    if(e.code==='ArrowLeft'||e.code==='ArrowUp')   menuSel=0;
    if(e.code==='ArrowRight'||e.code==='ArrowDown') menuSel=1;
    if(e.code==='Enter'||e.code==='Space'){lang=menuSel===0?'es':'en';modelSel=0;state=S.MODEL_SEL;}
    return;
  }
  if(state===S.MODEL_SEL){
    if(e.code==='ArrowLeft')  modelSel=(modelSel+3)%4;
    if(e.code==='ArrowRight') modelSel=(modelSel+1)%4;
    if(e.code==='ArrowUp')    modelSel=(modelSel<2)?modelSel:modelSel-2;
    if(e.code==='ArrowDown')  modelSel=(modelSel>=2)?modelSel:modelSel+2;
    if(e.code==='Enter'||e.code==='Space'){initGame();state=S.TUT;tutPage=0;}
    if(e.code==='Escape'){state=S.MENU;}
    return;
  }
  if(state===S.TUT){
    if(e.code==='Enter'||e.code==='Space'||e.code==='ArrowRight'){
      tutPage++;
      if(tutPage>=T().tut.length){state=S.GAME;}
    }
    return;
  }
  if(state===S.YEAR_END){
    if((e.code==='Enter'||e.code==='Space')&&G.yearEndAnim>80) advanceYear();
    return;
  }
  if(state===S.GAME_END){
    if(e.code==='Enter'||e.code==='Space'){state=S.MENU;menuSel=0;}
    return;
  }
  if(state===S.PAUSE){
    if(e.code==='Escape'||e.code==='Enter'||e.code==='Space'){state=S.GAME;}
    return;
  }
  if(state===S.GAME){
    if(e.code==='Escape'){openPause();}
    if(e.code==='Digit1') activeTab=0;
    if(e.code==='Digit2') activeTab=1;
    if(e.code==='Digit3') activeTab=2;
    if(e.code==='Digit4') activeTab=3;
  }
});

    const rr=cv.getBoundingClientRect();
    const mx2=(e.clientX-rr.left)*(W/rr.width)|0, my2=(e.clientY-rr.top)*(H/rr.height)|0;
    // Card grid: 2x2, centered
    const cw2=210,ch2=170,gap2=18,gx=W/2-(cw2*2+gap2)/2,gy=H/2-ch2+10;
    for(let i=0;i<4;i++){
      const col2=i%2,row2=(i/2)|0;
      const cx3=gx+col2*(cw2+gap2),cy3=gy+row2*(ch2+gap2);
      if(mx2>=cx3&&mx2<cx3+cw2&&my2>=cy3&&my2<cy3+ch2){modelSel=i;initGame();state=S.TUT;tutPage=0;return;}
    }
    return;
  }
  if(state===S.TUT){tutPage++;if(tutPage>=T().tut.length)state=S.GAME;return;}
  if(state===S.PAUSE){state=S.GAME;return;}
  if(state===S.YEAR_END&&G.yearEndAnim>80){advanceYear();return;}
  if(state===S.GAME_END){state=S.MENU;menuSel=0;return;}
  if(state!==S.GAME) return;
  const r=cv.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width)|0, my=(e.clientY-r.top)*(H/r.height)|0;
  for(const[id,b] of Object.entries(BTNS)){if(mx>=b.x&&mx<b.x+b.w&&my>=b.y&&my<b.y+b.h){doAction(id);return;}}
});

// ── ACTIONS ───────────────────────────────────────────────────
function doAction(id){
  if(id.startsWith('tab')){activeTab=parseInt(id[3]);return;}
  if(id.startsWith('hire')){
    const i=parseInt(id[4]);
    const s=G.staff[i];
    if(!s.hired&&G.money>=CFG.HIRE_COST[i]){
      G.money-=CFG.HIRE_COST[i];G.weekExpenses+=CFG.HIRE_COST[i];
      s.hired=true;s.energy=100;s.morale=85;
      showEv(T().events[5],P.neon1);addFloat(s.x,s.y-40,'+'+T().staffLabel[i],P.neon1);
    }
  }
  if(id.startsWith('train')){
    const i=parseInt(id[5]);const s=G.staff[i];
    if(s.hired&&G.money>=CFG.TRAIN_COST[i]&&s.level<5){
      G.money-=CFG.TRAIN_COST[i];G.weekExpenses+=CFG.TRAIN_COST[i];
      s.level++;s.morale=Math.min(100,s.morale+10);
      addFloat(s.x,s.y-40,'▲ LVL '+s.level,P.neon3);
    }
  }
  if(id.startsWith('rest')){
    const i=parseInt(id[4]);const p=G.prods[i];
    if(G.money>=CFG.RESTOCK_COST&&p.stock<p.max){
      G.money-=CFG.RESTOCK_COST;G.weekExpenses+=CFG.RESTOCK_COST;
      p.stock=p.max;updateBars();showEv(T().events[4],P.neonB);
    }
  }
  if(id.startsWith('adv')){
    const i=parseInt(id[3]);const a=CFG.ADVERT[i];
    if(G.money>=a.cost){
      G.money-=a.cost;G.weekExpenses+=a.cost;
      G.fame=Math.min(100,G.fame+a.fame);
      G.satisfaction=Math.min(100,G.satisfaction+5);
      showEv(T().events[7],P.neon2);addFloat(W/2,H/2-40,'+FAMA',P.neon2);
    }
  }
  if(id==='upgrade'){
    if(G.storeLevel<2&&G.money>=CFG.UPGRADE_COST){
      G.money-=CFG.UPGRADE_COST;G.weekExpenses+=CFG.UPGRADE_COST;
      G.storeLevel=2;G.satisfaction=Math.min(100,G.satisfaction+15);
      showEv(T().upgradeMsg,P.neon1);addFloat(W/2,H/2-40,'UPGRADE!',P.neon1);
    }
  }
}

function showEv(msg,col){G.eventMsg=msg;G.eventTimer=160;G.eventColor=col||P.neon1;}
function addFloat(x,y,txt,col){G.floats.push({x,y,txt,col,life:65,vy:-0.65});}
function openPause(){
  G.pauseData={rev:G.weekRevenue,exp:G.weekExpenses,cust:G.customersToday,sat:G.satisfaction,fame:G.fame};
  state=S.PAUSE;

// ── GAME LOGIC ────────────────────────────────────────────────
function updateBars(){
  const hi=G.staff.filter(s=>s.hired);
  const avgStk=G.prods.reduce((a,p)=>a+(p.stock/p.max),0)/G.prods.length;
  G.bars[0].val=Math.min(100,35+hi.length*10+G.fame*0.25)|0;
  G.bars[1].val=Math.min(100,15+G.customersToday*3+G.satisfaction*0.4)|0;
  G.bars[2].val=(avgStk*100)|0;
  G.bars[3].val=Math.min(100,25+hi.length*11+G.satisfaction*0.4)|0;
}

function getRating(rev,target){
  const r=rev/target;
  if(r>=1.5) return'S'; if(r>=1.2) return'A'; if(r>=1.0) return'B';
  if(r>=0.8) return'C'; return'D';
}

function advanceYear(){
  if(G.year>=CFG.TOTAL_YEARS){
    // Game end
    const hireScore=G.staff.filter(s=>s.hired).reduce((a,s)=>a+s.level*200,0);
    G.totalScore=(G.totalRevenue/100+hireScore+G.fame*50)|0;
    state=S.GAME_END;
    saveGame();
    return;
  }
  G.yearsCompleted++;
  G.year++;G.week=1;G.weekTimer=0;G.yearRevenue=0;G.weekRevenue=0;G.weekExpenses=0;
  G.customersToday=0;G.yearEndAnim=0;G.yearRating=null;
  // Satisfaction decay on year transition
  G.satisfaction=Math.max(20,G.satisfaction-5);
  state=S.GAME;
  saveGame();
}

function endWeek(){
  // Pay salaries
  const salaries=G.staff.filter(s=>s.hired).reduce((a,s)=>a+CFG.SALARY[s.role]*s.level,0);
  if(salaries>0){
    G.money-=salaries;G.weekExpenses+=salaries;
    addFloat(SHOP.x+SHOP.w/2,SHOP.y+20,'-€'+salaries+' SAL.',P.red);
  }
  // Stock decay
  for(const p of G.prods) p.stock=Math.max(0,p.stock-(2+Math.random()*4|0));
  // Satisfaction decay
  G.satisfaction=Math.max(10,G.satisfaction-1.5);
  // Morale decay for unhired-slots
  for(const s of G.staff) if(s.hired) s.morale=Math.max(20,s.morale-2);
  updateBars();
  G.weekRevenue=0;G.weekExpenses=0;G.customersToday=0;
  G.week++;
  if(G.week>CFG.WEEKS_PER_YEAR){
    // Year end
    const target=CFG.YEAR_TARGETS[G.year-1];
    const rating=getRating(G.yearRevenue,target);
    const bonus=T().ratingBonus[rating];
    G.money+=bonus;G.totalRevenue+=G.yearRevenue;
    G.yearRating=rating;G.yearBonus=bonus;G.yearEndAnim=0;
    if(G.yearRevenue<target*CFG.GAMEOVER_THRESHOLD){
      G.gameOverReason='target';
      G.totalScore=(G.totalRevenue/100)|0;
      state=S.GAME_END;
      saveGame();
      return;
    }
    state=S.YEAR_END;
    saveGame();
    return;
  }
  if(G.week===1&&Math.random()<0.3) showEv(T().events[6],P.neon3);
}

function updateGame(){
  tt++;G.weekTimer++;

  // Rush hour
  if(!G.rush.active&&Math.random()<CFG.RUSH_CHANCE){
    G.rush.active=true;G.rush.timer=CFG.RUSH_DURATION;
    showEv(T().rushMsg,P.rushGlow);
  }
  if(G.rush.active){
    G.rush.timer--;
    if(G.rush.timer<=0){G.rush.active=false;showEv(T().rushEnd,P.neon3);}
  }

  // Inspection
  if(!G.inspect.active&&Math.random()<CFG.INSPECT_CHANCE){
    G.inspect.active=true;G.inspect.timer=200;G.inspect.warned=false;
    showEv(T().inspMsg,P.inspGlow);
  }
  if(G.inspect.active){
    G.inspect.timer--;
    if(G.inspect.timer===100&&!G.inspect.warned){
      G.inspect.warned=true;
      const hiCnt=G.staff.filter(s=>s.hired).length;
      const avgStk=G.prods.reduce((a,p)=>a+(p.stock/p.max),0)/G.prods.length;
      if(hiCnt>=1&&avgStk>0.4){
        showEv(T().inspPass,P.green);G.satisfaction=Math.min(100,G.satisfaction+8);
        addFloat(W/2,H/2-40,'✓ PASS',P.green);
      } else {
        const fine=600+Math.random()*400|0;
        G.money-=fine;G.weekExpenses+=fine;
        showEv(T().inspFail,P.inspGlow);addFloat(W/2,H/2-40,'-€'+fine,P.red);
        G.satisfaction=Math.max(10,G.satisfaction-15);
      }
      G.inspect.active=false;
    }
    if(G.inspect.timer<=0) G.inspect.active=false;
  }

  // Staff work
  const mult=G.rush.active?CFG.RUSH_MULT:1;
  for(const s of G.staff){
    if(!s.hired) continue;
    s.aTimer++;if(s.aTimer>10){s.aFrame=(s.aFrame+1)%2;s.aTimer=0;}
    if(s.busy>0) s.busy--;
    if(s.bTimer>0) s.bTimer--;
    s.energy=Math.max(15,s.energy-(s.busy>0?0.04:0.01));
    if(s.energy<25) s.energy=Math.min(100,s.energy+0.08);
    const moraleFactor=0.7+(s.morale/100)*0.3;
    if(Math.random()<CFG.SALE_PROB*moraleFactor*mult&&s.bTimer===0){
      const p=G.prods[Math.floor(Math.random()*G.prods.length)];
      if(p.stock>0){
        s.bTimer=70;s.busy=50;
        const qty=Math.max(1,(s.level*CFG.SALE_BASE*(0.7+Math.random()*0.6)*p.factor*mult)|0);
        const rev=qty*p.price;
        G.money+=rev;G.weekRevenue+=rev;G.yearRevenue+=rev;G.totalRevenue+=rev;
        G.customersToday++;G.totalCustomers++;
        p.stock=Math.max(0,p.stock-Math.max(1,(qty/p.price)|0));
        addFloat(s.x+7,s.y-28,'€'+rev,P.green);
        if(G.rush.active) addFloat(s.x+7,s.y-16,'x'+CFG.RUSH_MULT.toFixed(1),P.rushGlow);
        G.satisfaction=Math.min(100,G.satisfaction+0.3);
      }
    }
  }

  // Customers
  if(Math.random()<0.006*Math.max(1,G.staff.filter(s=>s.hired).length)*(G.rush.active?2:1)) spawnCust();
  for(let i=G.custs.length-1;i>=0;i--){
    const c=G.custs[i];c.ft++;if(c.ft>10){c.fr=(c.fr+1)%2;c.ft=0;}
    if(c.st==='walk'){
      const dx=c.tx-c.x,dy=c.ty-c.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<3){c.st='browse';c.timer=60+Math.random()*80;}
      else{c.x+=dx/d*1.3;c.y+=dy/d*1.3;c.dir=dx<0?-1:1;}
    } else if(c.st==='browse'){
      c.timer--;if(c.timer<=0){c.st='leave';c.tx=660;c.ty=385;}
    } else if(c.st==='leave'){
      const dx=c.tx-c.x,dy=c.ty-c.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<3) G.custs.splice(i,1);
      else{c.x+=dx/d*1.6;c.y+=dy/d*1.6;c.dir=dx<0?-1:1;}
    }
  }

  // Floats
  for(let i=G.floats.length-1;i>=0;i--){
    G.floats[i].y+=G.floats[i].vy;G.floats[i].life--;
    if(G.floats[i].life<=0) G.floats.splice(i,1);
  }

  if(G.eventTimer>0) G.eventTimer--;

  // Week end
  if(G.weekTimer>=CFG.WEEK_TICKS){G.weekTimer=0;endWeek();}
  updateBars();
}

function spawnCust(){
  if(G.custs.length>=7) return;
  const ci=Math.floor(Math.random()*6);
  G.custs.push({
    x:660,y:375+Math.random()*20-10,
    tx:180+Math.random()*340,ty:215+Math.random()*100,
    st:'walk',timer:0,col:P.prods[ci],hair:Math.floor(Math.random()*6),
    fr:0,ft:0,dir:-1
  });
}

function chibi(x,y,dir,shirt,hair,frame,busy,tick,scale=1){
  cx.save();

  const lk=frame===0?0:2;

  r(x+2,y+24,4,2,P.shoes);r(x+8,y+24,4,2,P.shoes);
  r(x+1,y+7,12,11,P.shirts[shirt]);r(x+4,y+9,5,3,'#ffffff22');
  const ak=busy?(frame===0?-2:2):0;
  r(x-2,y+8+ak,4,7,P.shirts[shirt]);r(x+12,y+8-ak,4,7,P.shirts[shirt]);
  r(x+0,y-2,14,14,P.skin);
  r(x+0,y-6,14,8,P.hair[hair]);r(x-1,y-5,3,10,P.hair[hair]);r(x+12,y-5,3,10,P.hair[hair]);
  const blink=Math.floor(tick/90)%9===0;
  r(x+2,y+2,3,blink?1:3,P.black);r(x+8,y+2,3,blink?1:3,P.black);

  cx.restore();
}

function drawLED(){
  const lx=SHOP.x+8, ly=SHOP.y+46, lw=SHOP.w-16, lh=20;
  // Panel body
  r(lx,ly,lw,lh,'#0a0500');
  rx(lx,ly,lw,lh,'#443300',1);
  // Dot grid (LED texture)
  cx.globalAlpha=0.09;
  for(let dx=lx+3;dx<lx+lw-2;dx+=5)
    for(let dy=ly+3;dy<ly+lh-2;dy+=5)
      r(dx,dy,2,2,'#ffaa00');
  cx.globalAlpha=1;
  // Build scrolling message: static messages + live data
  const msgs=T().ledMsgs;
  const liveData=state===S.GAME||state===S.PAUSE
    ? `  ◈  ${T().customers}: ${G?G.customersToday:0}  ◈  ${T().satisfaction}: ${G?(G.satisfaction|0):0}%  ◈  ${T().fame}: ${G?(G.fame|0):0}%  ◈  `
    : '  ◈  ';
  const fullMsg=msgs.join('   ◆   ')+liveData;
  // Measure text width
  cx.font='bold 11px monospace';
  const msgW=cx.measureText(fullMsg).width;
  // Advance scroll
  ledOffset=(ledOffset+0.9)%(msgW+lw);
  // Clip & draw scrolling text
  cx.save();
  cx.beginPath();cx.rect(lx+3,ly+1,lw-6,lh-2);cx.clip();
  const scrollX=lx+lw-(ledOffset%(msgW+lw));
  // Glow pulse
  const pulse=0.7+0.3*Math.sin(tt*0.04);
  glow('#ffaa00',6*pulse);
  cx.fillStyle=`rgba(255,${160+(80*pulse)|0},0,1)`;
  cx.font='bold 11px monospace';
  cx.textAlign='left';
  cx.fillText(fullMsg,scrollX,ly+14);
  // Draw again for seamless loop
  cx.fillText(fullMsg,scrollX+msgW+lw*0.3,ly+14);
  nog();
  cx.restore();
  // Frame neon line top/bottom
  nl(lx,ly,lx+lw,ly,'#885500',1);
  nl(lx,ly+lh,lx+lw,ly+lh,'#885500',1);
  // ADMIRA logo badge on the left
  r(lx,ly,52,lh,'#110800');
  rx(lx,ly,52,lh,'#ffaa00',1);
  glow('#ffaa00',8);
  tx('ADMIRA',lx+26,ly+14,'#ffcc44',10,'center');
  nog();
  // Separator line after badge
  nl(lx+52,ly,lx+52,ly+lh,'#885500',1);
}

    rx(UI.x+6,ry+30,UI.w-12,7,P.gray,1);
    tx(p.stock+'/'+p.max,UI.x+UI.w-6,ry+36,P.uiT3,7,'right');
    mkBtn('rest'+i,UI.x+6,ry+42,UI.w-12,16,'RESTOCK €'+CFG.RESTOCK_COST,P.neonB,G.money>=CFG.RESTOCK_COST&&p.stock<p.max);
  }
}

function tabStore(py){
  // Advert buttons
  tx('— '+T().advert+' —',UI.x+UI.w/2,py+10,P.uiT3,8,'center');
  CFG.ADVERT.forEach((a,i)=>{
    mkBtn('adv'+i,UI.x+5,py+16+i*30,UI.w-10,22,a.label+' +'+a.fame+' €'+a.cost,P.neon2,G.money>=a.cost);
  });
  nl(UI.x+4,py+108,UI.x+UI.w-4,py+108,P.gray,1);
  // Store upgrade
  tx('— '+T().upgrade+' —',UI.x+UI.w/2,py+120,P.uiT3,8,'center');
  if(G.storeLevel<2){
    tx(T().loanInfo,UI.x+UI.w/2,py+132,P.uiT3,7,'center');
    mkBtn('upgrade',UI.x+5,py+138,UI.w-10,24,'LVL 2  €'+CFG.UPGRADE_COST,P.neon1,G.money>=CFG.UPGRADE_COST);
  } else {
    glow(P.neon1,6);tx('★ LVL 2 ACTIVO',UI.x+UI.w/2,py+148,P.neon1,9,'center');nog();
  }
  nl(UI.x+4,py+170,UI.x+UI.w-4,py+170,P.gray,1);
  // Salary summary
  tx(T().salary,UI.x+5,py+182,P.uiT3,7);
  const total=G.staff.filter(s=>s.hired).reduce((a,s)=>a+CFG.SALARY[s.role]*s.level,0);
  glow(P.red,4);tx('€'+total,UI.x+5,py+195,P.red,13);nog();
  // Minimap
  const mm={x:UI.x+5,y:py+212,w:UI.w-10,h:80};
  r(mm.x,mm.y,mm.w,mm.h,P.bg);rx(mm.x,mm.y,mm.w,mm.h,P.neon1,1);
  tx('PLANTA',mm.x+mm.w/2,mm.y-3,P.neon1,7,'center');
  r(mm.x+2,mm.y+mm.h-8,mm.w-4,6,P.floor1);
  [{px:105,c:P.neon1},{px:280,c:P.neon2},{px:425,c:P.neon3},{px:558,c:P.neon1}].forEach(o=>{
    r(mm.x+2+((o.px-SHOP.x)/SHOP.w)*(mm.w-4),mm.y+mm.h-14,18,5,o.c);
  });
  for(const c of G.custs){
    r(mm.x+2+((c.x-SHOP.x)/SHOP.w)*(mm.w-4),mm.y+mm.h-20,3,3,c.col);
  }
}

// ── DRAW PAUSE ────────────────────────────────────────────────
function drawPause(){
  // Dim background
  cx.globalAlpha=0.5;r(0,0,W,H,'#000');cx.globalAlpha=1;
  const pw=380,ph=280,px2=W/2-pw/2,py2=H/2-ph/2;
  r(px2,py2,pw,ph,'#050510');glow(P.neon1,12);rx(px2,py2,pw,ph,P.neon1,2);nog();
  nt(T().pauseTitle,W/2,py2+24,P.neon3,13);
  nl(px2+16,py2+34,px2+pw-16,py2+34,P.neon2,1);
  const d=G.pauseData||{};
  const rows=[
    [T().revenue,'€'+(d.rev|0),P.green],
    [T().expenses,'€'+(d.exp|0),P.red],
    [T().net,(d.rev-d.exp>=0?'+':'')+'€'+((d.rev-d.exp)|0),d.rev-d.exp>=0?P.green:P.red],
    [T().customers+' HOY',d.cust||0,P.neonB],
    [T().satisfaction,(d.sat|0)+'%',d.sat>70?P.green:P.yellow],
    [T().fame,(d.fame|0)+'%',P.neon2],
    [T().objective,((G.yearRevenue/CFG.YEAR_TARGETS[G.year-1]*100)|0)+'%',P.neon3],
  ];
  rows.forEach(([lbl,val,col],i)=>{
    tx(lbl,px2+22,py2+54+i*26,P.uiT3,8);
    glow(col,3);tx(''+val,px2+pw-22,py2+54+i*26,col,9,'right');nog();
  });
  cx.globalAlpha=.5+.5*Math.abs(Math.sin(tt*.05));
  nt(T().pauseCont,W/2,py2+ph-18,P.gray,8);cx.globalAlpha=1;
}

// ── DRAW YEAR END ─────────────────────────────────────────────
const RATING_COLS={S:P.neon3,A:P.green,B:P.neonB,C:P.yellow,D:P.red};
function drawYearEnd(){
  G.yearEndAnim++;
  cx.globalAlpha=Math.min(0.88,G.yearEndAnim/30);r(0,0,W,H,'#000');cx.globalAlpha=1;
  if(G.yearEndAnim<15) return;
  const pw=500,ph=340,px2=W/2-pw/2,py2=H/2-ph/2;
  r(px2,py2,pw,ph,'#050510');
  const rating=G.yearRating||'C';
  const rc=RATING_COLS[rating];
  glow(rc,18);rx(px2,py2,pw,ph,rc,2);nog();
  nt(T().yearEndTitle+' '+G.year,W/2,py2+28,rc,16);
  nl(px2+20,py2+38,px2+pw-20,py2+38,rc,1);
  // Revenue bar animation
  const target=CFG.YEAR_TARGETS[G.year-1];
  const maxBar=pw-80;
  const barProg=Math.min(1,(G.yearEndAnim-20)/60);
  const revProg=Math.min(G.yearRevenue,target*Math.min(1,barProg));
  tx(T().yearRev,px2+22,py2+60,P.uiT3,9);
  r(px2+22,py2+66,maxBar,14,P.uiB);
  r(px2+22,py2+66,(maxBar*(revProg/target))|0,14,rc);
  // Target line
  const tLine=px2+22+(maxBar*Math.min(1,1))|0;
  nl(tLine,py2+62,tLine,py2+84,P.white,1);
  tx('€'+G.yearRevenue.toLocaleString(),px2+22,py2+91,rc,10);
  tx(T().yearTarget+': €'+target.toLocaleString(),px2+22,py2+104,P.uiT3,8);
  // Rating reveal
  if(G.yearEndAnim>70){
    const ratingTxt=T().ratings[rating];
    glow(rc,20);tx(rating,W/2-40,py2+165,rc,72,'center');nog();
    nt(ratingTxt,W/2+55,py2+155,rc,13);
  }
  // Bonus
  if(G.yearEndAnim>85){
    const bonus=G.yearBonus;
    const bc=bonus>0?P.green:bonus<0?P.red:P.gray;
    nl(px2+20,py2+195,px2+pw-20,py2+195,P.gray,1);
    tx(T().yearBonus+':',px2+22,py2+215,P.uiT3,9);
    glow(bc,6);tx((bonus>=0?'+':'')+'€'+bonus,px2+22,py2+230,bc,16);nog();
    if(G.year<CFG.TOTAL_YEARS){
      cx.globalAlpha=.5+.5*Math.abs(Math.sin(tt*.05));
      nt(T().yearCont,W/2,py2+ph-18,P.neon1,10);cx.globalAlpha=1;
    } else {
      cx.globalAlpha=.5+.5*Math.abs(Math.sin(tt*.05));
      nt(T().yearCont,W/2,py2+ph-18,P.neon3,10);cx.globalAlpha=1;
    }
  }
}

// ── DRAW GAME END ─────────────────────────────────────────────
function drawGameEnd(){
  r(0,0,W,H,P.bg);
  cx.globalAlpha=0.15;
  for(const s of mStars){cx.globalAlpha=.08+.12*Math.sin(tt*.015+s.b*7);r(s.x,s.y,s.r,s.r,P.neon1);}
  cx.globalAlpha=1;
  nl(0,5,W,5,P.neon2,3);nl(0,H-5,W,H-5,P.neon1,3);
  const isWin=G.yearsCompleted>=CFG.TOTAL_YEARS;
  const titleCol=isWin?P.neon3:P.red;
  const pw=520,ph=380,px2=W/2-pw/2,py2=H/2-ph/2;
  r(px2,py2,pw,ph,'#050510');glow(titleCol,18);rx(px2,py2,pw,ph,titleCol,2);nog();
  nt(T().gameEndTitle,W/2,py2+28,titleCol,18);
  nt(T().gameEndSub,W/2,py2+50,P.neon1,11);
  nl(px2+20,py2+60,px2+pw-20,py2+60,titleCol,1);
  // Stats
  const rows=[
    [T().gameEndYears,G.yearsCompleted+'/'+CFG.TOTAL_YEARS,P.neonB],
    [T().revenue+' TOTAL','€'+G.totalRevenue.toLocaleString(),P.green],
    ['CLIENTES TOTALES',G.totalCustomers.toLocaleString(),P.neon1],
    [T().satisfaction,(G.satisfaction|0)+'%',G.satisfaction>70?P.green:P.yellow],
    [T().fame,(G.fame|0)+'%',P.neon2],
  ];
  rows.forEach(([lbl,val,col],i)=>{
    tx(lbl,px2+28,py2+85+i*28,P.uiT3,9);
    glow(col,4);tx(''+val,px2+pw-28,py2+85+i*28,col,11,'right');nog();
  });
  nl(px2+20,py2+235,px2+pw-20,py2+235,P.gray,1);
  // Score
  tx(T().gameEndScore,px2+28,py2+258,P.uiT3,9);
  glow(titleCol,10);tx(G.totalScore.toLocaleString(),px2+28,py2+280,titleCol,28);nog();
  // Rank
  const rankIdx=Math.min(G.yearsCompleted,T().gameEndRanks.length-1);
  nt('"'+T().gameEndRanks[rankIdx]+'"',W/2,py2+315,P.neon3,13);
  cx.globalAlpha=.4+.6*Math.abs(Math.sin(tt*.04));
  nt(T().gameEndRestart,W/2,py2+ph-18,P.neon1,9);cx.globalAlpha=1;
}

// ── MAIN LOOP ─────────────────────────────────────────────────
function loop(){
  requestAnimationFrame(loop);
  tt++;
  cx.clearRect(0,0,W,H);
  if(state===S.MENU){drawMenu();return;}
  if(state===S.MODEL_SEL){drawModelSelect();return;}
  if(state===S.TUT){drawTutorial();return;}
  if(state===S.YEAR_END){drawYearEnd();return;}
  if(state===S.GAME_END){drawGameEnd();return;}
  if(state===S.PAUSE){
    // draw game frozen behind
    r(0,0,W,H,P.bg);drawShop();drawShopChars();drawHUD();drawUI();
    drawPause();return;
  }
  // GAME
  updateGame();
  r(0,0,W,H,P.bg);
  drawShop();drawShopChars();drawFloats();drawEvent();drawHUD();drawUI();
}
loop();
</script>
